anchors:
  north_star: NORTHSTAR.md

base_branch: feat/arnold-clean-extraction

milestones:
  - label: m1-megaplan-canonical-executor-bridge
    idea: .megaplan/initiatives/arnold-post-extraction-next/briefs/m1-megaplan-canonical-executor-bridge.md
    profile: partnered
    robustness: full
    depth: high
    with_prep: true
    prep_clarify: false
    prep_direction: "Start from the full-suite-green Slices 1-32. Focus on the smallest representative Megaplan path that can run through arnold.pipeline.run_pipeline via package-owned adapters/hooks. Compare existing Megaplan executor behavior to the neutral executor hook surface before proposing replacements. Do not copy quarry bridge files wholesale."
    notes: "Immediate next sprint. Wire Megaplan package execution onto the neutral Arnold executor through package-owned adapters/hooks while preserving compatibility. Do not copy quarry hooks wholesale; re-author against Slices 1-32 and keep old executor behavior characterized."

  - label: m2-package-authoring-surface
    idea: .megaplan/initiatives/arnold-post-extraction-next/briefs/m2-package-authoring-surface.md
    profile: partnered
    robustness: full
    depth: medium
    notes: "Make package authorship clear after the bridge exists: thin public helpers/docs/tests for package-owned pipelines without promoting Stage/Edge/StepResult.next as the user-facing DSL."

  - label: m3-human-interaction-and-deliberation-package
    idea: .megaplan/initiatives/arnold-post-extraction-next/briefs/m3-human-interaction-and-deliberation-package.md
    profile: partnered
    robustness: full
    depth: medium
    notes: "Re-author a generic human interaction step only if the package boundary proves it belongs outside evidence-pack; then bring deliberation back as a concrete package example, not a kernel primitive."

  - label: m4-megaplan-package-hardening
    idea: .megaplan/initiatives/arnold-post-extraction-next/briefs/m4-megaplan-package-hardening.md
    profile: directed
    robustness: full
    depth: medium
    notes: "Fold in preserved Megaplan-package work such as test-selection, attribution, execution-runtime hardening, and conformance-gate dirty work. Keep this out of Arnold substrate."

  - label: m5-branch-retirement-and-compatibility-cutover
    idea: .megaplan/initiatives/arnold-post-extraction-next/briefs/m5-branch-retirement-and-compatibility-cutover.md
    profile: solo
    robustness: light
    depth: low
    notes: "Mechanical cleanup once prior milestones land: verify branch-retirement criteria, preserve or discard parked work explicitly, update compatibility docs, and remove obsolete allowlist/archive references."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: full
  auto_approve: true
  max_iterations: 80
  poll_sleep: 8.0
