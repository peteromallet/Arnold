base_branch: main
superseded_by: custody-control-plane
anchors:
  north_star: NORTHSTAR.md
milestones:
- label: m1-ledger-core-and-brief
  idea: .megaplan/initiatives/incident-control-plane/briefs/m1-ledger-core-and-brief.md
  profile: partnered-5
  vendor: codex
  robustness: thorough
  depth: high
  branch: incident-control-plane-m1-ledger-brief
  prep_clarify: false
  prep_direction: Start from the reviewed incident-control-plane audit docs. Build
    the minimum event-sourced ledger core and read-only incident brief before integrating
    any repairers. Protect the invariant that derived indexes are projections from
    events.
  notes: Foundation sprint. Must produce schema/helper/projection tests before wrapper
    integrations depend on it.
- label: m2-repairer-integration
  idea: .megaplan/initiatives/incident-control-plane/briefs/m2-repairer-integration.md
  profile: partnered-5
  vendor: codex
  robustness: thorough
  depth: high
  branch: incident-control-plane-m2-repairers
  depends_on:
  - m1-ledger-core-and-brief
  prep_clarify: false
  prep_direction: Wire watchdog, chain runner, immediate repairer, meta repairer,
    and install sync to the incident ledger and brief. Focus on the repair-system
    shipped chain and deadline/claim handoffs.
  notes: Behavioral integration sprint. Do not broaden auditor/GitHub scope until
    core repairer loop is proven.
- label: m3-auditor-github-and-hardening
  idea: .megaplan/initiatives/incident-control-plane/briefs/m3-auditor-github-and-hardening.md
  profile: partnered-5
  vendor: codex
  robustness: thorough
  depth: high
  branch: incident-control-plane-m3-auditor-github
  depends_on:
  - m2-repairer-integration
  prep_clarify: false
  prep_direction: Make the six-hour auditor consume the ledger, reconcile broken expectations,
    update persistent problems, dispatch trusted subagents when useful, and publish
    redacted summaries through GitHub/editable-install branch sync.
  notes: Hardening and rollout sprint. Keep the auditor a reconciler first and avoid
    creating a second control plane.
on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
# Retired duplicate initiative: preserve history but disable unattended merges.
merge_policy: review
driver:
  robustness: thorough
  auto_approve: true
  max_iterations: 24
  poll_sleep: 8.0
