    idea: .megaplan/initiatives/critique-ledger/briefs/cl5-big-bang-cutover-and-retirement.md
    branch: megaplan/critique-ledger-m9-glm/cl5-cutover-retirement
    profile: partnered-5-glm
    robustness: thorough
    depth: high
    with_prep: true
    prep_direction: >-
      Revalidate the frozen M6 oracle, full semantic loop, WBC custody, exact
