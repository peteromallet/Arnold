    branch: megaplan/critique-ledger-m9-glm/cl2-ledger-replay
    profile: partnered-5-glm
    robustness: thorough
    depth: high
    with_prep: true
    prep_direction: >-
      Consume the reviewed CL1 contract bundle; map current file and Store
