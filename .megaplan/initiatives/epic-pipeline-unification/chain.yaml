# --- Autonomy policy ---
# The chain HARNESS now HONORS the failure/escalate LADDER (engine-readiness patch on main, verified in
# chain/__init__.py: FailurePolicy.from_yaml parses retry:/escalate:/abort:; bump_profile/bump_robustness
# are implemented in _apply_ladder_action; _handle_outcome walks a BOUNDED per-milestone retry counter
# [DEFAULT_MILESTONE_RETRY_CAP=2, capped to APEX_EXTREME_RETRY_CAP=1 for apex/extreme nodes — cannot loop];
# require_clean_base is parsed + enforced in the milestone loop via _assert_clean_base). The ladder below is
# now the REAL runtime policy, not an intent comment.
# Ladder (per milestone): retry_milestone (fresh re-init, up to the cap; 1 for apex/extreme) ->
# bump_profile (+ couples a depth bump; no tier above apex => no-op+stop) -> abort (stop_chain + auto-ticket).
on_failure:
  retry: retry_milestone   # walked first, bounded by the per-milestone retry counter
  escalate: bump_profile   # walked once after retries exhaust; bumps profile+depth one tier, re-runs once
  abort: stop_chain        # terminal: halt + auto-file a ladder-exhaustion megaplan ticket
on_escalate:
  escalate: bump_robustness # thorough -> extreme, re-drive once
  abort: stop_chain         # terminal: halt + auto-ticket
# ⚠️ LAUNCH PRECONDITION (operator pre-step, NOT established by this YAML): merge_policy: auto runs
# `gh pr merge --auto --squash` (git_ops.py:716) which defers ONLY to GitHub BRANCH PROTECTION — and
# git_ops.py:726-730 FALLS BACK to an UNCONDITIONAL squash merge if GitHub auto-merge is disallowed. So
# "the oracle gates the merge" is TRUE ONLY IF the per-milestone parity/strangler/grep gate CI checks are
# wired as REQUIRED CHECKS on `main`'s branch protection. WIRING THOSE REQUIRED CHECKS IS A LAUNCH
# PRECONDITION (see EPIC "## ⚠️ PRE-LAUNCH — operator pre-step", step 2). With them wired, a red gate blocks
# both the --auto path AND the fallback (GitHub refuses the merge). Without them, auto-merge is unsafe —
# set merge_policy: review instead until the checks exist.
merge_policy: auto

driver:
  robustness: thorough
  auto_approve: true           # `megaplan auto` runs straight through; no pre-execute human park
  max_iterations: 80
  poll_sleep: 8.0
  require_clean_base: true     # READ + enforced: _assert_clean_base stashes/fails on carried WIP before init.
