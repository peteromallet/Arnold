# ORDER NOTE: milestone #1 is m0-harness-floor — the IN-REPO harness subset of the old M0 (report-only
# schema validator + dual-run/oracle harness skeleton + behavioral-replay corpus). The pinned-engine /
# frozen-venv / launch parts of the old M0 are NOT a milestone — a milestone cannot pin the engine that
# drives it (bootstrap paradox). They are the OPERATOR PRE-STEP, documented in the EPIC
# "## ⚠️ PRE-LAUNCH — operator pre-step" section, performed by the human before `chain start`.
# M2.5 spike runs ∥ M2, lands before M3. M3 is THE HINGE (Activation + realized-graph + Conveyance + R1
# authority-flip + Governor). M5-eval GATES M5-cal (routing before the versioned ruler = Goodhart). M6 is
# the atomic strangler swap (LAST load-bearing node). m5d (supervisor) runs AFTER m6 (orchestrates
# discovered modules). m7 sinks last.
# ⚠️ ORDERING IS ENFORCED SOLELY BY THIS LIST'S LINEAR ORDER + each milestone's per-milestone strangler
# gate. There is no harness-level depends_on/parallel/gate field (MilestoneSpec has none) — the chain is a
# single serial cursor that runs milestones in listed order, which IS the correct topological sort. Every
# "∥ parallel" in the briefs/PROGRAM is a topological-sort assertion (these may run concurrently and the
# serial order respects their edges), NOT runtime concurrency. The non-negotiable M5-eval→M5-cal edge is
# satisfied because m5-eval is listed before m5-cal.
# LAUNCH: a single top-of-epic human "go" at t0 — running `megaplan chain start` from the pinned engine
# after the operator pre-step — is the only authorization (committing apex/extreme spend against a chosen
# architecture). There is NO auto-arm: the human `chain start` IS the authorization (the M1/W8 lint is
# M1's own output and cannot gate the run that produces it). Every downstream milestone is
# machine-gated/defaulted with no per-milestone human restart.

