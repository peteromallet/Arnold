base_branch: editible-install
anchors:
  north_star: NORTHSTAR.md
milestones:
- label: m1
  idea: .megaplan/initiatives/progress-auditor-stage-metrics/briefs/m1.md
  branch: megaplan/progress-auditor-stage-metrics/m1
  profile: partnered-5
  vendor: codex
  robustness: full
  depth: high
  with_prep: true
  prep_direction: Focus prep on the current progress-auditor gather/report path, existing
    plan/event/repair/meta-repair artifacts, and tests that can prove stage-by-stage
    counters are deterministic. Do not spend prep on broad watchdog redesign.
on_failure:
