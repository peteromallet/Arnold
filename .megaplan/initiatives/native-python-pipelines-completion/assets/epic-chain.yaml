base_branch: main

anchors:
  north_star: ../NORTHSTAR.md

epics:
  - id: native-python-pipelines-completion
    spec: ../chain.yaml

  - id: native-composition-followup
    spec: ../../native-composition-followup/chain.yaml
    handoff_from_previous:
      require_merged_base: true
      artifacts:
        - path: .megaplan/initiatives/native-python-pipelines-completion/completion-manifest.json
          check: exists

  - id: native-platform-followup
    spec: ../../native-platform-followup/chain.yaml
    handoff_from_previous:
      require_merged_base: true
      artifacts:
        - path: .megaplan/initiatives/native-composition-followup/completion-manifest.json
          check: exists
        - path: docs/arnold/megaplan-composition-conformance-report.md
          check:
            kind: contains_text
            text: "Megaplan composition conformance"

on_failure:
  abort: stop_epic_chain
