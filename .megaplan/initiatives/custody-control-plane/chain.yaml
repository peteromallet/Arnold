  profile: partnered-5
  vendor: codex
  robustness: full
  depth: high
  with_prep: true
  prep_clarify: false
  prep_direction: Start only from M5's accepted Run Authority receipts, zero-divergence
    verification, regenerated manifest, and retirement attestation. Obtain the exact
    landed WBC merge commit from the audited consolidation evidence; never substitute
    a topic branch, working-tree content, or latest ref. Verify commit `24afce006b9ad20391ac7af10ef67ea0b1774f9f`
    and its WBC parent against current main ancestry, proof/support maps, installed/runtime
    revisions, and the ownership record. Do not accept the old four-milestone cloud
