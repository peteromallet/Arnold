base_branch: main
merge_policy: review
prerequisite_policy: required
validation_policy: required
review_policy:
  clean_milestone_pr: manual
anchors:
  north_star: NORTHSTAR.md

launch_preconditions:
  - name: Run Authority three-milestone source lineage exists for reconciliation
    path: .megaplan/initiatives/runauthority-epic/chain.yaml
    check:
      kind: contains_text
      text: '- label: m3-consumers'
  - name: Run Authority manifest claim exists as reconciliation input
    path: .megaplan/initiatives/runauthority-epic/completion-manifest.json
    check:
      kind: contains_text
      text: 'arnold.megaplan.chain_completion_manifest.v1'

milestones:
  - label: m5-run-authority-receipt-reconciliation-and-retirement
    idea: .megaplan/initiatives/custody-control-plane/briefs/m5-run-authority-receipt-reconciliation-and-retirement.md
    branch: megaplan/custody-control-plane/m5-run-authority-receipt-reconciliation-and-retirement
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    with_prep: true
    prep_clarify: false
    prep_direction: >-
      Begin from the three rejected Run Authority completion receipts, their
      authoritative committed ranges and plan artifacts, the current three-
      divergence chain verification, and the now-passing 12/12 M3 reducer suite.
      Reconstruct fresh content-addressed evidence through supported lifecycle
      paths. Treat default shadow completion/backstop modes as a preflight
      blocker and record enforce mode before execution; do not waive, hand-edit,
      relaunch, or extend Run Authority. Only after all proof gates pass, retire
      the exact `runauthority-epic` initiative with its canonical metadata-only
      `.retired` marker and bind that marker into the M5 closeout attestation.
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex +prep. This proof-repair
      sprint may begin with rejected receipts because accepted receipts are its
      deliverable. Manual review/merge must verify three accepted receipts,
      zero divergences, a regenerated manifest, the canonical
      `.megaplan/initiatives/runauthority-epic/.retired` marker, and its
      retirement attestation before the serial chain can admit M6.

  - label: m6-authority-contract-and-residual-inventory
    idea: .megaplan/initiatives/custody-control-plane/briefs/m6-authority-contract-and-residual-inventory.md
    branch: megaplan/custody-control-plane/m6-authority-contract-and-residual-inventory
    profile: partnered-5
    vendor: codex
    robustness: full
    depth: high
    with_prep: true
    prep_clarify: false
    prep_direction: >-
      Start only from M5's accepted Run Authority receipts, zero-divergence
      verification, regenerated manifest, and retirement attestation. Verify
      the current WBC completion manifest, proof/support maps, landed revisions,
      and ownership record; freeze only residual gaps. Capture deterministic
      Transaction Spine and Strategy Roadmap replay fixtures, exact repair
      signatures, legacy paths, and honest unknown baselines for projection I/O,
      compaction, and productive-versus-replayed work. Do not implement a second
      authority kernel, attempt/effect ledger, boundary contract, or status
      authority.
    depends_on:
      - m5-run-authority-receipt-reconciliation-and-retirement
    notes: >-
      Difficulty 5/5; partnered-5/full/high @codex +prep. Read-only contract and
      inventory freeze. M6 must fail closed if M5 evidence, WBC's current
      content-addressed manifest, or the approval record is absent or invalid;
      its manually reviewed handoff gates every implementation milestone.

  - label: m7-controlled-authoritative-writers
    idea: .megaplan/initiatives/custody-control-plane/briefs/m7-controlled-authoritative-writers.md
    branch: megaplan/custody-control-plane/m7-controlled-authoritative-writers
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    prep_clarify: false
    prep_direction: >-
      Start only after M6's manually accepted ownership handoff and accepted
      approval record. Reuse the
      landed Run Authority decisions/fences and WBC execution-attempt/effect
      ledger. Consolidate only residual authority-increasing writers and their
      projection adapters; add immutable attempt-scoped evidence, adoptable
      repair-receipt identity, terminal custody joins, and the append/atomic-
      rebuild projection writer boundary. Reject any design that creates a
      parallel history, transition owner, queue, or lifecycle.
    depends_on:
      - m6-authority-contract-and-residual-inventory
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex. M7 is the first
      implementation milestone and must fail closed unless M5/M6 evidence and
      the approval record remain current. Writer ordering,
      fencing, and partial persistence can pass local tests while duplicating
      effects or advancing global authority.

  - label: m8-runtime-and-boundary-adoption
    idea: .megaplan/initiatives/custody-control-plane/briefs/m8-runtime-and-boundary-adoption.md
    branch: megaplan/custody-control-plane/m8-runtime-and-boundary-adoption
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    prep_clarify: false
    prep_direction: >-
      Consume M7's controlled writer registry and the exact WBC support
      manifest. Migrate only residual runtime, chain, resident, cloud, child-
      lineage, and compatibility adopters. Treat every WBC-owned producer proven
      by its manifest as satisfied evidence, not implementation scope.
    depends_on:
      - m7-controlled-authoritative-writers
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex. Cross-runtime adoption
      and hidden compatibility paths can preserve split authority despite green
      component suites.

  - label: m8a-planner-compiler-and-executor-efficiency
    idea: .megaplan/initiatives/custody-control-plane/briefs/m8a-planner-compiler-and-executor-efficiency.md
    branch: megaplan/custody-control-plane/m8a-planner-compiler-and-executor-efficiency
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    prep_clarify: false
    prep_direction: >-
      Consume M8 exact-version adoption and the captured Transaction Spine and
      Strategy Roadmap fixtures. Implement only Megaplan-domain feasibility and
      efficiency controls: semantic dependency reasons and routing groups,
      critical-path/parallelism/turn-budget gates, complexity splitting,
      deterministic validation jobs, bounded invalid-ref/provider/compaction/
      rework behavior, verify-only repair adoption, and executor circuits. Do
      not move these policies into Run Authority or mutate existing live plans.
    depends_on:
      - m8-runtime-and-boundary-adoption
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex. This is a genuinely
      separate sprint because planner/compiler and executor efficiency policy
      is not authority-kernel or repair-custody scope, and folding it into M8 or
      M10 would create an oversized milestone with misleading local acceptance.

  - label: m9-rebuildable-projections-and-liveness
    idea: .megaplan/initiatives/custody-control-plane/briefs/m9-rebuildable-projections-and-liveness.md
    branch: megaplan/custody-control-plane/m9-rebuildable-projections-and-liveness
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    prep_clarify: false
    prep_direction: >-
      Trace every remaining status, liveness, watchdog, resident, cloud, and
      operator reader from the M6 registry. Prove each is a pure rebuildable
      projection or coherent evidence adapter over one exact-version reducer;
      join productive/replayed task, token, cost, and latency dimensions and
      deterministic auditor reasons. No process, marker, snapshot, or display
      fallback may authorize action.
    depends_on:
      - m8a-planner-compiler-and-executor-efficiency
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex. False liveness and
      optimistic projections are production-incident risks with non-local
      dispatch and repair consequences.

  - label: m10-safe-retry-recovery-and-effects
    idea: .megaplan/initiatives/custody-control-plane/briefs/m10-safe-retry-recovery-and-effects.md
    branch: megaplan/custody-control-plane/m10-safe-retry-recovery-and-effects
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    prep_clarify: false
    prep_direction: >-
      Exercise crash and ambiguity edges across retry, fallback, repair,
      publication, delivery, source/install/retrigger, and provider effects.
      Reuse WBC effect evidence and Run Authority fences; require reconciliation,
      authoritative reread, exact live failure-signature validation, event-
      driven recovery with p95 accepted repair/escalation under five minutes,
      terminal custody, and independent verification before closure. Preserve
      the six-hour pass as a missed-event reconciliation backstop.
    depends_on:
      - m9-rebuildable-projections-and-liveness
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex. Unsafe retry and recovery
      failures are timing-dependent, non-local, and can duplicate irreversible
      effects while ordinary tests stay green.

  - label: m11-conformance-and-legacy-retirement
    idea: .megaplan/initiatives/custody-control-plane/briefs/m11-conformance-and-legacy-retirement.md
    branch: megaplan/custody-control-plane/m11-conformance-and-legacy-retirement
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    prep_clarify: false
    prep_direction: >-
      Close every residual migration-matrix row using exact prerequisite and
      milestone evidence. Run cross-version, replay, projection-rebuild,
      rollback, and zero-bypass gates before proposing removal. Require shadow
      telemetry, both captured-plan replays, idle projection canary, planner/
      executor and repair/worker canaries, installed-runtime provenance,
      controlled deployment evidence, and one genuine blocked-run recovery
      acceptance before retirement. Generate the proof map and completion
      manifest through the chain lifecycle; never hand-author completion evidence.
    depends_on:
      - m10-safe-retry-recovery-and-effects
    notes: >-
      Difficulty 5/5; partnered-5/thorough/high @codex. This milestone can
      remove compatibility paths only after global parity/proof, so erroneous
      acceptance would violate authority invariants across the pipeline.

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain

driver:
  robustness: thorough
  vendor: codex
  phase_timeout: 10800
  auto_approve: false
  require_clean_base: true
  on_escalate: abort
  max_iterations: 60
  poll_sleep: 8.0
  prep_clarify: false
