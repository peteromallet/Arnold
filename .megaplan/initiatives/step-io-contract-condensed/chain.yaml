milestones:
  - label: C1-carrier-reconcile-and-enforce
    idea: .megaplan/initiatives/step-io-contract-condensed/briefs/C1.md
    profile: premium
    vendor: codex
    robustness: thorough
    depth: high
    notes: "Reconcile the two carriers as TWO LAYERS not a data merge: make the StepIOEnvelope decision layer (step_io_contract.py) operate OVER ContractResult (types.py:735) as a thin shared core. WIRE typed Ports produces/consumes enforcement at the executor data seam (arnold/pipeline/executor.py — today only a docstring, never enforces). LIFT the single disk-seam validation chokepoint from arnold/pipelines/megaplan/store/plan_repository.py (read_artifact_json/write_artifact_json) to generic arnold/pipeline/. Give the dead `warn` tier (step_io_policy.py:25/60, currently identical to shadow) a DISTINCT StepIODiagnostic action. Delete legacy dict-building handoff paths. SUBTRACTS (migration built): m0a ContractResult TYPE (types.py:735, all fields + Suspension 11-field envelope), m0b schema_registry.py + validator.py, the full off/shadow/warn/enforce mode ladder w/ eligibility + read_lenient kill-switch (step_io_policy.py), the StepIOEnvelope/Decision decision layer, the StepInvocation seam + fail-closed adapter registry (step_invocation.py). Absorbs the un-built remainder of old m0b/m1/m2 (chokepoint LIFT + port WIRING + warn diagnostic + thin-core reconcile). Carries: 5-tuple seam identity, schema-version retention, gradual-typing eligibility, dogfood kill-switch + engine-self-validates-first, content-addressed JSON-Schema registry. import-topology/contract-boundary → premium planner."

  - label: C2-model-seam
    idea: .megaplan/initiatives/step-io-contract-condensed/briefs/C2.md
    profile: premium
    vendor: codex
    robustness: thorough
    depth: high
    notes: "Lift the model seam to generic arnold and WIRE it live. The machinery is ALREADY BUILT in arnold/pipelines/megaplan/model_seam.py (1694 lines): render_step_message, capture_step_output, real per-family tokenizers (tiktoken o200k_base / HF AutoTokenizer / ceil(utf8/3)+25% byte fallback), media budgets, two-tier trust (BudgetStatus/AuditStatus/TerminalStatus), always-on structural audit (audit_step_payload), one-shot envelope-only repair (repair_attempt>=1 ceiling) → terminal worker_structural_audit_failed. SUBTRACTS old m3's construction. REAL WORK: (a) RELOCATE the family-agnostic core (tokenizer table, budget math, audit, StepInvocation model-adapter) into generic arnold/pipeline/, leaving only megaplan prompt-key/worker specifics in megaplan/; keep token-budget ADJACENT to the contract; (b) WIRE install_model_step_adapter into the live executor/dispatch path (built but no caller today — model adapter not installed into the live invocation flow); (c) close OWN-prompt-assembly coverage + the COMBINED-input budget (system+history+prompt) + the DONT_TOUCH vendored-boundary tripwire + the advisory-evidence-projection cap at source. Carries m3's locked decisions (fail-closed-unknown-family enforced / fail-safe non-enforced, no-deadlock 2-turn ceiling, large-by-ref). import-topology/contract-boundary → premium planner."

  - label: C3-suspend-resume-fanout
    idea: .megaplan/initiatives/step-io-contract-condensed/briefs/C3.md
    profile: partnered
    vendor: codex
    robustness: thorough
    depth: high
    notes: "Generic suspend/resume + suspension-aware fan-out (old m4). SUBTRACTS (migration built): the Suspension interaction-envelope (11 fields, ContractResult, types.py) — DONE; generic arnold/pipeline/contract_reduce.py status lattice completed<suspended<failed MAX_WINS + composite-suspension group + pending_suspensions-never-dropped — DONE; generic arnold/pipeline/pattern_joins.py fan-out reduces ContractResults via reduce_contract_results — DONE; subloop.py already lifts a SUSPENDED child before the legacy GateRecommendation promote — DONE. C3 PLAN_DIR FINDING: the GENERIC runtime resume is NOT plan_dir-coupled — StepwiseDriver.resume(envelope, cursor: ResumeCursorRef) takes an OPAQUE ResumeCursorRef (driver.py:135, resume.py:51, CONTRACT.md), package-level decoupled. plan_dir coupling lives only in the MEGAPLAN adapter (_pipeline/resume.py ResumeCursor.load(plan_dir), _core/workflow.py:612 resume_plan, executor.py:235 check_awaiting_user(plan_dir)). So C3 does NOT grow to decouple the generic protocol; it stays scoped to: composite-cursor cross-process-restart persistence as a GENERIC concern, the targeted+batch composite-resume path driven by simulated fixtures, scoped-suspension-propagation + policy-reduce DESIGNED extension points (not built), and bridging the legacy next=halt/_pipeline_paused + awaiting_user.json side-channel onto the typed Suspension. partnered/thorough/high."

  - label: C4-authoring-api-and-gate
    idea: .megaplan/initiatives/step-io-contract-condensed/briefs/C4.md
    profile: premium
    vendor: codex
    robustness: thorough
    depth: high
    notes: "Authoring-API enforcement (old m7) + hard acceptance gate (old m8). ENFORCE the authoring API's reads/writes (ReadRef/WriteRef exist on stages at types.py:217-218; derive_binding_map exists; binding_map is today 'a Megaplan concern', generic executor enforces nothing): author declares {input contracts, invocation spec (kind + adapter_config — instruction DEMOTED to the model adapter's config), output contract}; runtime handles every crossing; capability declarations (requires-vision/decoder) verified by an `arnold pipeline check` static command (today only a module-validation `check` verb exists at cli/arnold.py, NOT contract-aware). GATE: regression of the 4 motivating failures (wrong-typed passes / char->token overflow / first-key-valid parse / suspended-child-silently-completed) + validation-overhead+concurrency benchmark (10%/500ms/p95-by-size, linear-10 + fanout 8/32/64, gate@32, by-ref sidecar-manifest + hash-on-write) + seam-coverage matrix + the 2nd toy pipeline = the Arnold-native evidence-pack verifier (ingest->parallel_validators->reduce->human_review?->emit_attestation) riding the contract via the authoring API. Frame HONESTLY as correctness/composability-at-scale + SHAPE-not-MEANING limit, NOT a velocity claim. Old m5/m6 migrate load-bearing+long-tail are LARGELY ABSORBED by the migration's phase relocation into arnold/pipelines/megaplan/; FOLD any genuine remainder (residual _normalize_worker_payload / un-migrated parse sites surfaced by the outbound coverage proof) here as a migration-delta task + into C1, NOT their own sprints. acceptance gate is high-stakes → premium/thorough/high."

on_failure:
