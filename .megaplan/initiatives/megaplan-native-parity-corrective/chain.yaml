base_branch: main
anchors:
  north_star: NORTHSTAR.md
launch_preconditions:
- name: end-state report exists
  path: docs/arnold/megaplan-native-representation-report.md
  check:
    kind: contains_text
    text: Native Python Representation Report
- name: current codebase map exists
  path: docs/arnold/megaplan-native-current-codebase-map.md
  check:
    kind: contains_text
    text: Megaplan Native Parity Current Codebase Map
- name: oracle synthesis exists
  path: docs/arnold/megaplan-native-oracle-synthesis.md
  check:
    kind: contains_text
    text: Megaplan Native Parity Oracle Synthesis
- name: corrective plan exists
  path: docs/arnold/megaplan-native-parity-corrective-plan.md
  check:
    kind: contains_text
    text: Megaplan Native Parity Corrective Plan
- name: corrective initiative source is committed and clean
  kind: git_tracked
  path: .megaplan/initiatives/megaplan-native-parity-corrective
- name: corrective plan docs are committed and clean
  kind: git_tracked
  path: docs/arnold/megaplan-native-parity-corrective-plan.md
milestones:
- label: m1-checker-outcomes-builder-slice
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s1-checker-outcomes-builder-slice.md
  profile: partnered-5
  robustness: thorough
  depth: high
- label: m2-front-half-native-loop
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s2-front-half-native-loop.md
  profile: partnered-5
  robustness: full
  depth: high
  depends_on:
  - m1-checker-outcomes-builder-slice
- label: m2-5-boundary-evidence-alignment
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s2-5-boundary-evidence-alignment.md
  profile: partnered-5
  robustness: thorough
  depth: high
  depends_on:
  - m2-front-half-native-loop
- label: m3-tiebreaker-replan-native
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s3-tiebreaker-replan-native.md
  profile: partnered-5
  robustness: full
  depth: medium
  depends_on:
  - m2-5-boundary-evidence-alignment
- label: m4-execute-dag-approval-resume
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s4-execute-dag-approval-resume.md
  profile: partnered-5
  robustness: thorough
  depth: high
  phase_model:
  - execute=codex:gpt-5.5
  - loop_execute=codex:gpt-5.5
  depends_on:
  - m3-tiebreaker-replan-native
- label: m5-review-rework-finalize
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s5-review-rework-finalize.md
  profile: partnered-5
  robustness: full
  depth: medium
  depends_on:
  - m4-execute-dag-approval-resume
- label: m6-override-auto-compat-collapse
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s6-override-auto-compat-collapse.md
  profile: partnered-5
  robustness: thorough
  depth: high
  depends_on:
  - m5-review-rework-finalize
- label: m7-final-conformance-rollout
  idea: .megaplan/initiatives/megaplan-native-parity-corrective/briefs/s7-final-conformance-rollout.md
  profile: partnered-5
  robustness: full
  depth: high
  depends_on:
  - m6-override-auto-compat-collapse
on_failure:
  retry: retry_milestone
  escalate: bump_profile
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: auto
driver:
  auto_approve: true
  max_iterations: 90
  require_clean_base: true
  robustness: full
  poll_sleep: 8.0
