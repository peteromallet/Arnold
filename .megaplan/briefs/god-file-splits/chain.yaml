# God-file splits epic — 3 gated sprints. Direct continuation of `structural-decomposition`
# (which split the other god-files; emitter/edit/apply are the known remainders — m2-emitter
# and m5-agent-edit there STARTED but did not finish these).
#
# Goal: decompose the three remaining god-files — porting/emitter.py (5129L),
# comfy_nodes/agent/edit.py (7236L), porting/edit/apply.py (3009L) — into focused submodules
# with the public surface byte-for-byte identical.
#
# KEYSTONE: the characterization oracle is the behavior gate. Every milestone is
# "behavior-preserving, proven by the gate" (emitter snapshots byte-identical; agent-edit +
# browser-smoke + edit-apply suites green). The gate is the safety net; the PLANNER stays
# premium because the real risk in decomposition is a circular-import / re-export break
# DESIGNED INTO THE PLAN, which the gate cannot catch (the suite stops collecting). This is
# the topological-risk rule carried over from structural-decomposition.
#
# Uniform partnered-5 everywhere (user directive; god-file splits of the core emitter / agent
# editor can pass local tests while causing non-local behavior damage). Per-milestone variation
# is carried by thorough robustness + high depth (deep repo-reading for import-graph reasoning).
# vendor=claude (strong repo-reading + import-topology reasoning).
#
# START STATE: builds on the phase-2 cohesion reorg (PR #114, branch worktree-phase2-reorg) —
# the emitter fork is consolidated, all shims eliminated, identity promoted. base_branch forks
# from worktree-phase2-reorg so the splits stack on the consolidated emitter.
#
# Acceptance gate (every milestone): characterization snapshots no new failures AND
# `make snapshots --check` unchanged (m1) / relevant suites green (m2/m3); `import vibecomfy`
# + full __all__ intact; `lint-imports` green; `make check` green. Sprint branch convention:
# epic/god-file-splits/<milestone-label>. Unattended: merge_policy=auto, auto_approve.
#
# Overall plan difficulty: 5/5; profile: partnered-5; because: god-file splits of the core
# emitter + agent editor can pass local tests while causing non-local behavior damage (emitted
# workflow code consumed downstream, agent-edit contract, edit-application outcomes).

base_branch: worktree-phase2-reorg
merge_policy: auto

anchors:
  north_star: NORTHSTAR.md

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain

driver:
  robustness: thorough
  auto_approve: true

milestones:
  - label: m1-emitter
    idea: .megaplan/briefs/god-file-splits/m1.md
    branch: epic/god-file-splits/m1-emitter
    profile: partnered-5
    vendor: claude
    robustness: thorough
    depth: high
    notes: "Finish structural-decomposition m2-emitter: decompose porting/emitter.py (5129L) into porting/emit/ submodules, public surface byte-identical. The fork consolidation (PR #114) already ported the object-info identity plumbing in — this milestone splits the rest by seam. Behavior gate: characterization emitter snapshots (7-fail/15-pass baseline, no new) + make snapshots --check unchanged. Topological risk => premium planner."

  - label: m2-agent-edit
    idea: .megaplan/briefs/god-file-splits/m2.md
    branch: epic/god-file-splits/m2-agent-edit
    profile: partnered-5
    vendor: claude
    robustness: thorough
    depth: high
    notes: "Finish structural-decomposition m5-agent-edit: decompose comfy_nodes/agent/edit.py (7236L, largest file in repo) by pipeline stage. The grind is the deep test imports of private symbols in the 8k-line test_comfy_nodes_agent_edit.py — the split must preserve importability of every referenced symbol or update those imports. Behavior gate: test_comfy_nodes_agent_edit + backend_spine + browser-smoke 808/808. Preserves headless-safe import. Topological risk => premium planner."

  - label: m3-apply
    idea: .megaplan/briefs/god-file-splits/m3.md
    branch: epic/god-file-splits/m3-apply
    profile: partnered-5
    vendor: claude
    robustness: thorough
    depth: high
    notes: "Decompose porting/edit/apply.py (3009L) — the edit-application pipeline (apply/reject/undo/rebaseline + 15 _resolve_* helpers). If the m4-resolution unification of edit_lint/edit_apply _resolve_* helpers is still open and tractable, fold in; else just decompose. Behavior gate: test_porting_edit_apply + edit_session/ledger green. Topological risk => premium planner."
