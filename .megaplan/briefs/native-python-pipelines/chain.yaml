anchors:
  north_star: NORTHSTAR.md

base_branch: main

seed:
  plan: milestone-1-native-python-20260617-1719

milestones:
  - label: m2-parity-and-small-pilot
    idea: .megaplan/briefs/native-python-pipelines/m2-parity-and-small-pilot.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: native-python-m2-parity-pilot
    notes: "Covers execution-plan Phases 1–2. Build the parity-corpus harness first, then convert the first small Megaplan-backed pipeline (default: folder_audit) to prove the native runtime against real graph-born traces. Kept as one milestone because the pilot validates the corpus and the corpus is meaningless without a real pipeline; scope is bounded to a single small pipeline so the milestone stays ~1.5 weeks."

  - label: m3-megaplan-runtime-hooks
    idea: .megaplan/briefs/native-python-pipelines/m3-megaplan-runtime-hooks.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: native-python-m3-megaplan-hooks
    notes: "Covers execution-plan Phase 3. Implements the Megaplan-specific semantics that the toy runtime did not need: state merge, overrides, step-IO policy, envelope joining, subloop promotion/suspension-lift, and loop guards. Done when a Megaplan-shaped toy pipeline exercises all of these and produces byte-compatible persistence."

  - label: m4-main-megaplan-pipeline
    idea: .megaplan/briefs/native-python-pipelines/m4-main-megaplan-pipeline.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: native-python-m4-main-megaplan
    notes: "Covers execution-plan Phase 4. Rewrite arnold/pipelines/megaplan/pipeline.py as a native @pipeline function, run it side-by-side with the graph executor behind a flag, and require full trace/state/event/artifact parity before native may be used by default. This is the load-bearing conversion; it depends on m3 for all Megaplan hooks."

  - label: m5-parallel-and-human-gates
    idea: .megaplan/briefs/native-python-pipelines/m5-parallel-and-human-gates.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: native-python-m5-parallel-gates
    notes: "Covers execution-plan Phase 5. Add native parallel(...), panel composition, and human-gate suspend/resume primitives, then convert epic_blitz, writing_panel_strict, and select_tournament. Kept separate from m6 because fan-out/fan-in and human gates are the last major runtime capabilities and deserve their own acceptance gate."

  - label: m6-remaining-pipeline-migrations
    idea: .megaplan/briefs/native-python-pipelines/m6-remaining-pipeline-migrations.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: native-python-m6-remaining-pipelines
    notes: "Covers execution-plan Phase 6. Convert the remaining smaller pipelines (creative, doc, simplify_writing, live_supervisor, and any others) one by one with per-pipeline parity tests. Scope is a sweep, but each pipeline is small and independently flag-gated."

  - label: m7-flip-default-and-cleanup
    idea: .megaplan/briefs/native-python-pipelines/m7-flip-default-and-cleanup.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: native-python-m7-flip-cleanup
    notes: "Covers execution-plan Phases 7–8. Make native execution the default for new runs, keep the graph executor as a read-only fallback for old plans, deprecate hand-built graph builders, remove scaffolding, and update docs/skills so the derived graph is the only graph path. Manual merge policy because this milestone changes defaults and deletes code."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: thorough
  auto_approve: true
  max_iterations: 100
  poll_sleep: 8.0
