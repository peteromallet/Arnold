# Epic: Shannon — headless stream-json channel (replace tmux puppeteering).
# Design: docs/shannon-stream-channel-plan.md · Ticket: 01KTVV4ANX9MVKBFPRZX6F1AEH
# Overview + epic-wide invariants: .megaplan/briefs/shannon-stream/00-OVERVIEW.md
#
# DOGFOOD DISCIPLINE (this epic rewrites the worker megaplan uses to drive Claude):
#   - vendor: codex throughout — never drive a rewrite of the Claude/Shannon path WITH that path.
#   - execute pinned to codex (NOT the complexity router, which would send c4/c5 tasks to Claude/Shannon).
#     Pass at chain start: --phase-model execute=codex   (or set per-milestone if the CLI requires).
#   - additive + flag-OFF: the new ShannonStreamWorker is new code beside shannon.py, gated off until M4,
#     so the running engine keeps executing the OLD tmux path through M1-M3.
#   - keep tmux: it is NOT retired in this epic.
#
# DRIVER CHECKOUT (open question — confirm before start): if `chain start` runs the WORKTREE's megaplan as
# the engine, M1's edits to the shared dispatch could affect the running driver. Mitigation in place: M1 is
# behavior-preserving + green-suite-gated and the new path is flag-off. Prefer running the chain from a
# separate known-good engine checkout against this worktree.

base_branch: shannon-stream-epic   # fresh branch off main holding the committed briefs+doc; milestones merge here, off main, for a clean reviewable diff.

milestones:
  - label: M1-invocation-seam   # partnered // full // high
    idea: .megaplan/briefs/shannon-stream/M1-invocation-seam.md
    vendor: codex   # per-milestone (chain reads milestone.vendor, NOT driver.vendor) — dogfood guard
    profile: all-codex   # WAS partnered. partnered tier-routes execute to DeepSeek, whose persistent-session agent bloats to 3-6M tokens >> DeepSeek's 1M window -> reasoning-SSE wedge + corrupted output (cost M1 hours). all-codex = every phase incl. execute/loop_execute on codex (stateless exec, no accumulation, no bloat). Higher quality, all on the codex subscription = dogfood guard intact.
    robustness: full
    depth: high
    notes: "Behavior-preserving refactor: run_step -> WorkerResult hosts Hermes/Codex/Shannon unchanged; add a typed optional rate_limit field; retry-path is the only engine-aware spot. Shared-contract reshape => premium planner (partnered). Green suite + a characterization test are the backstop. Full detail + touchpoints in M1-invocation-seam.md."

  - label: M2-stream-worker   # partnered // full // high (+prep)
    idea: .megaplan/briefs/shannon-stream/M2-stream-worker.md
    vendor: codex
    profile: all-codex   # was partnered; DeepSeek execute bloats >> 1M window (see M1). all-codex = codex everywhere, stateless execute.
    robustness: full
    depth: high
    prep_direction: "Map the NATIVE `claude --print` stream-json event schema on the pinned version (init/assistant/result/rate_limit_event field names, all rate-limit window types, result subtypes) and the existing shannon.py machinery to PORT: session_roulette (/clear,/compact), the env-scrub set, _make_shannon_liveness_probe (the tmux pane-pid channels to re-home onto the subprocess pid). Ignore the bun/tmux launch plumbing being replaced."
    notes: "The core new channel: ShannonStreamWorker (headless --print stream-json) behind M1's seam. ADDITIVE + FLAG-OFF — the engine keeps using the old tmux path. Six parts: launch+scrub+bypass+cwd, parser->result(+rate_limit), multi-turn+resume, permission fail-fast watchdog, liveness re-home to subprocess pid, drift defense (defensive parsing + CI conformance smoke-test + autoupdater lock). Prep ON. Full detail in M2-stream-worker.md."

  - label: M3-rollout   # partnered // full // medium
    idea: .megaplan/briefs/shannon-stream/M3-rollout.md
    vendor: codex
    profile: all-codex   # was partnered; DeepSeek execute bloats >> 1M window (see M1). all-codex = codex everywhere, stateless execute.
    robustness: full
    depth: medium
    notes: "Rollout (4 internal parts, in order): A blunt host-wide concurrency cap (~3, spanning Claude+Codex) REPLACING the governor (deferred); B prove the auth/billing axis on an API key (cost/quota/parity + migration-trigger list); C sampled shadow (<=10% of phases, reuse bakeoff) on DETERMINISTIC artifacts (exit_kind, payload schema validity, landed_diff, worker_did_work) at N>=5; D flag-gated cutover (stream-json default) with per-phase fresh=True on switch + babysit doc rewrite. KEEP TMUX — do NOT retire it. (M3-cap-and-api-adapter + M4-shadow-cutover condensed into this rollout milestone.) Full detail in M3-rollout.md."

# Escalation handled by an EXTERNAL babysit loop (/babysit), not an in-chain human gate.
on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: auto

driver:
  robustness: full
  auto_approve: true
  max_iterations: 80
  poll_sleep: 8.0
  vendor: codex
  prep_clarify: false  # unattended + babysit. Also pass --no-prep-clarify at chain start / set [defaults] prep_clarify=false.
