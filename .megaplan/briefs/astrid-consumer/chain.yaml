# Arnold-side epic: host ASTRID as a first-class capability consumer.
# Runs AFTER the step-io-contract-condensed epic (C1-C4) + the arnold migration land on
# arnold-generalized-pipeline. Builds ON step-io; does not rebuild it. See 00-OVERVIEW.md.
#
# step-io status (mid-flight, near done): C1+C2 landed; C3 (suspend/resume + fan-out + the concrete
# StepwiseDriver) done/landing; C4 (authoring API + acceptance gate) EXECUTING. This epic is SCHEDULED
# to start once step-io C1-C4 has finalized.
#
# RE-GROUND PRECONDITION (read before running): this epic was authored against a CHURNING tree — the
# arnold repo is concurrently running step-io AND a structural-decomposition chain AND m-series
# migration milestones that RELOCATE modules. Every file:line touchpoint in these briefs is
# AS-OF-AUTHORING and DIRECTIONAL, not final. Before AR1 runs, re-verify the touchpoints against the
# LANDED HEAD (prep does most of this); treat the refs as pointers to re-resolve, not addresses.
#
# Stage briefs are referenced by `idea` paths relative to the repo root; they live under
# .megaplan/briefs/astrid-consumer/. NB: not yet committed — commit onto arnold-generalized-pipeline
# (after step-io + migration finalize) before running.

base_branch: arnold-generalized-pipeline

# NB: top-level `defaults:` is NOT a valid chain-spec key (parser rejects it). Per-milestone
# profile/robustness/depth are set on each milestone; vendor/robustness/auto_approve/prep_clarify
# live in the `driver:` block below; merge_policy is top-level. (Matches the working step-io spec.)

milestones:
  - label: AR1-consumer-readiness   # partnered // thorough // medium — the consumer-readiness bundle
    idea: .megaplan/briefs/astrid-consumer/AR1-consumer-readiness.md
    profile: partnered
    vendor: codex
    robustness: thorough
    depth: medium
    notes: "The additive Arnold-side surface a non-megaplan media-producing consumer (Astrid, the 3rd consumer) binds against — three parts in one ~2wk sprint: Part A (PREREQUISITE) media content-types + non-model adapter contract proof; Part B event-journal streaming/paging; Part C (validates last) the importable arnold.conformance package. All additive; touch no frozen contract type. Full detail, file:line, and done-criteria in AR1-consumer-readiness.md."

  - label: AR2-dual-contract-suspension   # premium // thorough // high — the dual-contract resume extension
    idea: .megaplan/briefs/astrid-consumer/AR2-dual-contract-suspension.md
    profile: partnered
    vendor: codex
    robustness: thorough
    depth: high
    notes: "Ticket area D. DEPENDS ON AR1 (re-verifies an edited media produces through AR1's media reference validator). C3 resumes a DECISION STRING; Astrid's gate needs the resume payload to ALSO be a `produces` artifact the human EDITED in the run dir ('the run-dir IS the edit surface'), re-verified through C1's executor seam + chokepoint + structural audit on resume before the step completes — fail-closed on an invalid edit, never modifying the frozen ContractResult/HumanSuspension field set. C3 builds none of this. Full detail and the three resume outcomes in AR2-dual-contract-suspension.md."

  - label: AR3-media-cost-model   # premium // thorough // high — OPTIONAL
    idea: .megaplan/briefs/astrid-consumer/AR3-media-cost-model.md
    profile: partnered
    vendor: codex
    robustness: thorough
    depth: high
    notes: "OPTIONAL (cost half of ticket area E); if descoped, media cost stays opaque-but-documented (CostStatus=unknown, budgets still apply). Cost accounting is TOKEN-ONLY today: CanonicalUsage lives only in the megaplan-coupled module (the generic arnold/agent/agent/usage_pricing.py is a shim re-export), so there is no neutral usage type to extend. Add a NEUTRAL MediaUsage record + per-media-unit pricing in generic arnold/ so media cost is accountable, not opaque; sourced from the AR1 non-model adapter. Full detail in AR3-media-cost-model.md."

# NOTE: on_failure / on_escalate stop_chain is intentional — escalation is handled by an
# EXTERNAL babysit loop (operator wake-up / `/babysit`), NOT a human-review gate inside the chain.
on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: auto

driver:
  robustness: thorough
  auto_approve: true
  max_iterations: 80
  poll_sleep: 8.0
  vendor: claude
  prep_clarify: false  # prep raises blockers as HINTS, never halts at awaiting_human_verify (unattended). Also pass --no-prep-clarify at `chain start`, or set [defaults] prep_clarify=false in ~/.config/megaplan/config.toml — chain.yaml alone may not be honored.
