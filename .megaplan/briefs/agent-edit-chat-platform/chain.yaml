# Agent-edit Chat Platform epic
#
# Source plan: .megaplan/briefs/agent-edit-epic.md
# Contract spine: .megaplan/briefs/agent-edit-contracts.md (§1–§7)
# Detail: agent-edit-session-state.md (M1/M2), agent-edit-chat-interface.md +
#         agent-edit-chat-wireframes.md (M3/M4)
#
# Do NOT start this chain until the user explicitly asks. This file is the durable
# setup artifact only.
#
# PRE-REQ (manual, before the chain): commit today's two live-verified fixes
# (clarify-as-question + redundant post-apply repaint) so the chain starts from a
# clean main. The test-support-leak cleanup is the first chain milestone (m0).
#
# Runs the whole way through with NO human-approval gate: merge_policy=auto
# (milestones auto-merge, no awaiting_pr_merge), auto_approve=true (no iteration-step
# approval), prep_clarify=false on the only prep milestone (M4) so prep never halts at
# awaiting_human_verify. on_failure/on_escalate still abort the chain on a genuine
# error (a safety stop, not a permission gate — babysit re-drives those).
#
# Sequencing principle: establish edit-state consistency + the published contracts
# first; collapse the protocol zoo and freeze the typed result contract second;
# build the persistent conversation layer third; rebuild the visible UI on those
# contracts last. Each milestone publishes a contract section the next consumes.
# Profiles set by a Codex+Opus sizing jury (see agent-edit-epic.md) — every
# milestone is a premium-PLANNER case under the topological-risk rule.

base_branch: main
merge_policy: auto

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain

driver:
  robustness: full
  auto_approve: true
  on_escalate: abort
  max_iterations: 60
  poll_sleep: 8.0

milestones:
  - label: m0-prelaunch-cleanup
    idea: .megaplan/briefs/agent-edit-chat-platform/m0-prelaunch-cleanup.md
    branch: epic/agent-edit-chat/m0-prelaunch-cleanup
    profile: directed
    vendor: codex
    robustness: full
    depth: medium
    notes: "Move tests.support.agent_edit_normalize into production (edit_apply.py:426) so production never imports from tests/. Small but import-topology-sensitive → directed (premium planner per the topological rule; DeepSeek executes the move). Assumes the 2 UI fixes are committed to main first."

  - label: m1-edit-state-authority
    idea: .megaplan/briefs/agent-edit-chat-platform/m1-edit-state-authority.md
    branch: epic/agent-edit-chat/m1-edit-state-authority
    profile: partnered
    vendor: codex
    robustness: full
    depth: high
    notes: "Contracts §1 (one CAS-guarded baseline authority across accept/undo/rebaseline/continue-from-canvas) + §2 (apply-eligibility predicate). Topological: cross-module authority — premium planner. No prep (contract already mapped in contracts.md)."

  - label: m2-typed-contracts-protocol-collapse
    idea: .megaplan/briefs/agent-edit-chat-platform/m2-typed-contracts.md
    branch: epic/agent-edit-chat/m2-typed-contracts
    profile: partnered
    vendor: codex
    robustness: full
    depth: high
    notes: "FIRST collapse the protocol zoo to canonical batch_repl (quarantine delta/full), THEN §3 typed TurnOutcome (incl edit+clarify + per-field FieldChange[]), §4 typed envelope w/ always-non-empty message (synthesizer + two-tier nudge), §6 provider-readiness; de-dup worker/parent message fallback. Parser hardening is the only safe tail-slip. Sharpest topological case — premium planner."

  - label: m3-conversation-slice
    idea: .megaplan/briefs/agent-edit-chat-platform/m3-conversation-layer.md
    branch: epic/agent-edit-chat/m3-conversation-slice
    profile: partnered
    vendor: codex
    robustness: full
    depth: medium
    notes: "SLIM v1 (2026-06-04 scope decision): show the last 5 messages + a link to the session JSON file; minimal localStorage active session_id for refresh-rehydrate; make response.json unconditional + small chat.json; agent memory = last 5 messages (recency only). DEFERRED to tickets: history browser/index.json, per-workflow UUID keying (+graph.extra probe), cross-conversation memory, search, multi-tab. Much smaller than originally scoped — candidate to MERGE into M2 (backend) + M4 (display); decide at finalize. Profile dropped partnered->directed (additive + design resolved)."

  - label: m4-chat-ui
    idea: .megaplan/briefs/agent-edit-chat-platform/m4-chat-ui.md
    branch: epic/agent-edit-chat/m4-chat-ui
    profile: partnered
    vendor: codex
    robustness: full
    depth: high
    with_prep: true
    prep_clarify: false
    prep_direction: "Inspect the live ComfyUI/LiteGraph frontend-hook behavior and version-capability assumptions (graph.clear/configure, onDrawForeground, app.queuePrompt monkey-patch, registerExtension) BEFORE committing the capability/adapter module. Also map which frontend-shadow derivations (structural projection, route fallbacks, queue-blocker normalization, apply booleans) can be deleted now that §2/§4 exist."
    notes: "Full panel rebuild per agent-edit-chat-wireframes.md on M1–M3 contracts; overlay renders the §3 FieldChange contract (kills the flaky preview); frontend-shadow deletion + ONE ComfyUI capability adapter. SPLIT-WATCH: if it overruns, split M4a (adapter) / M4b (visual rebuild) at planning."
