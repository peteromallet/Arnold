base_branch: python-shaped-workflow-authoring-cleanup

milestones:
  - label: m1-component-contract-grammar
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m1-component-contract-grammar.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m1-contract-grammar
    prep_clarify: false
    prep_direction: "Use .megaplan/briefs/workflow-manifest-runtime-cleanup/python-shaped-authoring-production-polish-plan.md as the source of truth. This milestone freezes the import-first component contract, grammar version, file layout, and source-oriented diagnostics contract before compiler implementation. Do not depend on arnold.pipeline.native or reintroduce _pipeline/stages compatibility surfaces."
    notes: "partnered-5/thorough/high. Establish the extensibility and validation contract that every later milestone consumes."

  - label: m2-compiler-core-linear-lowering
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m2-compiler-core-linear-lowering.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m2-compiler-core
    depends_on:
      - m1-component-contract-grammar
    prep_clarify: false
    prep_direction: "Implement the restricted AST-to-arnold.workflow.dsl.Pipeline compiler for the smallest useful linear workflow subset. Imports are the source of truth for steps/prompts/policies/schemas/subflows; compilation must parse and validate source, not execute workflow code."
    notes: "partnered-5/thorough/high. Make the happy path real while keeping runtime manifest-only."

  - label: m3-control-flow-policy-lowering
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m3-control-flow-policy-lowering.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m3-control-flow
    depends_on:
      - m2-compiler-core-linear-lowering
    prep_clarify: false
    prep_direction: "Add branches, decision variables, while-loop/backedge forms, bounded loop policy, retry/timeout/model-routing policy references, suspension, halt, and subworkflow references only where they lower cleanly to existing DSL and WorkflowManifest semantics."
    notes: "partnered-5/thorough/high. This milestone proves Megaplan's complex control flow can be expressed without a second runtime."

  - label: m4-megaplan-component-migration
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m4-megaplan-component-migration.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m4-megaplan-migration
    depends_on:
      - m3-control-flow-policy-lowering
    prep_clarify: false
    prep_direction: "Create arnold_pipelines.megaplan workflows/planning.py as the canonical authored workflow, expose Megaplan steps/prompts/policies through typed component exports, and migrate build_pipeline() to compile from the authored source while preserving manifest identity and behavior."
    notes: "partnered-5/thorough/high. This is the product migration milestone where users should be able to read the real Megaplan workflow."

  - label: m5-validator-cli-ux
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m5-validator-cli-ux.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m5-validator-cli
    depends_on:
      - m4-megaplan-component-migration
    prep_clarify: false
    prep_direction: "Ship source-oriented validation, check/compile/inspect/explain CLI flows, machine-readable diagnostics, and actionable failure messages for humans and agents. The authored workflow remains the product-facing source; generated DSL/manifest internals are backend products."
    notes: "partnered-5/thorough/high. This makes the surface usable and hard to misuse."

  - label: m6-explain-render-shipped-pipelines
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m6-explain-render-shipped-pipelines.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m6-explain-shipped
    depends_on:
      - m5-validator-cli-ux
    prep_clarify: false
    prep_direction: "Add explanation/rendering views that make workflow topology obvious from workflow.py, then migrate or scaffold shipped/example pipelines where appropriate without broadening V1 grammar beyond the settled contract."
    notes: "partnered-5/thorough/high. Polish comprehension and prove the pattern outside the canonical Megaplan pipeline."

  - label: m7-runtime-conformance-installed-artifacts
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m7-runtime-conformance-installed-artifacts.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m7-runtime-conformance
    depends_on:
      - m6-explain-render-shipped-pipelines
    prep_clarify: false
    prep_direction: "Prove runtime equivalence from authored workflow source through DSL, WorkflowManifest, execution journals, resume/suspension, artifact refs, wheel/sdist installs, and negative import gates. No legacy authoring or runtime surfaces may reappear."
    notes: "partnered-5/thorough/high. This is the behavioral proof, not just topology parity."

  - label: m8-generated-assets-merge-result-conformance
    idea: .megaplan/briefs/python-shaped-workflow-authoring/m8-generated-assets-merge-result-conformance.md
    profile: partnered-5
    robustness: thorough
    depth: high
    with_prep: true
    branch: python-shaped-workflow-authoring-m8-generated-conformance
    depends_on:
      - m7-runtime-conformance-installed-artifacts
    prep_clarify: false
    prep_direction: "Run the follow-up generated-assets and merge-result conformance pass that the cleanup chain would have run after M4.5. Regenerate docs, skills, examples, registries/catalogs, CLI snapshots, package ledgers, and manifest identity from the authored Python workflow source."
    notes: "partnered-5/thorough/high. This replaces the premature final conformance pass with one that includes Python-shaped authoring."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: thorough
  auto_approve: true
  max_iterations: 120
  poll_sleep: 8.0
