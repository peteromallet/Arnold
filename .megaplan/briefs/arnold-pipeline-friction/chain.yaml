base_branch: main

milestones:
  - label: m1-unify-graph-type-surface
    idea: .megaplan/briefs/arnold-pipeline-friction/m1-unify-graph-type-surface.md
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    notes: "Architectural hinge. Stabilize the public graph-pipeline authoring surface without polluting the neutral Arnold API. Keep Megaplan-specific runtime concepts on a Megaplan facade/adapter. Fix the SKILL.md template. Add executor fail-fast validation. This unlocks every later sprint."

  - label: m1-5-authoring-contract
    idea: .megaplan/briefs/arnold-pipeline-friction/m1-5-authoring-contract.md
    profile: partnered-4
    robustness: full
    depth: high
    vendor: codex
    notes: "Design gate. Lock the public authoring contract and compatibility matrix: canonical imports, context fields/aliases, stage/port declaration semantics, CLI external input declaration, dry-run artifact contract, and deprecated private import policy. No code changes beyond docs and decision records."

  - label: m2-cli-inputs-and-errors
    idea: .megaplan/briefs/arnold-pipeline-friction/m2-cli-inputs-and-errors.md
    profile: partnered-3
    robustness: full
    depth: medium
    vendor: codex
    notes: "Harden arnold run input parsing and failure reporting. Derive CLI input validation from the external input contract defined in M1.5. Expand _record_error and make the CLI surface the full failure artifact without requiring --verbose."

  - label: m3-examples-and-test-seams
    idea: .megaplan/briefs/arnold-pipeline-friction/m3-examples-and-test-seams.md
    profile: partnered-3
    robustness: full
    depth: medium
    vendor: codex
    notes: "Make examples reliable and expose test seams. Fix jokes import; add a pytest test that loads every example pipeline; add arnold run --dry-run that makes the Megaplan no-worker path render resolved prompts deterministically; ship a MockWorker utility."

  - label: m4-vibecomfy-headless-integration
    idea: .megaplan/briefs/arnold-pipeline-friction/m4-vibecomfy-headless-integration.md
    profile: partnered-4
    robustness: full
    depth: medium
    vendor: codex
    with_prep: true
    prep_direction: "Inspect vibecomfy/comfy_nodes/agent/routes.py and edit.py to understand the import-time route registration and the handle_agent_edit contract. Also inspect arnold/pipelines/vibecomfy_executor (if it exists) to decide whether the new bridge replaces, wraps, or complements it. Identify the minimal refactor that makes the edit core importable outside ComfyUI."
    notes: "Cross-repo integration sprint. Make VibeComfy's handle_agent_edit importable headlessly, document the contract, ship a stub client, and add a reference Arnold pipeline that edits a workflow without a live ComfyUI server. Explicitly decide reuse vs new integration for any existing vibecomfy_executor."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: full
  auto_approve: true
  max_iterations: 80
  poll_sleep: 8.0
