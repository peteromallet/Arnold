base_branch: main

anchors:
  north_star: NORTHSTAR.md

milestones:
  - label: m1-main-preservation-audit
    idea: .megaplan/briefs/pristine-agent-architecture-followup/m1-main-preservation-audit.md
    branch: epic/pristine-agent-architecture-followup/m1-main-preservation-audit
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Inventory what current main already contains from M1/M3-M7 and lock preservation criteria before touching code."

  - label: m2-contract-guardrail-tightening
    idea: .megaplan/briefs/pristine-agent-architecture-followup/m2-contract-guardrail-tightening.md
    branch: epic/pristine-agent-architecture-followup/m2-contract-guardrail-tightening
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Strengthen backend/public contract and compatibility checks without changing messaging render semantics."

  - label: m3-non-messaging-boundary-hardening
    idea: .megaplan/briefs/pristine-agent-architecture-followup/m3-non-messaging-boundary-hardening.md
    branch: epic/pristine-agent-architecture-followup/m3-non-messaging-boundary-hardening
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Preserve M5/M6 architecture cleanup for status poller, composer, candidate selectors, session/audit ownership, and CLI debug boundaries. Avoid transcript/detail ownership."

  - label: m4-doc-artifact-ledger-finalization
    idea: .megaplan/briefs/pristine-agent-architecture-followup/m4-doc-artifact-ledger-finalization.md
    branch: epic/pristine-agent-architecture-followup/m4-doc-artifact-ledger-finalization
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Finalize architecture docs, artifact manifest, compatibility ledger, and root cleanup policy against the actual final code."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: full
  auto_approve: true
  max_iterations: 80
  poll_sleep: 8.0
