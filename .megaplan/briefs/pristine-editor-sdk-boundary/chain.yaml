    profile: partnered-5
    vendor: codex
    robustness: full
    depth: high
    notes: "partnered-5 @codex. Hard prerequisite: remove all src/tools/video-editor imports from the SDK and move portable contracts into SDK-owned modules."

  - label: m1-family-contract-and-maturity-model
