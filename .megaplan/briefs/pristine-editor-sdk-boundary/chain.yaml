    vendor: codex
    robustness: full
    depth: high
    notes: "partnered-5 @codex. Splits src/sdk/index.ts into scoped family modules and removes video-editor imports from the SDK."

  - label: m2-host-family-adapter-registry
    idea: .megaplan/briefs/pristine-editor-sdk-boundary/m2-host-family-adapter-registry.md
