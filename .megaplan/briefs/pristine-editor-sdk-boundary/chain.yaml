    profile: partnered-5
    vendor: codex
    robustness: full
    depth: high
    notes: "partnered-5 @codex. Defines the canonical family registry and maturity model before the SDK barrel split."

  - label: m1-sdk-boundary-and-family-modules
    idea: .megaplan/briefs/pristine-editor-sdk-boundary/m1-sdk-boundary-and-family-modules.md
