base_branch: main

anchors:
  north_star: NORTHSTAR.md

milestones:
  - label: m1-state-compartments
    idea: .megaplan/briefs/messaging-boundary-cleanup-v2/m1-state-compartments.md
    branch: epic/messaging-boundary-cleanup-v2/m1-state-compartments
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Trace frontend state writes from websocket, batch_turns, submit, lifecycle, and rehydrate. Define durable transcript/detail/execution/audit buckets before changing render behavior."

  - label: m2-render-boundary
    idea: .megaplan/briefs/messaging-boundary-cleanup-v2/m2-render-boundary.md
    branch: epic/messaging-boundary-cleanup-v2/m2-render-boundary
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Make normal chat and expanded detail rendering consume only TranscriptMessage and ResponseDetail selectors. Preserve explicit audit/debug affordances."

  - label: m3-rehydrate-projection
    idea: .megaplan/briefs/messaging-boundary-cleanup-v2/m3-rehydrate-projection.md
    branch: epic/messaging-boundary-cleanup-v2/m3-rehydrate-projection
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Project persisted/backend chat state into safe transcript/detail contracts before browser consumption. Frontend filtering is only a second line of defense."

  - label: m4-guardrails-validation
    idea: .megaplan/briefs/messaging-boundary-cleanup-v2/m4-guardrails-validation.md
    branch: epic/messaging-boundary-cleanup-v2/m4-guardrails-validation
    profile: partnered-5
    robustness: full
    depth: high
    vendor: codex
    with_prep: true
    prep_direction: "Add sentinel tests and docs/ledger updates proving raw execution fields cannot enter normal UI paths. Keep docs edits small for merge compatibility."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: full
  auto_approve: true
  max_iterations: 80
  poll_sleep: 8.0
