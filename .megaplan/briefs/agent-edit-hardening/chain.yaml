# Agent-edit Hardening epic
#
# Successor to agent-edit-chat-platform (m0-m4, PRs #50/#51/#54/#55/#56) and
# agent-edit-structural (m1 #58, m2 #59), plus ~23 live-forensics fix rounds on main
# (8a88615..52d11e2+). Live testing on :8199 mapped the remaining gremlin habitats:
#   1. response-shape duck-typing (broke 4x: rounds 13/17/18/19)
#   2. stage-asymmetric payload wiring (submit got recovery; accept didn't)
#   3. whole-graph-hash accept brittleness ("Apply doesn't work" — any unrelated canvas
#      activity invalidates every pending candidate)
#   4. 9.5k-line god-file with 14 per-module-copy mutable globals (round 9 proved double
#      evaluation happens in production)
#   5. layout/scroll/geometry bugs structurally invisible to the jsdom harness (5 shipped
#      bugs with green suites)
# This epic fixes the classes, not instances: m1 typed contract (kills 1+2), m2 scoped
# apply (kills 3 — the centerpiece), m3 module split + state consolidation (kills 4),
# m4 real-browser tier (kills 5).
#
# Handoff artifacts: m1 publishes docs/agent-edit-response-contract.md which m2 extends;
# m3 is behavior-preserving behind the characterization suites; m4 is additive.
#
# Dials (difficulty-not-stakes): m1/m2 partnered (novel cross-cutting design; m2 depth
# high — touched-region semantics are the load-bearing decision). m3 directed (premium
# plans the seams + state consolidation; execution mechanical behind a hard green gate).
# m4 directed +prep (boot-path discovery for ComfyUI-under-Playwright). vendor=codex
# throughout (consistent with both prior epics on this repo; DeepSeek direct execute has
# a known stream-stall hazard on this repo's large-file contexts — babysit playbook:
# `megaplan override set-model --phase execute --model codex:gpt-5.5` on stall).
#
# Unattended: merge_policy=auto, auto_approve, prep_clarify=false where prep runs.

base_branch: main
merge_policy: auto

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain

driver:
  robustness: full
  phase_timeout: 10800
  auto_approve: true
  on_escalate: abort
  max_iterations: 60
  poll_sleep: 8.0

milestones:
  - label: m1-typed-response-contract
    idea: .megaplan/briefs/agent-edit-hardening/m1-typed-response-contract.md
    branch: epic/agent-edit-hardening/m1-typed-response-contract
    profile: partnered
    vendor: codex
    robustness: full
    depth: medium
    notes: "Discriminated outcome.kind on every response; single client normalization boundary (snake->camel, recovery payloads, legacy adapter); delete all field-sniffing; symmetric submit/accept failure surfaces. Publishes docs/agent-edit-response-contract.md (m2's input). Depth medium: union + boundary placement are real but mostly locked decisions."

  - label: m2-scoped-apply
    idea: .megaplan/briefs/agent-edit-hardening/m2-scoped-apply.md
    branch: epic/agent-edit-hardening/m2-scoped-apply
    profile: partnered
    vendor: codex
    robustness: full
    depth: high
    with_prep: true
    prep_clarify: false
    prep_direction: "Map the accept path in vibecomfy/comfy_nodes/agent_edit.py: where the submit-time graph hash is recorded, where accept compares it against the live canvas hash, where delta ops + their old values are recorded (change_details operations vs before.py/baseline), and how the in-place apply/configure writes onto the live graph. Also locate the uid/id alias map added for endpoint resolution. Ignore the LLM provider/prompting side entirely."
    notes: "The centerpiece: touched-region validation replaces whole-graph hash equality at accept; delta application onto the live graph; humanized named-field conflicts wired to the existing rebaseline recovery; post-apply verification. Depth high: the touched-region semantics are the load-bearing design decision."

  - label: m3-module-split
    idea: .megaplan/briefs/agent-edit-hardening/m3-module-split.md
    branch: epic/agent-edit-hardening/m3-module-split
    profile: directed
    vendor: codex
    robustness: full
    depth: medium
    notes: "Behavior-preserving decomposition of the 9.5k-line panel file along locked seams + ALL module-global state into the page singleton runtime namespace. Premium plans the seams/load-order; execution is mechanical behind the characterization gate (suites green with no assertion changes, double-evaluation test, debug-hook shape frozen)."

  - label: m4-real-browser-tier
    idea: .megaplan/briefs/agent-edit-hardening/m4-real-browser-tier.md
    branch: epic/agent-edit-hardening/m4-real-browser-tier
    profile: directed
    vendor: codex
    robustness: full
    depth: low
    with_prep: true
    prep_clarify: false
    prep_direction: "Verify how scripts/run_local_agent_comfy.sh boots ComfyUI (env, port selection, vendored frontend) and whether it can run headless without models present; survey where a fixture/mock agent provider would hook into the agent route registration in vibecomfy/comfy_nodes/ (env-flag gated); inventory which recorded response.json shapes under out/editor_sessions cover the scenario list so they can be copied into committed fixtures."
    notes: "Playwright+Chromium tier against the real server with a fixture provider: mount/scroll/layout/overlay-geometry/console-sweep specs covering the bug class jsdom structurally cannot see. Additive only."
