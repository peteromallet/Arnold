base_branch: main

milestones:
  - label: m0-baseline-inventory-ratchets
    idea: .megaplan/briefs/arnold-complete-cleanup-single-root/m0-baseline-inventory-ratchets.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: cleanup-single-root-m0-baseline-ratchets
    prep_clarify: false
    prep_direction: "Start from the post-native-completion local main. Verify the cleanup ledger, current git/worktree state, ticket 01KVZZ45DAZW9P5H4JA66JWNY3, and external exceptions. Build the legacy caller/surface inventory and shrink-only ratchets before moving implementation code."
    notes: "Baseline plus guardrails. Expected to be days, not two weeks, unless inventory reveals a major unknown."

  - label: m1-authority-and-extraction
    idea: .megaplan/briefs/arnold-complete-cleanup-single-root/m1-authority-and-extraction.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: cleanup-single-root-m1-authority-extraction
    depends_on:
      - m0-baseline-inventory-ratchets
    prep_clarify: false
    prep_direction: "Make arnold_pipelines.megaplan authoritative for imports, side effects, public surfaces, and runtime responsibilities. Extract legacy _pipeline/runtime responsibilities into named canonical modules. Do not recreate a final arnold_pipelines.megaplan._pipeline namespace and do not shim to missing targets."
    notes: "The load-bearing migration. This is the only milestone likely to approach a full two-week sprint."

  - label: m2-parity-and-delete
    idea: .megaplan/briefs/arnold-complete-cleanup-single-root/m2-parity-and-delete.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: cleanup-single-root-m2-parity-delete
    depends_on:
      - m1-authority-and-extraction
    prep_clarify: false
    prep_direction: "Prove canonical behavior through CLI, chain, resume/status, PR helpers, workers, engine isolation, discovery, docs, skills, generated assets, editable install, and wheel install. Then delete or intentionally fail the legacy arnold.pipelines.megaplan import path. Preserve no permanent shims."
    notes: "Behavior proof plus clean-break deletion. Do not delete before parity gates are green."

  - label: m3-merge-result-closeout
    idea: .megaplan/briefs/arnold-complete-cleanup-single-root/m3-merge-result-closeout.md
    profile: partnered-5
    vendor: codex
    robustness: thorough
    depth: high
    branch: cleanup-single-root-m3-closeout
    depends_on:
      - m2-parity-and-delete
    prep_clarify: false
    prep_direction: "Run only post-merge conformance on the integrated result and close remaining external cleanup exceptions. Verify old TypeScript Arnold snapshot archival/deletion and active operational worktree cleanup triggers."
    notes: "Short closeout gate. This should be measured in hours to days, not a full sprint."

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: review

driver:
  robustness: thorough
  auto_approve: true
  max_iterations: 120
  poll_sleep: 8.0
