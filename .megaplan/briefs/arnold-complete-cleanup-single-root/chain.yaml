    vendor: codex
    robustness: thorough
    depth: high
    branch: cleanup-single-root-m0-baseline
    prep_clarify: false
    prep_direction: "Start from the post-native-completion local main. Verify the cleanup ledger, current git/worktree state, ticket 01KVZZ45DAZW9P5H4JA66JWNY3, and remaining external exceptions. Do not begin code migration before the baseline and loose-work disposition record are machine-checkable."
    notes: "Turns the prior cleanup decisions into an enforceable baseline and closes non-product loose work decisions."

  - label: m1-inventory-ratchets
