# Epic: scratchpad-emitter — VibeWorkflow IR <-> ComfyUI UI/litegraph JSON (round-trip)
#
# GOAL: MAKE THE ROUND-TRIP WORK. Take a ComfyUI workflow into VibeComfy Python and back to
# editor-openable UI JSON, (a) preserving the original node positions + editor furniture AS WELL
# AS POSSIBLE when that data exists (best-effort maximized, graceful degradation — never required),
# (b) placing any genuinely-new nodes in sensible spots, and (c) producing a clean, sensible
# layout for Python-authored code that has NO positioning metadata at all.
#
# PRIMARY USER: editor-first ComfyUI users — they live in the graph editor, share .json, and
# treat node positions as sacred. The UI JSON is therefore a FIRST-CLASS artifact, not a
# disposable view. Python owns structure; the editor owns layout; the latest editor layout wins.
#
# This supersedes the 2026-05-25 design after a 14-subagent robustness review
# (see .megaplan/ideas/scratchpad-emitter/ROBUSTNESS-REVIEW-2026-05-28.md). The original M1
# (renderer + identity stamp + isomorphism parity) is MERGED (PR #18) but did NOT deliver a
# working position round-trip: ir_node_id is write-only, ingest discards pos/groups/furniture,
# emit always re-grids via a stub, and `port export --to ui` is unwired. The revised chain below
# inserts the real foundation (persistent identity + lossless ingest) and promotes preserve.
#
# Sequential by construction: m1.5 is a walking skeleton that proves the whole loop end-to-end on one
# workflow with everything stubbed (its stubs ARE the later milestone seams); m3 emits what m2 captures;
# m4 gives m5 its new-node placement primitive; m5 preserves using m2's identity + m4's placement; m6
# documents/guards all of it.
#
# IDENTITY (U1 resolution, CORRECTED by Phase-B adversarial review): the per-node uid is EXTRINSIC and
# ASSIGNED-ONCE, carried IN the artifacts (properties["vibecomfy_uid"] in JSON + an explicit uid= kwarg
# in the .py, the same mechanism as the existing id="98"). It is NEVER derived from content: a structural/
# WL hash folds in widget values + neighbors, so it would change the uid on the exact edits users make
# (widget tweak, node insertion) and lose the position preserve exists to protect. Minting (first
# appearance only) uses a stable extrinsic seed (explicit id / authored source order / a MONOTONIC
# never-reused per-workflow counter for runtime add_node) -> deterministic for no-metadata code AND
# edit-invariant AND safe for AI-agent structural edits (the gap-filling _next_node_id reuses ints, so
# uid must NOT key off them). Structural hashing is the M5 legacy bridge only. The emitted .json is
# self-describing (uid+pos inside it); the sidecar is only the .py form's regenerable layout cache.
#
# PHASE C ("go all the way", 2026-05-29) baked six more decisions into the milestones:
#  1. Get/SetNode/Reroute virtual wires are first-class LAYOUT FURNITURE (M2 capture, M3 emit, M5
#     preserve); execution plane still resolves them. `port convert --keep-virtual-wires` controls whether
#     they also appear as explicit nodes in the .py. (723 in the corpus — silently shattered today.)
#  2. Widget-count CRASH fix is M3's first task / carried by M1.5 — count via object_info_widget_order
#     (encodes ComfyUI's trailing seed/upload slots); downgrade the fatal assert to a report warning.
#     (~30% of the corpus crashes emit today.)
#  3. Bypass/mute (mode) resolved end-to-end: execution IR data (M2) + compile drop/rewire + editor
#     re-emit (M3); parity gate updated to expect it.
#  4. Coordinate canonicalization is a CONTRACT (fixed precision) — 96% of corpus pos are floats, so
#     "byte-identical" = "canonicalized-identical".
#  5. Pass ALL unknown per-node properties through verbatim (cnr_id/ver/mask-data/...) + capture the IR's
#     pre-emit losses or scope them loudly.
#  6. AI-agent persona made first-class: monotonic uid minting + an agent-edit-safety test + docs.
# See ROBUSTNESS-REVIEW-2026-05-28.md "PHASE C ADDENDUM" for the verified corpus numbers.
#
# PHASE D ("unknown unknowns", 2026-05-29): 10 exploration agents + 9 "way-through" agents found that the
# plan was aimed slightly wrong and flying without instruments. THE KEYSTONE that dissolves half the
# findings: the vendored ComfyUI (vendor/ComfyUI, a pinned submodule, pip-installs as `comfyui`, CPU-only,
# torch-free, OFFLINE) is the universal backend. Stop reverse-engineering a snapshot; CALL ComfyUI's own
# code in-process via an optional `vibecomfy[comfy]` extra + a memoized `vibecomfy/comfy_backend.py`:
#   - convert_ui_to_api (workflow_convert.py:1122) = the REAL, non-self-referential oracle (we already call
#     it at normalize.py:41-46 but SWALLOW errors into our own fallback — make it primary, let it raise);
#   - live object_info from the booted registry (real provenance for the 838 null-provenance core classes);
#   - ComfyUI's own subgraph EXEC-ID locator "graphUuid:localId" (workflow_convert.py:74) = adopt as identity;
#   - PNG "workflow"/"prompt" tEXt chunks (base_nodes.py:1799) = ingest via PIL .text[], ~15 LOC.
# Seven more decisions baked into the milestones (see WAY-THROUGH-2026-05-29.md + UNKNOWN-UNKNOWNS doc):
#   7.  Subgraph-SCOPED identity (path: scope_key:local_uid; scope_key = name+structural-hash, NOT the
#       volatile UUID; degrades to the flat scalar for top-level). Deepcopy `definitions` BEFORE the
#       helper resolver deletes inner nodes. Adopt ComfyUI's locator; flat uid was born obsolete (#1).
#   8.  Namespace all our keys under properties["vibecomfy"] (one key to survive a future frontend zod
#       .strict()); emit schema version 1.0 not 0.4; preserve cnr_id/aux_id/ver verbatim-and-valid;
#       add a zod CONFORMANCE gate (#2).
#   9.  PNG/WebP is a first-class CONTAINER; ingest is an M2 acceptance criterion (the primary user's
#       inbound artifact is a PNG), emit trails to M5/M6; also emit an A1111 `parameters` provenance
#       string since Civitai/OpenArt strip the workflow chunk (#3).
#   10. NEW milestone M7 — the in-editor surface (custom-node + server route + JS preview/diff over the
#       SAME engine). The comfyui.custom_nodes entry point is a PHANTOM (module absent on disk); the
#       editor-first primary user never runs a CLI, so the round-trip is invisible to them without it (#4).
#   11. Wire the already-computed recovery_report to the CLI + persist out/roundtrips/<id>/report.json;
#       provenance in the artifact; --dry-run DEFAULT + auto-backup + never-overwrite-input (#5/#7).
#   12. Untrusted-input-compiler security: ONE CONFIRMED RCE (emitter.py:2858 interpolates attacker-
#       controlled subgraph raw_name into an unescaped docstring -> exec_module). Escape free-text (first
#       fix, ~15 LOC) + path-confine all write bases + sandbox the validation exec in a subprocess (#6).
#   13. integer-snap coordinate canonicalization (idempotent + json-bit-stable); store GC/version/migrate
#       + dogfood corpus + emit->re-emit x50 convergence test (#9); bypass firewall lands atomically with
#       a snapshot re-baseline; identity unification (vibecomfy_uid authoritative, demote ir_node_id) (#10);
#       a Tier-0 layout-diff oracle (Δpos==0 on matched uids) = the falsifiable definition of "faithful"
#       the parity gate structurally cannot express (#11).

# M0 GATE (not a milestone): do NOT start until the excellence-epic IR-contract sprint is properly
# landed. Clarity-phase K2 (2026-05-28) found this gate is NOT yet satisfied: the m3-seams-ir sprint
# work (T1-T15) is uncommitted in the working tree, T16-T26 are pending, PR #26 targets
# `fix/emitter-revert-block-a-regressions` (NOT main) and carries only the init commit, and the suite
# is red at collection. Before forking: commit T1-T15, retarget PR #26 to main, land T16-T26, and get
# the offline suite green. K2 also confirmed (in the working tree) set_input now RAISES on unregistered
# inputs and _next_node_id GAP-FILLS (lowest-unused) -> integer ids are reused on delete+add, so
# identity must key on the durable uid (a real VibeNode field), never the int id.
base_branch: main           # must include the merged m3-seams-ir IR contract (vibecomfy/contracts/ir.py)

milestones:
  - label: m1_5-walking-skeleton
    idea: .megaplan/ideas/scratchpad-emitter/m1_5-walking-skeleton.md
    branch: epic/scratchpad-emitter-m1_5-skeleton
    profile: partnered        # tier 3 — thinnest end-to-end vertical slice through identity+capture+emit+restore.
    robustness: full          # de-risks the whole loop (incl. the keystone against the REAL editor) before the layers are built.
    depth: high               # everything non-essential is stubbed; its seams ARE the later milestone boundaries (zero rework).

  - label: m2-identity-and-ingest
    idea: .megaplan/ideas/scratchpad-emitter/m2-identity-and-lossless-ingest.md
    branch: epic/scratchpad-emitter-m2-identity
    profile: premium          # tier 4 — the REAL foundation: a durable node UUID + lossless ingest that
    robustness: thorough      # everything downstream trusts. A wrong identity model silently loses layout corpus-wide.
    depth: high
    critic: cross             # second mind on the identity/persistence data model before code builds on it

  - label: m3-emitter-completion-and-oracle
    idea: .megaplan/ideas/scratchpad-emitter/m3-emitter-completion-and-oracle.md
    branch: epic/scratchpad-emitter-m3-emitter
    profile: partnered        # tier 3 — wire `port export --to ui`, emit captured furniture, swap to the
    robustness: full          # pinned provider, and stand up an INDEPENDENT object_info-backed oracle.
    depth: high

  - label: m4-layout-engine
    idea: .megaplan/ideas/scratchpad-emitter/m4-layout-engine.md
    branch: epic/scratchpad-emitter-m4-layout
    profile: partnered        # tier 3 — REQUIRED fresh layout for no-metadata code + the constrained
    robustness: full          # placement primitive m5 reuses. Robust-and-simple, not over-engineered.
    depth: high

  - label: m5-preserve-roundtrip
    idea: .megaplan/ideas/scratchpad-emitter/m5-preserve-roundtrip.md
    branch: epic/scratchpad-emitter-m5-preserve
    profile: premium          # tier 4 — the HEADLINE: position/furniture-faithful round-trip. Trust-critical;
    robustness: full          # losing a hand-arranged position is a GATE FAILURE, not accepted best-effort.
    depth: high
    critic: cross

  - label: m6-productionize
    idea: .megaplan/ideas/scratchpad-emitter/m6-productionize.md
    branch: epic/scratchpad-emitter-m6
    profile: directed         # tier 2 — CLI/docs/test-floor wiring; smart plan, cheap execute.
    robustness: light
    depth: medium

  - label: m7-in-editor-surface
    idea: .megaplan/ideas/scratchpad-emitter/m7-in-editor-surface.md
    branch: epic/scratchpad-emitter-m7-editor
    profile: partnered        # tier 3 — Phase-D: the round-trip reaches its PRIMARY user (editor-first, never runs a CLI).
    robustness: full          # custom-node + server route + JS preview/diff over the SAME engine; the biggest scope add.
    depth: high               # after M5 (nothing to show in-editor until positions survive); seed the live entry point in M1.5.

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain
merge_policy: auto            # auto-merge each milestone's PR; the chain self-drives unattended end to end

driver:
  robustness: standard
  auto_approve: true
  max_iterations: 60
  poll_sleep: 8.0
