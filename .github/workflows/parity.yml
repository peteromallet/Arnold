name: canonical-parity

on:
  push: {}
  pull_request: {}

jobs:
  canonical-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        # Use the checked-in lockfile. A fresh resolve spans every declared
        # Python version; this parity job only needs dev deps.
        run: uv sync --frozen --extra dev

      - name: Check canonical ready-template parity
        run: uv run --frozen make PYTHON=.venv/bin/python root-clean parity
