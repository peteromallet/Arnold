name: Shannon Stream Conformance

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Runner label with a logged-in Claude Code CLI"
        required: true
        default: "self-hosted"
      claude_bin:
        description: "Pinned/local Claude binary path or command"
        required: true
        default: "claude"

jobs:
  conformance:
    runs-on: ${{ inputs.runner_label }}
    env:
      MEGAPLAN_SHANNON_STREAM_CONFORMANCE: "1"
      MEGAPLAN_SHANNON_STREAM_CLAUDE_BIN: ${{ inputs.claude_bin }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[agent]'
      - name: Run live Shannon stream conformance
        run: python -m pytest tests/test_shannon_stream_conformance.py -q
