# Maintained CI suite.
#
# Runs on every push and on every pull_request.
#
# Steps:
#   1. Checkout (fetch-depth: 2 so PR diffs see the merge base if needed).
#   2. Install uv.
#   3. Install the package plus the pinned AppMana ComfyUI optional dependency
#      used by the oracle converter.
#   4. Run `make ci`, the shared local/GitHub contract for root hygiene, the
#      maintained Python suite, browser smoke, snapshot freshness, and the Comfy
#      oracle gate.
#   5. Upload coverage.xml as a workflow artifact.
#
# Branch protection on `main` requires repo-admin action and is tracked as a
# user_action; this workflow only exposes the `test` status check.

name: ci

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          uv venv --seed
          make PYTHON=.venv/bin/python install-ci

      - name: Run maintained repo gate
        # Makefile is the local/GitHub contract for repo hygiene, Python tests,
        # browser smoke, snapshot freshness, and the Comfy oracle.
        run: make PYTHON=.venv/bin/python ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
