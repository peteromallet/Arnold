name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[agent]'
      - name: Check generated Arnold docs
        run: python scripts/generate_arnold_docs.py --check
      - name: Validate Arnold generated examples
        run: MEGAPLAN_MOCK_WORKERS=1 pytest tests/test_generate_arnold_docs.py tests/docs/test_arnold_external_builder.py -q
      - name: Validate M7 default-off and export regressions
        run: |
          unset MEGAPLAN_M7_SINKS
          MEGAPLAN_MOCK_WORKERS=1 pytest tests/test_epic_cli.py tests/store/test_capsule_storage.py tests/store/test_warrant_sources.py tests/test_warrant_signing.py -q
      - name: Test default-off suite
        run: MEGAPLAN_MOCK_WORKERS=1 pytest -m "not slow" -q

  docker-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[agent]'
      - name: Run Docker-dependent tests (best-effort)
        continue-on-error: true
        run: pytest -m slow tests/test_cloud_docker_build.py -q
