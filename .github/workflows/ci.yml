# Fast CI suite.
#
# Runs on every push and on every pull_request so the snapshot-bypass
# step can read either `head_commit.message` (populated on push) or
# `pull_request.title` / `pull_request.labels` (populated on PRs).
#
# Steps:
#   1. Checkout (fetch-depth: 2 so PR diffs see the merge base if needed) with
#      submodules: recursive so vendor/ComfyUI is available for the oracle gate.
#   2. Install uv.
#   3. Install the package plus the small set of vendored-ComfyUI import
#      dependencies required to import the pinned workflow converter.
#   4. Fast suite with coverage. The coverage floor is enforced via
#      [tool.coverage.report] fail_under in pyproject.toml; no --cov-fail-under
#      override is needed here.
#   5. Snapshot regenerator --check, with a multi-event bypass: if the push
#      commit message, PR title, or PR labels contain a `snapshots:` tag
#      (or a `snapshots` label), the check is skipped so intentional snapshot
#      refreshes do not need to fight CI.
#   6. Oracle gate: runs Layer-3 corpus-wide convert_ui_to_api gate against the
#      vendored ComfyUI submodule with VIBECOMFY_COMFY_SMOKE=1.  Fails loudly
#      (not skip) when vendor/ComfyUI is missing or the converter is
#      incompatible, so drift against the pinned oracle commit is never silent.
#   7. Upload coverage.xml as a workflow artifact.
#
# Branch protection on `main` requires repo-admin action and is tracked as a
# user_action; this workflow only exposes the `test` status check.

name: ci

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: 'recursive'

      - name: Set up uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          uv venv --seed
          .venv/bin/python -m pip install -e ".[dev,runpod-launch]"
          .venv/bin/python -m pip install "lazy-object-proxy>=1.10" "frozendict>=2.4" "pillow>=10" "ConfigArgParse>=1.7.1"

      - name: Run fast suite with coverage
        # The repository contains broad aspirational and retired suites that are
        # tracked separately from the maintained PR gate. Keep this job focused
        # on the green core surface; strict-ready and canonical parity run in
        # dedicated workflows.
        run: |
          .venv/bin/pytest -q --tb=short \
            tests/test_cli_loader.py \
            tests/test_scratchpad_loader.py \
            tests/test_virtual_wire_round_trip.py \
            tests/test_strict_ready.py \
            tests/test_strict_ready_gate.py \
            tests/test_porting_workbench.py \
            tests/test_porting_inventory.py \
            tests/test_cli_misc.py \
            tests/test_cli_sources_workflows_nodes.py \
            tests/test_porting_convert.py \
            tests/test_plugin_discovery.py \
            tests/test_agent_acceptance.py \
            --cov=vibecomfy \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=0

      - name: Check snapshot freshness
        # Bypass when the push commit message, PR title, or PR labels
        # contain a `snapshots:` tag (or a `snapshots` label) so
        # intentional refreshes do not fight CI.
        if: |
          !(
            contains(github.event.head_commit.message, 'snapshots:') ||
            contains(github.event.pull_request.title, 'snapshots:') ||
            contains(toJson(github.event.pull_request.labels), 'snapshots')
          )
        run: .venv/bin/python scripts/regenerate_snapshots.py --check

      - name: Run oracle gate (Layer-3 convert_ui_to_api corpus gate)
        # Requires the vendored ComfyUI submodule.  Fails loudly when the
        # submodule is missing or the converter is incompatible, so drift
        # against the pinned oracle commit is never silent.
        env:
          VIBECOMFY_COMFY_SMOKE: '1'
        run: |
          .venv/bin/pytest -q --tb=short \
            tests/test_porting_ui_emitter.py::test_layer3_corpus_wide_convert_ui_to_api_gate

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
