name: Strict Ready

on:
  pull_request:
  push:
    branches:
      - main
      - megaplan/production-parity-templates

permissions:
  contents: read

jobs:
  strict-ready:
    name: Strict-ready gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          make PYTHON=python install-dev

      - name: Run strict-ready Makefile gate
        run: make PYTHON=python root-clean templates strict-ready
