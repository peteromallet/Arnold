[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "megaplan-harness"
version = "0.20.0"
description = "AI agent harness for coordinating Claude and GPT to make and execute extremely robust plans"
requires-python = ">=3.11"
license = { text = "OSNL-0.2" }
authors = [
    { name = "Peter O'Malley" },
]
keywords = ["ai", "planning", "orchestration", "claude", "codex"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
db = [
    "psycopg[binary]>=3.1",
]
agent = [
    "openai",
    "anthropic>=0.39.0",
    "python-dotenv",
    "fire",
    "httpx",
    "rich",
    "tenacity",
    "requests",
    "jinja2",
    "prompt_toolkit",
    "firecrawl-py",
    "parallel-web>=0.4.2",
    "fal-client",
    "edge-tts",
    "faster-whisper>=1.0.0",
    "litellm>=1.75.5",
    "typer",
    "platformdirs",
    "PyJWT[crypto]",
]

[project.scripts]
megaplan = "megaplan.cli:cli_entry"

[tool.hatch.build]
exclude = [
    "megaplan/cloud/_reference/**",
    "megaplan/agent/pyproject.toml",
    "megaplan/agent/auto_improve/iterations/**",
]

[tool.hatch.build.targets.wheel]
packages = ["megaplan"]
exclude = [
    "megaplan/cloud/_reference/**",
    "megaplan/agent/pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
