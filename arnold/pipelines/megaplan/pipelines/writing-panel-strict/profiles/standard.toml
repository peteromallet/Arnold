# Pipeline-local profile for writing-panel-strict.
#
# Extends the 'partnered' system profile (tier 3 — premium reasoning,
# cheap mechanical phases), then overrides individual slots for this
# pipeline's specific stage IDs.
#
# Slot keys match YAML stage IDs in pipeline.yaml:
#   panel_review, synth, revise, human_decide
# Reviewer personas are sub-slotted using dotted keys (e.g., panel_review.pessimist).

[profiles.standard]
extends = "system:partnered"

# Panel reviewers — each gets their own model (dotted sub-keys under panel_review)
panel_review.pessimist    = "claude:low"
panel_review.optimist     = "claude:low"
panel_review.structuralist = "claude:low"

# Synthesis editor — moderate depth
synth = "claude:low"

# Revision editor — moderate depth
revise = "claude:low"

# Human gate — no model required (human decision)
