# `partnered-3` keeps the partnered shape, but GLM 5.2 via the Zhipu direct
# API replaces the premium-model slots. DeepSeek still handles the same
# mechanical phases as partnered.
[profiles.partnered-3]
adaptive_critique     = true
plan                  = "hermes:zhipu:glm-5.2"
prep                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique              = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique_evaluator    = "hermes:zhipu:glm-5.2"
revise                = "hermes:zhipu:glm-5.2"
gate                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
finalize              = "hermes:zhipu:glm-5.2"
execute               = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
feedback              = "hermes:zhipu:glm-5.2"
loop_plan             = "hermes:zhipu:glm-5.2"
loop_execute          = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
review                = "hermes:zhipu:glm-5.2"
tiebreaker_researcher = "hermes:zhipu:glm-5.2"
tiebreaker_challenger = "hermes:zhipu:glm-5.2"

