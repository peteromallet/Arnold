# Scenario: use_execute_simple
# Brief: Add `--no-color` to `megaplan status`.
# The actor must drive this change through megaplan using execute profiles.
name: "use_execute_simple"
tier: 1
description: >
  The user wants `megaplan status` to accept a `--no-color` flag that
  strips ANSI escape codes from its output. The actor must use megaplan
  to plan, execute, and test this small, well-scoped change.
mode: structural
tags:
  - execute
  - cli
  - structural
  - small-change

agents:
  - id: "hermes-v4-flash"
    model: "deepseek:deepseek-v4-flash"
    dispatcher: "deepseek-subagent"
    config:
      model: "deepseek:deepseek-v4-flash"
      timeout_sec: 1800

budget: {}

assessment:
  enforced:
    - "actor MUST plan the change through megaplan (megaplan plan / megaplan init)"
    - "actor MUST execute the change using megaplan tooling"
    - "actor MUST produce a test that verifies --no-color flag works"
    - "deliverable_shape_required: report.md must exist with ≥ 2 numbered sections"
    - "actor MUST NOT bypass megaplan CLI (no direct file edits without megaplan init)"
  graded:
    - "does `megaplan status --no-color` produce output without ANSI escape codes?"
    - "does the accompanying test pass?"
    - "did the megaplan run reach state `done` or `reviewed`?"
    - "is the change scoped to only `megaplan status` (no unrelated modifications)?"
  observed:
    - "which megaplan profile did the actor select (e.g., quick, standard, thorough)?"
    - "did the actor encounter any friction signals (invalid transitions, overrides)?"
    - "did the actor produce a commit message describing the change?"
