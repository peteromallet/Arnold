# Parked pipeline.yaml for the `planning` pipeline.
#
# This file exists so Sprint B can start from a known-loadable shape.
# It is NOT yet the runtime path for `megaplan plan` — the Python
# `planning.py` module remains the canonical pipeline definition until
# Sprint B's parity cutover.
#
# When Sprint B activates this file:
#   1. The Python `planning.py` module is retired.
#   2. `megaplan plan` begins consuming this YAML definition.
#   3. Existing prompts migrate to .md files under `prompts/`.
#
# Fields below mirror the current planning pipeline structure.
# Prompts are referenced by PromptRegistry key (not .md files)
# until Sprint B migrates them.

name: planning
version: 1
description: "The canonical megaplan planning pipeline — prep, plan, critique, gate, revise, finalize, execute, review. This is the pipeline behind `megaplan plan`."
inputs:
  - name: brief
    kind: file
    required: true
default_profile: "partnered"
recommended_profiles: ["partnered", "premium", "directed", "solo"]
stages:
  - id: prep
    kind: agent
    prompt: prep
    inputs: [brief]
    produces: markdown
  - id: plan
    kind: agent
    prompt: plan
    inputs: [brief, prep]
    produces: markdown
  - id: critique
    kind: agent
    prompt: critique
    inputs: [plan]
    produces: markdown
  - id: gate
    kind: gate
    prompt: gate
    inputs: [plan, critique]
    produces: markdown
  - id: revise
    kind: agent
    prompt: revise
    inputs: [plan, critique]
    produces: markdown
  - id: finalize
    kind: agent
    prompt: finalize
    inputs: [plan, revise]
    produces: markdown
  - id: execute
    kind: agent
    prompt: execute
    inputs: [finalize]
    produces: markdown
  - id: review
    kind: agent
    prompt: review
    inputs: [execute]
    produces: markdown
edges:
  - {from: gate, when: proceed, to: revise}
  - {from: gate, when: iterate, to: plan}
  - {from: gate, when: escalate, to: done}
