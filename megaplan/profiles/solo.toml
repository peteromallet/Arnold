# `solo` — tier 1. The all-cheap rung of the rubric ladder.
#
# Canonical name for the tier-1 profile (legacy alias: `basic` — both names
# remain loadable while consumers migrate).
#
# DeepSeek V4 Pro handles reasoning phases end-to-end — author, mechanical,
# and sense-check (plan, prep, critique, revise, gate, review, loop_*,
# tiebreakers). Finalize uses the premium sentinel when premium credentials
# are available, with DeepSeek fallback handled by the resolver.
#
# Use for discovery, docs, and most routine programming — the rubric's tier-1
# bucket where the patterns are stable and the variables are few. Don't
# over-reach: this tier handles a wider range of "I know what to do, just need
# it written" work than the instinct to bump up to `partnered` suggests.
#
# Flag interactions:
#
#   * `--vendor claude|codex` — picks the premium finalize sentinel vendor
#     when that credential is available. Reasoning phases stay DeepSeek.
#   * `--critic cross` — would expand to "the other premium" relative to the
#     resolved vendor, but since there's no premium in the profile to begin
#     with this is mostly a footgun — prefer to step up to `directed` or
#     `partnered` if you want a premium critic.
#   * `--phase-model phase=spec` — always honored; the per-phase escape
#     hatch overrides whatever this profile sets.
#
# See docs/megaplan-prep.md for the full rubric.
[profiles.solo]
plan                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
prep                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique              = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique_evaluator    = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
revise                = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
gate                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
finalize              = "premium:low"
execute               = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
feedback              = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
loop_plan             = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
loop_execute          = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
review                = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
tiebreaker_researcher = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
tiebreaker_challenger = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"

[profiles.solo.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
3 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
4 = "claude:claude-sonnet-4-6"
5 = "claude:claude-opus-4-7"

[profiles.solo.tier_models.critique]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
3 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
4 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
5 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
