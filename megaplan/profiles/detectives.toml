# The detective cluster — an 8-profile grid of routine/medium implementation
# profiles. Three independent axes:
#
#   * effort tier — low (marlowe/spade) vs medium (holmes/watson)
#   * critic strategy — cross-premium (the OTHER premium model critiques)
#     vs Kimi (cheap sidekick critic)
#   * author model — claude (Opus 4.7) vs codex (GPT-5.5); the `-claude`
#     and `-codex` suffix picks the author. The critic is determined by
#     the critic-strategy column.
#
# All cells share the same mechanical floor: DeepSeek V4 Pro handles `prep`
# / `finalize` / `execute`. In every cell, **the post-execute `review` phase
# uses the same model as `critique`** — the mind that pre-execution sense-
# checked the plan also post-execution sense-checks the work. The author
# still handles plan, revise, and gate.
#
# Quick map:
#
#                | Cross-premium critic              | Kimi critic
#   Low effort   | marlowe-claude (cl auth, cdx crit)| spade-claude (cl auth, kimi crit)
#                | marlowe-codex  (cdx auth, cl crit)| spade-codex  (cdx auth, kimi crit)
#   Medium       | holmes-claude  (cl auth, cdx crit)| watson-claude (cl auth, kimi crit)
#                | holmes-codex   (cdx auth, cl crit)| watson-codex  (cdx auth, kimi crit)
#
# Pick the row by stakes; pick the column by how much you trust Kimi as the
# critic-and-reviewer; pick the variant (claude vs codex) by preference,
# credits, or prior fit on similar work in this codebase. See
# docs/megaplan-rubric.md for the full decision matrix.

# --- low effort, cross-premium critic ---

# `marlowe-claude` — claude author, codex critique + review. Low effort tier.
# Claude plans, revises, and gates; codex critiques the plan and reviews the
# executed work. DeepSeek handles mechanical phases.
[profiles.marlowe-claude]
plan                  = "claude:low"
prep                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique              = "codex:low"
revise                = "claude:low"
gate                  = "claude:low"
finalize              = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
execute               = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
feedback              = "claude:low"
loop_plan             = "claude:low"
loop_execute          = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
review                = "codex:low"
tiebreaker_researcher = "claude:low"
tiebreaker_challenger = "claude:low"

