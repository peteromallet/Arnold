# `poirot` — top tier for the toughest tasks. Mirrors megaplan's built-in
# `standard` profile: Claude default-effort plans/preps/revises/gates/finalizes;
# codex default-effort critiques/executes/reviews. No Kimi, no DeepSeek —
# both premium models leveraged for their strengths (Claude author + gate,
# codex critic + executor). Use when stakes warrant having both premiums
# contribute, e.g. high-stakes contract definition or multi-system migration
# decisions. Bump --phase-model plan=claude:high (or xhigh) on hard plans.
# (Personality: Hercule Poirot — methodical, uses both grey cells and observation.)
[profiles.poirot]
vendor_locked         = true
plan                  = "claude"
prep                  = "claude"
critique              = "codex"
revise                = "claude"
gate                  = "claude"
finalize              = "claude"
execute               = "codex"
loop_plan             = "claude"
loop_execute          = "codex"
review                = "codex"
tiebreaker_researcher = "codex"
tiebreaker_challenger = "codex"
