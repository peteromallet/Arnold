# `partnered` — tier 3. Premium reasoning end-to-end; cheap mechanical
# phases. The default for *real* engineering work.
#
# Canonical name for the tier-3 profile.
#
# Claude (default vendor) handles every reasoning phase — `plan`, `critique`,
# `revise`, `review`, `loop_plan`, and tiebreakers. DeepSeek V4 Pro handles
# the mechanical phases — `prep`, `gate`, `finalize`, `execute`, `loop_execute`.
#
# Use for novel implementation, cross-cutting code, judgment calls, multi-
# system features — work where the patterns aren't stable and overlapping
# concerns force real deliberation. **But** only reach for this when the work
# is genuinely novel or cross-cutting; if the patterns are stable, drop back
# to `solo` or `directed`.
#
# Flag interactions:
#
#   * `--vendor codex` — flips every `claude:low` slot to `codex:low`
#     uniformly. The whole reasoning loop becomes codex; mechanical phases
#     stay DeepSeek.
#   * `--critic cross` — overrides critique+review to the *other* premium
#     relative to the resolved vendor. With default vendor=claude, that's
#     codex; with --vendor codex it's claude.
#   * `--phase-model phase=spec` — always honored. Common pattern:
#     `--phase-model plan=claude:high` when the brief is long or the
#     codebase is unfamiliar.
#
# See docs/megaplan-decision.md for the full rubric.
[profiles.partnered]
default = "partnered"
plan                  = "claude:low"
prep                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique              = "claude:low"
revise                = "claude:low"
gate                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
finalize              = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
execute               = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
feedback              = "claude:low"
loop_plan             = "claude:low"
loop_execute          = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
review                = "claude:low"
tiebreaker_researcher = "claude:low"
tiebreaker_challenger = "claude:low"
