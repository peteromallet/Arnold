# `partnered` — tier 3. Premium author/reviewer reasoning paired with cheap
# DeepSeek for mechanical phases and for a premium-directed critique. The
# default for *real* engineering work.
#
# Canonical name for the tier-3 profile.
#
# Claude (default vendor) handles the author/reviewer reasoning phases —
# `plan`, `revise`, `review`, `loop_plan`, and tiebreakers. DeepSeek V4 Pro
# handles the cheap phases — `prep`, `gate`, `execute`, `loop_execute`, and
# `critique`. Critique runs on cheap DeepSeek *directed by the premium
# critique-evaluator*: adaptive critique is on by default here (see the
# `adaptive_critique` field below), so the premium evaluator picks the lenses
# the cheap critic runs. `review` stays premium — the premium director, not a
# same-model invariant, is what keeps the critique phase honest.
#
# Use for novel implementation, cross-cutting code, judgment calls, multi-
# system features — work where the patterns aren't stable and overlapping
# concerns force real deliberation. **But** only reach for this when the work
# is genuinely novel or cross-cutting; if the patterns are stable, drop back
# to `solo` or `directed`.
#
# Flag interactions:
#
#   * `--vendor codex` — flips every `claude:low` slot to `codex:low`
#     uniformly. The whole reasoning loop becomes codex; mechanical phases
#     stay DeepSeek.
#   * `--critic cross` — crosses the premium critic slots to the *other*
#     premium relative to the resolved vendor. Critique is now cheap DeepSeek
#     (a non-premium slot, left untouched by the cross), so in practice this
#     flips `review` to codex (default vendor=claude) or to claude
#     (--vendor codex).
#   * `--phase-model phase=spec` — always honored. Common pattern:
#     `--phase-model plan=claude:high` when the brief is long or the
#     codebase is unfamiliar.
#
# See docs/megaplan-setup.md for the full rubric.
[profiles.partnered]
# Adaptive critique on by default: this profile carries a premium model, so
# the critique-evaluator can force a premium evaluator to direct the cheap
# critic. Open-only profiles deliberately omit this field (default False) to
# avoid forcing a premium key into a key-free setup.
adaptive_critique = true
plan                  = "claude:low"
prep                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique              = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
critique_evaluator    = "claude:low"
revise                = "claude:low"
gate                  = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
finalize              = "claude:low"
execute               = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
feedback              = "claude:low"
loop_plan             = "claude:low"
loop_execute          = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
review                = "claude:low"
tiebreaker_researcher = "claude:low"
tiebreaker_challenger = "claude:low"

[profiles.partnered.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
3 = "hermes:fireworks:accounts/fireworks/models/deepseek-v4-pro"
4 = "claude:claude-sonnet-4-6"
5 = "claude:claude-opus-4-7"
