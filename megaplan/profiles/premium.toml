# `premium` — tier 4 (premium). Single-vendor premium for every phase.
#
# Claude (default vendor) handles everything — plan, prep, critique, revise,
# gate, finalize, execute, loop_*, review, tiebreakers — at `:low` depth.
# No DeepSeek, no Kimi: one premium model's judgment on every phase, clean
# single-vendor audit trail. Pair with `--robustness robust` for the most
# complex of these.
#
# Use for production-critical work: schema definitions, wire formats,
# security-critical code paths, public API contracts, migration logic running
# against production data, kernel-invariant changes (data structures
# everything downstream depends on). The tier where regression =
# production incident or worse.
#
# This is functionally a renamed `all-claude` at `:low` depth. The rubric
# defaults to `:low` here (per dial-3: premium-at-low is the right floor;
# bump depth on specific phases when you can name the reason).
#
# Flag interactions:
#
#   * `--vendor codex` — flips every `claude:low` slot to `codex:low`. This
#     is the way to get the codex variant of tier 4; there is no separate
#     `premium-codex` profile.
#   * `--critic kimi` — overrides critique+review to Kimi. Useful when
#     you want the cheap critic to surface issues the premium author missed,
#     even at tier 4 (see rubric example for migration logic).
#   * `--critic cross` — overrides critique+review to the other premium.
#   * `--phase-model phase=spec` — always honored. Common pattern:
#     `--phase-model plan=claude:high` for hard plans.
#
# See docs/megaplan-rubric.md for the full rubric.
[profiles.premium]
plan                  = "claude:low"
prep                  = "claude:low"
critique              = "claude:low"
revise                = "claude:low"
gate                  = "claude:low"
finalize              = "claude:low"
execute               = "claude:low"
feedback              = "claude:low"
loop_plan             = "claude:low"
loop_execute          = "claude:low"
review                = "claude:low"
tiebreaker_researcher = "claude:low"
tiebreaker_challenger = "claude:low"
