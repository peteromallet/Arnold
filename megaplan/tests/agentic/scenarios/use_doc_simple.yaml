# Scenario: use_doc_simple
# Brief: Write a "blocked-recovery" runbook at docs/ops/blocked-recovery.md.
# The actor must produce a real reference document, not a stub.
name: "use_doc_simple"
tier: 1
description: >
  The user wants a one-page operator runbook at `docs/ops/blocked-recovery.md`
  covering what to do when a megaplan run goes into the `blocked` state. It
  should walk through reading `valid_next` and the recovery decision tree.
  The actor must drive this through megaplan as a doc deliverable.
mode: structural
tags:
  - doc
  - ops
  - runbook
  - structural

agents:
  - id: "hermes-v4-flash"
    model: "deepseek:deepseek-v4-flash"
    dispatcher: "deepseek-subagent"
    config:
      model: "deepseek:deepseek-v4-flash"
      timeout_sec: 1800

budget: {}

assessment:
  enforced:
    - "actor MUST plan the doc through megaplan (megaplan plan / megaplan init)"
    - "actor MUST write the file at docs/ops/blocked-recovery.md"
    - "deliverable_shape_required: report.md must exist with ≥ 2 numbered sections"
    - "actor MUST NOT bypass megaplan CLI"
  graded:
    - "does docs/ops/blocked-recovery.md exist and is it a substantive document (not a stub)?"
    - "does the doc cover the recovery decision tree from the blocked state?"
    - "does the doc reference `valid_next` and explain how to read it?"
    - "did the megaplan run reach state `done` or `reviewed`?"
  observed:
    - "which megaplan profile did the actor select for a doc deliverable?"
    - "did the actor encounter any friction signals?"
    - "did the actor include troubleshooting tips beyond the decision tree?"
