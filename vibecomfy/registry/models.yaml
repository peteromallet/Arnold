# VibeComfy model staging registry.
#
# Shape:
#   models:
#     - id: stable_model_id
#       source:
#         kind: huggingface
#         repo: owner/repo
#         filename: repo/path/model.safetensors
#         # or kind: url with url: https://...
#       min_size: 100_000_000
#       targets:
#         - node_pack: short_owner_label
#           path: checkpoints/model.safetensors
#       canonical_name: optional name/subpath returned by alias normalization
#       aliases: [accepted-old-name.safetensors]
#       tags: [phase:core]
#       notes: optional prose
#       sha256: optional exact file SHA256 verified after staging
#       size_bytes: optional exact byte size verified after staging
#       # source.revision is optional for Hugging Face rows and is passed to hf_hub_download
#
# target.path is relative to the models root passed to the staging command.
# It must not be absolute, contain '..', or start with models/ or models\.
# Backslashes in path strings are preserved literally for node packs that
# embed backslashes in model names.

models:
  - id: sd15_v1_5_pruned_emaonly_fp16
    source:
      kind: huggingface
      repo: Comfy-Org/stable-diffusion-v1-5-archive
      filename: v1-5-pruned-emaonly-fp16.safetensors
    min_size: 2_000_000_000
    targets:
      - node_pack: comfy_core
        path: checkpoints/v1-5-pruned-emaonly-fp16.safetensors
    aliases:
      - v1-5-pruned-emaonly.safetensors
    tags: [phase:core]
    notes: Baseline SD1.5 smoke checkpoint; fp16 avoids dtype splits on 4090 RunPod images.

