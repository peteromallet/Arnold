# Pipeline-local profile for vibecomfy-executor.
#
# Maps each stage to a Hermes-backed DeepSeek subagent. The runtime reads
# ctx.profile and constructs the matching AIAgent for the stage.

[profiles.default]
classify   = "hermes:deepseek:deepseek-v4-flash"
research   = "hermes:deepseek:deepseek-v4-pro"
implement  = "hermes:deepseek:deepseek-v4-pro"
reply      = "hermes:deepseek:deepseek-v4-pro"
