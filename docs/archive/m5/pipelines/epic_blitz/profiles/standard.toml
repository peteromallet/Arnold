# Pipeline-local profile for epic-blitz.
#
# Extends the 'partnered' system profile (tier 3 — premium reasoning,
# cheap mechanical phases), then overrides individual slots for this
# pipeline's specific stage IDs.
#
# Slot keys match stage IDs in epic_blitz.py:
#   high_panel, high_revise, mid_panel, mid_revise, low_panel, readiness
# Reviewer personas are sub-slotted using dotted keys
# (e.g., high_panel.existing_system_reuse).

[profiles.standard]
extends = "system:partnered"

# High abstraction panel reviewers (5 slots)
high_panel.existing_system_reuse = "claude:low"
high_panel.conceptual_fit       = "claude:low"
high_panel.missing_abstraction  = "claude:low"
high_panel.epic_decomposition   = "claude:low"
high_panel.strategic_risk       = "claude:low"

# Mid abstraction panel reviewers (5 slots)
mid_panel.codebase_convention_fit = "claude:low"
mid_panel.data_artifact_model     = "claude:low"
mid_panel.orchestration_semantics = "claude:low"
mid_panel.agent_model_assignment  = "claude:low"
mid_panel.blast_radius            = "claude:low"

# Low abstraction panel reviewers (5 slots)
low_panel.implementation_feasibility = "claude:low"
low_panel.testability                = "claude:low"
low_panel.edge_cases                 = "claude:low"
low_panel.cli_ux_details             = "claude:low"
low_panel.migration_backcompat       = "claude:low"

# Reviser / readiness stages (3 slots)
high_revise = "claude:low"
mid_revise  = "claude:low"
readiness   = "claude:low"
