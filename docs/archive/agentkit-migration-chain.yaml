# Historical / Reference Chain Spec (archived)
#
# This file was the operational chain spec for re-rooting megaplan's
# per-phase runners onto agentkit v0.3.0. It is preserved for historical
# context only — it is NOT current operator guidance. Do not execute
# milestones from this spec without review and update.
#
# Archived: 2026-05-28

base_branch: main
merge_policy: review

milestones:
  - label: megaplan-phase-runner-migration
    idea: .megaplan/briefs/agentkit-migration/megaplan-phase-runner-migration.md
    branch: megaplan/agentkit-migration
    profile: all-claude
    robustness: standard
    vendor: claude
    depth: medium
    with_feedback: false
    deepseek_provider: direct
    notes: >
      Re-root megaplan's per-phase runners onto agentkit.loop.run_step.
      Replace internal LLM router, tool registry, progress emitter, usage
      pricing, context compressor, and subagent spawn mechanism with the
      agentkit equivalents. auto.py:drive() outer state-machine stays
      megaplan-owned. Requires agentkit v0.3.0 installable. Less ceremonious
      cutover than Veas/bndc — megaplan is a tool, not a service. Soak via
      recorded plan replay + 3 real plans at --depth medium.

on_failure:
  abort: stop_chain
on_escalate:
  abort: stop_chain

driver:
  stall_threshold: 5
  max_iterations: 120
  phase_timeout: 3600
  status_timeout: 60
  on_escalate: abort
  robustness: standard
  auto_approve: true
