# Generated: docs/arnold/package-disposition.md
# Validator: scripts/validate_package_disposition.py
# Renderer:   scripts/render_package_disposition_md.py

schema_version: 1

# ── Enum lists ─────────────────────────────────────────────────────────────
valid_dispositions:
- arnold-core
- arnold-service-interface
- arnold-adapter
- arnold-shared-leaf
- megaplan-plugin
- product-app
- legacy-hold
- delete-merge
- split-required
valid_granularities:
- directory
- file
- symbol
- split

# ── Narrow generated/cache exclusion structure ─────────────────────────────
# Exclusions are ONLY for generated/cache artifacts.
# Uncertain hybrid ownership must use legacy-hold or split-required rows.
coverage_exclusions: []

# ── Disposition rows ──────────────────────────────────────────────────────
#
# Row field contract:
#   source / target / granularity / disposition / reason / blockers /
#   allowed_imports / forbidden_imports / vocabulary_owned / string_policy /
#   extraction_prerequisite / first_extraction_unit / tests_gates / configurable_seams
#
# Coverage semantics:
#   - file rows cover exactly one tracked file
#   - directory rows cover recursive tracked .py files
#   - split rows cover the parent exactly once and require child rows
#   - symbol rows document extraction detail; never add file coverage
rows:
- source: megaplan/_pipeline
  target: arnold/pipeline (neutral executor/runtime surface) + megaplan/pipelines/megaplan (planning stages, handlers, policy)
  granularity: split
  disposition: split-required
  reason: The `_pipeline` subtree mixes extractable runtime primitives with Megaplan planning-stage policy, handler adapters,
    and stage-name vocabulary.
  blockers:
  - Planning stage strings and override/gate decisions are still embedded in shared carrier modules.
  - Discovery/runtime helpers still expose `megaplan`-branded schema IDs, paths, env vars, or capability names.
  - Builder and planning glue still hardcode critique/finalize/tiebreaker control flow alongside generic pipeline composition
    helpers.
  allowed_imports: []
  forbidden_imports:
  - megaplan.handlers
  - megaplan.execute
  - megaplan.finalize
  vocabulary_owned:
  - kind: phase_names
    owner: megaplan
    terms:
    - prep
    - plan
    - critique
    - gate
    - revise
    - finalize
    - execute
    - review
    - tiebreaker
    - feedback
  - kind: override_actions
    owner: megaplan
    terms:
    - force_proceed
    - abort
    - replan
    - add_note
  string_policy:
  - category: phase_names
    owner: megaplan
    policy: Plugin-local only; Arnold runtime rows may not own Megaplan planning phase literals.
    literals:
    - prep
    - plan
    - critique
    - gate
    - revise
    - finalize
    - execute
    - review
    - tiebreaker
    - feedback
  extraction_prerequisite:
  - Split neutral pipeline SDK files from Megaplan planning/compiler/runtime adapters.
  - Move planning stage routing and handler invocation behind plugin-owned adapters.
  - Rename `megaplan`-branded discovery/runtime wire formats before promoting them to Arnold.
  first_extraction_unit: arnold/pipeline
  tests_gates:
  - 'static-gate: arnold/pipeline/** must not embed Megaplan planning phase literals'
  - 'static-gate: arnold/pipeline/** must not import Megaplan handler modules directly'
  configurable_seams: []
