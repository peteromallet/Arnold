  - 'static-gate: arnold/pipeline/types.py must not contain `feedback|planning|confirm_self_review` literals'
  configurable_seams:
  - declaration_site: megaplan/_pipeline/types.py (GateRecommendation)
    inherits_via: direct import from _pipeline.types
    override_mechanism: plugin-owned gate recommendation mapping
    meaning_owner: megaplan
    supported_state: set; must move before Arnold extraction
  - declaration_site: megaplan/_pipeline/types.py (OverrideAction)
