schema: arnold.megaplan_native_representation.traceability.v1
target_report: docs/arnold/megaplan-native-representation-report.md
alignment_plan: docs/arnold/megaplan-native-representation-alignment-plan.md
status_values: [enabled, implemented, deferred, missing]
boundary_effect_values: [artifact, state_history, receipt, phase_result, authority, reducer, external_effect]
completion_rule: missing blocks launch; implemented requires visible source, declared policy, or audited pure phase body plus proof.
chain_handoff_gates:
  - id: completion-to-composition
    upstream_chain: .megaplan/initiatives/native-python-pipelines-completion/chain.yaml
    downstream_chain: .megaplan/initiatives/native-composition-followup/chain.yaml
    required_precondition: native python completion chain completed
    require_manifest: true
    closeout_milestone: completion-m7
    closeout_brief: .megaplan/initiatives/native-python-pipelines-completion/briefs/m7-megaplan-relocation-and-final-purge.md
    closeout_deliverables: [proof-map.json, completion-manifest.json]
  - id: completion-to-platform
    upstream_chain: .megaplan/initiatives/native-python-pipelines-completion/chain.yaml
    downstream_chain: .megaplan/initiatives/native-platform-followup/chain.yaml
    required_precondition: native python completion chain completed
    require_manifest: true
    closeout_milestone: completion-m7
    closeout_brief: .megaplan/initiatives/native-python-pipelines-completion/briefs/m7-megaplan-relocation-and-final-purge.md
    closeout_deliverables: [proof-map.json, completion-manifest.json]
  - id: composition-to-platform
    upstream_chain: .megaplan/initiatives/native-composition-followup/chain.yaml
    downstream_chain: .megaplan/initiatives/native-platform-followup/chain.yaml
    required_precondition: native composition chain completed
    require_manifest: true
    closeout_milestone: composition-m6
    closeout_brief: .megaplan/initiatives/native-composition-followup/briefs/m6-composition-docs-and-conformance.md
    closeout_deliverables: [proof-map.json, completion-manifest.json, megaplan-composition-conformance-report.md]
final_conformance_gate:
  id: platform-final-report-conformance
  chain: .megaplan/initiatives/native-platform-followup/chain.yaml
  closeout_milestone: platform-m6
  closeout_brief: .megaplan/initiatives/native-platform-followup/briefs/m6-platform-docs-conformance-and-rollout.md
  closeout_deliverables:
    - proof-map.json
    - completion-manifest.json
    - docs/arnold/megaplan-native-representation-conformance-report.md
    - docs/arnold/megaplan-native-representation-conformance.yaml
  machine_readable_report:
    path: docs/arnold/megaplan-native-representation-conformance.yaml
    schema: arnold.megaplan_native_representation.conformance.v1
    validator: scripts/validate_native_representation_conformance.py
    row_status_values: [implemented, deferred]
    implemented_semantic_carriers: [canonical_source, declared_policy, audited_pure_phase_body]
    deferred_semantic_carriers: [explicit_deferral]
    carrier_evidence_suffixes:
      canonical_source: [".pypeline"]
      audited_pure_phase_body: [".py"]
      declared_policy: [".pypeline", ".py", ".yaml", ".yml", ".json", ".md"]
    required_row_fields: [id, status, semantic_carrier, proof_categories, proof_artifacts]
    implemented_required_row_fields: [carrier_evidence]
    deferred_required_row_fields: [downstream_owner, blocking_proof, reason]
  required_report_sections:
    - Structural conformance
    - Handler purity inventory
    - Mutation tests
    - Static topology snapshots
    - Fixed scenario manifest
    - Installed package source-path reconciliation
    - Platform preservation rerun
rows:
  - id: prep-clarification-gate
    requirement: Prep clarification gate
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m5, platform-m4]
    proof_artifacts: [source_excerpt, rendered_route, suspend_resume_test, legacy_cursor_compatibility_test]
    boundary_effects_required: [state_history, receipt, phase_result]
    boundary_contract_ids: [megaplan:prep-clarify, megaplan:suspension, prep_to_plan]
    false_pass_guard: Handler sets a waiting state while topology still shows a single prep node.
    negative_invariant: Structural conformance fails if the branch is not visible outside handler code.
  - id: plan-artifact-version-metadata
    requirement: Plan artifact/version metadata
    status: enabled
    owners: [native-python-pipelines-completion, native-composition-followup]
    milestones: [completion-m3-5, completion-m5, composition-m1, composition-m6]
    proof_artifacts: [artifact_manifest, schema_test]
    boundary_effects_required: [artifact]
    boundary_contract_ids: [megaplan:artifact-contract]
    false_pass_guard: Artifacts are emitted but source does not declare their contract.
    negative_invariant: Schema/source invariant requires declared boundary names for plan artifacts.
  - id: critique-bare-skip
    requirement: Critique skip on bare robustness
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m6]
    proof_artifacts: [variant_topology, behavior_golden]
    false_pass_guard: Bare mode skips in handler only.
    negative_invariant: Mutation moving skip into handler makes conformance fail.
  - id: critique-evaluator-retry
    requirement: Adaptive critique evaluator retry
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m6]
    proof_artifacts: [retry_exhaustion_test, retry_success_test, event_trace]
    boundary_effects_required: [external_effect]
    boundary_contract_ids: [megaplan:robustness, critique-fanout]
    false_pass_guard: Retry works but is invisible to topology/policy inspection.
    negative_invariant: Source invariant rejects retry loops in retained critique handler.
  - id: critique-parallel-lenses
    requirement: Parallel critique lenses with fan-in
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m0, composition-m1, composition-m3, composition-m6]
    proof_artifacts: [dynamic_list_fanout_fixture, reducer_trace, fallback_behavior_test]
    boundary_effects_required: [reducer]
    boundary_contract_ids: [critique-fanout, SOURCE_CRITIQUE]
    false_pass_guard: Native trace lists child calls but source still invokes one handler.
    negative_invariant: Static topology snapshot includes untaken selected-lens branches.
  - id: critique-gate-revise-loop
    requirement: Bounded critique/gate/revise loop
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m0, composition-m1, composition-m2, composition-m6]
    proof_artifacts: [loop_iteration_trace, cap_test, severity_termination_test]
    boundary_effects_required: [state_history]
    boundary_contract_ids: [megaplan:revise-loop, gate_to_revise, revise_to_critique]
    false_pass_guard: A state field jumps back to critique without visible typed outcomes.
    negative_invariant: Source invariant requires loop bounds and outcome enum at workflow level.
  - id: gate-preflight-normalization
    requirement: Gate preflight and payload normalization
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m2, composition-m6]
    proof_artifacts: [malformed_payload_golden, unavailable_agent_route, topology_excerpt]
    boundary_effects_required: [external_effect]
    boundary_contract_ids: [megaplan:gate]
    false_pass_guard: Bad payload fallback remains buried inside handle_gate.
    negative_invariant: Handler-purity scan rejects route decisions in gate payload recovery code.
  - id: gate-signal-reprompt
    requirement: Gate signal building and reprompt
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m2, composition-m6]
    proof_artifacts: [gate_retry_test, route_decision_golden, artifact_schema_check]
    boundary_effects_required: [external_effect]
    boundary_contract_ids: [megaplan:gate]
    false_pass_guard: Gate looks native but reprompt/downgrade lives in handler.
    negative_invariant: Source invariant requires reprompt policy and downgrade route outside handler.
  - id: gate-flag-debt-fallback
    requirement: Gate flag/debt/fallback handling
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m2, composition-m6, platform-m4, platform-m6]
    proof_artifacts: [effect_event_trace, accepted_with_debt_golden, downgrade_golden]
    boundary_effects_required: [artifact, external_effect]
    boundary_contract_ids: [megaplan:gate]
    false_pass_guard: Debt flag is written but no explicit product route exists.
    negative_invariant: Semantic diff fails if debt/downgrade route disappears from topology.
  - id: tiebreaker-subworkflow
    requirement: Tiebreaker researcher/challenger path
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m3, composition-m4, composition-m6]
    proof_artifacts: [subworkflow_graph, path_addressed_trace, proceed_iterate_escalate_tests]
    boundary_effects_required: [artifact, state_history, receipt, phase_result, reducer]
    boundary_contract_ids:
      - megaplan:tiebreaker
      - tiebreaker_researcher_to_challenger
      - tiebreaker_challenger_to_synthesis
      - tiebreaker_synthesis_to_decision
      - tiebreaker_decision_to_parent
      - parent_rejoin_promotion
      - replan_authority
    false_pass_guard: One native node calls old tiebreaker handler.
    negative_invariant: Structural conformance fails for single handler-backed tiebreaker stage.
  - id: human-decision-suspension
    requirement: Human decision/suspension
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m5, platform-m2, platform-m4, platform-m6]
    proof_artifacts: [process_death_resume_test, rendered_suspension_points, boundary_receipt_test]
    boundary_effects_required: [state_history, receipt, phase_result, authority]
    boundary_contract_ids:
      - megaplan:suspension
      - execute_approval
      - execute_approval_denial
      - review_human_verification
      - override_suspension_authority
      - override_human_gate_authority
    false_pass_guard: Status or CLI says waiting, but the durable resume coordinate or suspension authority still lives only in runtime state.
    negative_invariant: Implemented proof must start from canonical source plus boundary receipts; status/CLI hints and compatibility shells do not satisfy the row.
  - id: finalize-fallback-routes
    requirement: Finalize fallback routes
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m6]
    proof_artifacts: [finalize_failure_golden, route_test]
    boundary_effects_required: [artifact, receipt]
    boundary_contract_ids: [megaplan:finalize, finalize_fallback, final_projection]
    false_pass_guard: Finalize errors are swallowed into artifact flags.
    negative_invariant: Topology includes failure/fallback routes and tests assert they are taken.
  - id: execute-dependency-batches
    requirement: Dependency-aware execute batches
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m3, composition-m4, composition-m6, platform-m1, platform-m5, platform-m6]
    proof_artifacts: [dag_fixture, partial_failure_resume_test, task_dependency_trace]
    boundary_effects_required: [artifact, state_history, receipt, phase_result, reducer]
    boundary_contract_ids:
      - megaplan:execute
      - execute-batches
      - execute_batch_checkpoint
      - execute_partial_failure
      - execute_blocked_anchor
      - execute_resume_anchor
      - execute_aggregate_promotion
    false_pass_guard: Execute remains one node with richer internal logging.
    negative_invariant: Structural conformance fails if execute is only one handler-backed stage.
  - id: execute-approval-gates
    requirement: Execute approval/no-review/deferred-human gates
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m5, composition-m6, platform-m2, platform-m4, platform-m6]
    proof_artifacts: [approval_tests, no_review_golden, deferred_human_golden, boundary_receipt_test]
    boundary_effects_required: [state_history, receipt, phase_result, authority]
    boundary_contract_ids:
      - megaplan:execute
      - execute_approval
      - execute_approval_denial
      - execute_no_review_terminal
      - override_human_gate_authority
    false_pass_guard: Approval works through side effect, but topology cannot show it and a CLI or manifest bridge still supplies the route.
    negative_invariant: Implemented proof must cite declared execute gates and boundary receipts; CLI handlers and manifest backend routing cannot satisfy the row.
  - id: execute-review-rework-loop
    requirement: Execute/review/rework loop
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m4, composition-m5, composition-m6]
    proof_artifacts: [review_goldens, loop_trace]
    boundary_effects_required: [artifact, state_history, receipt, phase_result, external_effect]
    boundary_contract_ids: [megaplan:review, review_rework_effects]
    false_pass_guard: Review handler mutates next_step to execute.
    negative_invariant: Mutation hiding rework route in handler must fail conformance.
  - id: review-parallel-fanin
    requirement: Review parallel checks/fan-in
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m3, composition-m4, composition-m6]
    proof_artifacts: [parallel_review_trace, deterministic_ordering_test]
    boundary_effects_required: [artifact, receipt, phase_result, reducer]
    boundary_contract_ids:
      - megaplan:review
      - review-fan-in
      - review_child_outputs
      - review_reducer_promotion
    false_pass_guard: Parallel checks run but topology has one review node.
    negative_invariant: Static snapshot includes child review checks and reducer.
  - id: review-retry-cap-outcomes
    requirement: Review infrastructure retry and cap outcomes
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m2, composition-m6, platform-m4, platform-m5, platform-m6]
    proof_artifacts: [infra_retry_golden, repeated_failure_cap_golden, force_proceed_block_tests, authority_boundary_test]
    boundary_effects_required: [receipt, phase_result, authority]
    boundary_contract_ids:
      - megaplan:review
      - review_cap_authority
      - review_human_verification
      - review_rework_effects
    false_pass_guard: Cap exhaustion force-proceeds or blocks through handler/control state while source and authority receipts stay silent.
    negative_invariant: Implemented proof must cite review route policy and cap authority receipts; handler refs, auto next-step hints, and compatibility bridges cannot satisfy the row.
  - id: override-action-surface
    requirement: Override full action surface
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m2, composition-m6, platform-m2, platform-m6]
    proof_artifacts: [override_matrix, action_route_tests, authority_boundary_test]
    boundary_effects_required: [state_history, authority]
    boundary_contract_ids:
      - megaplan:override
      - arnold_pipelines.megaplan.workflows.override_matrix:OVERRIDE_ACTION_MATRIX
      - override_abort_authority
      - override_force_proceed_authority
      - override_replan_authority
      - override_recover_blocked_authority
      - override_resume_clarify_authority
      - override_adopt_execution_authority
      - override_suspension_authority
      - override_human_gate_authority
    false_pass_guard: Only abort/replan are visible; other actions mutate config/state or still depend on components or route bindings.
    negative_invariant: Implemented proof must cite the override matrix, canonical source, and authority receipts; components, handler refs, route bindings, manifest routing, CLI handlers, and compatibility bridges cannot satisfy the row.
  - id: timeout-deadline-policy
    requirement: Timeout/deadline policy
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m6, platform-m4, platform-m5, platform-m6]
    proof_artifacts: [timeout_event_trace, retry_escalation_test]
    boundary_effects_required: [external_effect, state_history]
    boundary_contract_ids:
      - megaplan:execute
      - megaplan:review
      - execute_blocked_anchor
      - execute_resume_anchor
      - review_cap_authority
    false_pass_guard: Runtime helper times out but source does not declare retryability.
    negative_invariant: Source invariant requires timeout/retry policy at call site or named policy object.
  - id: model-routing-policy
    requirement: Model routing by phase/task complexity
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m6, platform-m2, platform-m6]
    proof_artifacts: [profile_validation, task_complexity_route_test, rendered_policy_view]
    boundary_effects_required: [external_effect]
    boundary_contract_ids: [megaplan:model-routing]
    false_pass_guard: Correct model is picked by hidden profile code only.
    negative_invariant: Rendered policy view and negative test for missing route metadata.
  - id: runtime-list-iteration
    requirement: Runtime-list iteration
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m0, composition-m1, composition-m3, composition-m6]
    proof_artifacts: [compiler_fixture, runtime_trace]
    false_pass_guard: Megaplan uses bespoke helper instead of general native construct.
    negative_invariant: Compiler acceptance/rejection fixtures prevent Megaplan-only escape hatch.
  - id: dynamic-parallel-map
    requirement: Dynamic parallel map
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m0, composition-m1, composition-m3, composition-m6]
    proof_artifacts: [selected_lens_fanout_fixture, execute_batch_fanout_fixture]
    false_pass_guard: Fanout only works for hardcoded examples.
    negative_invariant: Dynamic-list fixture must vary list at runtime and preserve child paths.
  - id: typed-loop-outcomes
    requirement: Typed loop outcomes or break/continue
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m0, composition-m1, composition-m2, composition-m6]
    proof_artifacts: [compiler_acceptance_tests, compiler_rejection_tests, route_parity]
    false_pass_guard: Handler returns magic strings consumed by generic router.
    negative_invariant: Source invariant requires typed outcome declarations or accepted Python loop syntax.
  - id: autodrive-event-liveness
    requirement: Auto-drive/event/liveness transitions
    status: enabled
    owners: [native-python-pipelines-completion, native-composition-followup, native-platform-followup]
    milestones: [completion-m3-5, composition-m1, composition-m6, platform-m4, platform-m5, platform-m6]
    proof_artifacts: [event_replay_test, liveness_policy_test, status_projection_parity, cursor_projection_test]
    boundary_effects_required: [state_history, receipt, phase_result, authority]
    boundary_contract_ids:
      - arnold_pipelines.megaplan.workflows.events:workflow_events
      - arnold_pipelines.megaplan.workflows.events:workflow_cursor
    false_pass_guard: Auto-drive keeps working, but next-step authority still comes from state, status, or CLI projection instead of canonical workflow events.
    negative_invariant: Implemented proof must cite source-derived workflow events and cursors; auto next-step derivation, CLI handlers, and projected native shells cannot satisfy the row.
  - id: path-addressed-checkpoints
    requirement: Path-addressed checkpoints
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m0, composition-m4, composition-m5, composition-m6, platform-m4, platform-m6]
    proof_artifacts: [tree_trace_snapshot, resume_from_path_test]
    boundary_effects_required: [state_history, receipt, phase_result]
    boundary_contract_ids:
      - critique-fanout
      - execute-batches
      - review-fan-in
      - tiebreaker_researcher_to_challenger
      - tiebreaker_challenger_to_synthesis
      - tiebreaker_synthesis_to_decision
      - tiebreaker_decision_to_parent
      - execute_resume_anchor
      - review_human_verification
      - override_recover_blocked_authority
    false_pass_guard: Flattened trace loses subworkflow identity.
    negative_invariant: Snapshot asserts nested path identity and resume target.
  - id: shadow-topology
    requirement: Trace-only native shadow topology
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m0, composition-m1]
    proof_artifacts: [shadow_topology_diff, review_signoff, parity_notes]
    false_pass_guard: Migration starts directly from handler-backed runtime and drifts.
    negative_invariant: Epic cannot launch migration milestone without accepted shadow topology.
  - id: handler-purity-audit
    requirement: Handler topology extraction/purity audit
    status: enabled
    owners: [native-composition-followup, native-platform-followup]
    milestones: [composition-m1, composition-m2, composition-m6, platform-m6]
    proof_artifacts: [handler_inventory, purity_scan, source_excerpts, reviewer_signoff]
    false_pass_guard: Handler names are wrapped in native nodes but retain control flow.
    negative_invariant: Scan covers current_state, next_step, workflow_transition, run_parallel, auto-loop dispatch, and override action dispatch.
  - id: golden-trace-regeneration
    requirement: Golden trace regeneration guard
    status: enabled
    owners: [native-python-pipelines-completion, native-composition-followup, native-platform-followup]
    milestones: [completion-m5, composition-m6, platform-m6]
    proof_artifacts: [golden_scenario_manifest, semantic_diff_checklist, reviewer_approval]
    false_pass_guard: Tests pass because goldens were overwritten.
    negative_invariant: CI fails on unreviewed trace regeneration or missing semantic diff note.
  - id: source-path-reconciliation
    requirement: Canonical source path reconciliation
    status: enabled
    owners: [native-python-pipelines-completion, native-composition-followup, native-platform-followup]
    milestones: [completion-m2, completion-m7, composition-m0, composition-m1, composition-m6, platform-m6]
    proof_artifacts: [path_reconciliation_table, import_smoke_test, native_shell_negative_test]
    false_pass_guard: Review inspects stale or future path while projected native shells hide that live execution no longer follows canonical source.
    negative_invariant: Milestone cannot close unless installed package, canonical `.pypeline`, and the native-shell negative test agree; `Pipeline.native_program` and workflow.py shims are receipts, not proof.
  - id: behavior-parity
    requirement: Behavior parity with existing Megaplan
    status: enabled
    owners: [native-python-pipelines-completion, native-composition-followup, native-platform-followup]
    milestones: [completion-m3-5, completion-m5, composition-m1, composition-m6, platform-m6]
    proof_artifacts: [golden_suite, live_smoke, installed_wheel_conformance]
    false_pass_guard: Report shape looks good but regressions hide in uncommon flows.
    negative_invariant: Scenario goldens cover all named prep, critique, gate, tiebreaker, execute, review, and override paths.
  - id: source-readability
    requirement: Source readability
    status: enabled
    owners: [native-composition-followup]
    milestones: [composition-m1, composition-m6]
    proof_artifacts: [human_review_checklist, rendered_topology_diff]
    false_pass_guard: Source has readable names but important decisions are still elsewhere.
    negative_invariant: Structural conformance and handler-purity inventory are required, not just human readability.
