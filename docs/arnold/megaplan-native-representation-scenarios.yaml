schema: arnold.megaplan_native_representation.scenarios.v1
target_report: docs/arnold/megaplan-native-representation-report.md
alignment_plan: docs/arnold/megaplan-native-representation-alignment-plan.md
traceability: docs/arnold/megaplan-native-representation-traceability.yaml
regeneration_rule: Golden traces generated from these scenarios must not be rebaselined without semantic diff review and reviewer approval.
split_outcome_categories:
  - prep
  - gate
  - cap
  - tiebreaker
  - execute
  - approval
  - review
  - no_review
  - override
split_outcome_refresh_rule: Refresh split-outcome hashes only when the referenced deterministic tests or fixtures change under reviewer-approved semantic diff review.
split_outcome_authority_rule: Split-outcome scenario records are evidence-only; canonical .pypeline and named native workflow code remain the only route authority.
split_outcome_records:
  - id: prep-suspend-resume
    path_classes: [prep]
    scenario_refs: [D1-prep-plan]
    row_ids: [prep-clarification-gate, human-decision-suspension]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_native_golden_traces.py
        case_ids: [D1-prep-plan]
      - path: tests/arnold_pipelines/megaplan/test_compositional_workflow.py
        case_ids: [test_human_gate_continue_resumes_into_proceed_path]
    expected_outcomes:
      - blocking_questions_suspend
      - resume_clarify
      - no_pre_resume_plan_artifact
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D1-prep-plan/events.ndjson
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D1-prep-plan/checkpoint.json
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D1-prep-plan/stages.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/workflows/planning.py
    route_authority: false
  - id: gate-reprompt-downgrade
    path_classes: [gate]
    scenario_refs: [D3-gate-preflight, D4-gate-revise]
    row_ids: [gate-preflight-normalization, gate-signal-reprompt, gate-flag-debt-fallback]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_native_golden_traces.py
        case_ids: [D3-gate-preflight, D4-gate-revise]
      - path: tests/arnold_pipelines/megaplan/test_compositional_workflow.py
        case_ids:
          - test_iterate_route_reaches_revise_before_looping
          - test_abort_path_stops_at_halt
    expected_outcomes:
      - malformed_payload_recovery
      - unresolved_flag_reprompt
      - high_complexity_downgrade
      - iterate_to_revise
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D3-gate-preflight/events.ndjson
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D3-gate-preflight/checkpoint.json
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D4-gate-revise/events.ndjson
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D4-gate-revise/checkpoint.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/handlers/gate.py
    route_authority: false
  - id: cap-exhaustion-distinctions
    path_classes: [cap]
    scenario_refs: [D4-gate-revise, D10-review-caps]
    row_ids: [typed-loop-outcomes, review-retry-cap-outcomes, execute-review-rework-loop]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_handler_behaviors.py
        case_ids:
          - test_resolve_review_outcome_emits_rework_signal
          - test_newly_failing_deterministic_check_is_blocking
          - test_review_approval_fails_when_finalize_tasks_lack_execute_authority
      - path: tests/arnold_pipelines/megaplan/test_native_golden_manifest.py
        case_ids:
          - test_review_needs_rework_has_loop_config
          - test_review_needs_rework_has_cap_exhaustion_artifacts
    expected_outcomes:
      - repeated_failure_cap
      - request_rework
      - blocking_deterministic_failure
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/golden_artifacts/review_needs_rework.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/handlers/review.py
    route_authority: false
  - id: tiebreaker-rejoin-and-escalate
    path_classes: [tiebreaker]
    scenario_refs: [D5-tiebreaker]
    row_ids: [tiebreaker-subworkflow, path-addressed-checkpoints, human-decision-suspension]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_handler_behaviors.py
        case_ids:
          - test_proceed_decision_positions_for_gate_finalize_path
          - test_iterate_signal_from_replan_positions_for_revise_rejoin
          - test_escalate_decision_routes_to_awaiting_human
          - test_tiebreaker_replan_rejoins_ordinary_path_and_does_not_bypass_finalize
      - path: tests/arnold_pipelines/megaplan/test_native_golden_traces.py
        case_ids: [D5-tiebreaker]
    expected_outcomes:
      - proceed
      - iterate
      - escalate_to_human
      - replan_route
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D5-tiebreaker/events.ndjson
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D5-tiebreaker/checkpoint.json
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D5-tiebreaker/state.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/handlers/_tiebreaker_impl.py
    route_authority: false
  - id: execute-batch-resume
    path_classes: [execute]
    scenario_refs: [D7-execute-dag, D12-runtime-trace]
    row_ids: [execute-dependency-batches, path-addressed-checkpoints, autodrive-event-liveness]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_execute_s4_behavior_parity.py
        case_ids:
          - test_batch_two_of_four_block_resume_reruns_only_blocked_batch
          - test_partial_failure_resume_preserves_success_outputs_and_evidence_refs
          - test_batch_ordering_and_s4_paths_are_deterministic
      - path: tests/arnold_pipelines/megaplan/test_native_golden_traces.py
        case_ids: [D7-execute-dag]
    expected_outcomes:
      - dependency_ordering
      - partial_failure_resume
      - stable_batch_paths
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/golden_artifacts/execute_failure_resume.json
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D7-execute-dag/events.ndjson
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D7-execute-dag/checkpoint.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/execute/policy.py
    route_authority: false
  - id: approval-gate-split-outcomes
    path_classes: [approval]
    scenario_refs: [D8-execute-gates]
    row_ids: [execute-approval-gates, human-decision-suspension]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_execute_s4_behavior_parity.py
        case_ids: [test_destructive_approval_split_outcomes_are_policy_visible]
      - path: tests/arnold_pipelines/megaplan/test_native_golden_traces.py
        case_ids: [D8-execute-gates]
    expected_outcomes:
      - approved
      - denied_missing_confirm
      - denied_missing_approval
      - approval_resume
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D8-execute-gates/events.ndjson
      - tests/arnold_pipelines/megaplan/fixtures/native_goldens/D8-execute-gates/checkpoint.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/execute/policy.py
    route_authority: false
  - id: review-rework-and-human-verify
    path_classes: [review]
    scenario_refs: [D10-review-caps]
    row_ids: [execute-review-rework-loop, review-retry-cap-outcomes]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_handler_behaviors.py
        case_ids:
          - test_resolve_review_outcome_emits_rework_signal
          - test_resolve_review_outcome_emits_deferred_human_signal
          - test_raw_review_output_needs_rework_cannot_be_normalized_to_approved
    expected_outcomes:
      - needs_rework
      - deferred_human
      - raw_rework_preserved
    deterministic_fixture_paths:
      - tests/arnold_pipelines/megaplan/fixtures/golden_artifacts/review_needs_rework.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/handlers/review.py
    route_authority: false
  - id: no-review-terminal
    path_classes: [no_review]
    scenario_refs: [D8-execute-gates, D13-policy-platform]
    row_ids: [execute-approval-gates, timeout-deadline-policy]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_execute_s4_behavior_parity.py
        case_ids: [test_bare_and_light_no_review_terminal_split_outcomes]
      - path: tests/arnold_pipelines/megaplan/test_path_resume_proofs.py
        case_ids:
          - test_non_protected_execute_routes_declare_no_review_to_done_contract
          - test_execute_terminal_projection_helpers_follow_source_policy_routes
    expected_outcomes:
      - terminate_done
      - terminate_awaiting_human
      - not_applicable_without_no_review
    deterministic_fixture_paths:
      - docs/arnold/megaplan-native-representation-boundary-fixtures/execute_no_review_terminal/manifest.json
      - docs/arnold/megaplan-native-representation-boundary-fixtures/execute_no_review_terminal/semantic_health.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/execute/policy.py
    route_authority: false
  - id: override-force-proceed-and-replan
    path_classes: [override]
    scenario_refs: [D11-human-control]
    row_ids: [override-action-surface, human-decision-suspension, model-routing-policy]
    executable_modules:
      - path: tests/arnold_pipelines/megaplan/test_handler_behaviors.py
        case_ids:
          - test_build_override_action_output_preserves_force_proceed_priority
          - test_override_replan_rejoins_ordinary_planning_path
          - test_override_replan_then_gate_finalize_does_not_bypass_finalize
      - path: tests/arnold_pipelines/megaplan/test_semantic_health.py
        case_ids:
          - test_active_override_without_receipt_generates_missing_authority_finding
          - test_override_authority_rejects_smuggled_declared_target_ref
    expected_outcomes:
      - force_proceed
      - replan
      - abort_authority_missing_receipt
      - resume_clarify_authority_scope
    deterministic_fixture_paths:
      - docs/arnold/megaplan-native-representation-boundary-fixtures/override_force_proceed_authority/manifest.json
      - docs/arnold/megaplan-native-representation-boundary-fixtures/override_resume_clarify_authority/manifest.json
    source_warrant_paths:
      - arnold_pipelines/megaplan/workflows/workflow.pypeline
      - arnold_pipelines/megaplan/handlers/override.py
    route_authority: false
scenarios:
  - id: D1-prep-plan
    slice: Prep/Plan
    owners:
      - native-python-pipelines-completion
      - native-composition-followup
      - native-platform-followup
    rows:
      - prep-clarification-gate
      - plan-artifact-version-metadata
      - human-decision-suspension
    required_cases:
      - blocking_questions_suspend
      - resume_clarify
      - no_pre_resume_plan_artifact
      - imported_criteria_declared_outputs
    topology_requirements:
      - prep_branch_visible
      - human_resume_coordinate_visible
    false_pass_guard: Prep handler cannot set awaiting-human state without a visible suspension route.
    deferrals:
      - aspect: durable-suspension-persistence
        owner: native-platform-followup
        blocking_proof:
          - platform-m4-suspend-resume-durability-tests
          - process-death-resume-from-platform-store
        reason: Suspension durability (process-death resume, DB-backed wait state) requires platform storage and broker infrastructure not available in composition-only tests.
      - aspect: plan-artifact-schema-hardening
        owner: native-python-pipelines-completion
        blocking_proof:
          - completion-m5-artifact-manifest-schema-tests
        reason: Artifact schema finalization and version-metadata lock-in owned by completion chain closeout.
    composition_visible_checks:
      - hook: prep-clarification-gate-visible
        check: Compiled workflow shows prep→suspend branch rather than single prep handler node.
      - hook: plan-boundary-declared
        check: Plan phase inputs/outputs/artifacts are declared at workflow boundary, not hidden in handler.
      - policy: human-suspension-coordinate
        check: Rendered policy view includes human suspension coordinate with path-addressed resume target.
  - id: D2-critique
    slice: Critique
    owners:
      - native-composition-followup
    rows:
      - critique-bare-skip
      - critique-evaluator-retry
      - critique-parallel-lenses
      - dynamic-parallel-map
    required_cases:
      - bare_skip
      - evaluator_retry_success
      - evaluator_retry_exhaustion
      - selected_lens_parallel_fanout
      - sequential_fallback
    topology_requirements:
      - robustness_policy_visible
      - selected_lens_map_visible
      - reducer_visible
    false_pass_guard: A single critique handler node is not sufficient even if child traces exist.
    deferrals: []
    composition_visible_checks:
      - hook: robustness-variant-branch
        check: Bare/light/full robustness policy is visible as workflow branch or declared policy, not hidden in handler.
      - hook: evaluator-retry-policy
        check: Retry is visible at critique call site or declared as step policy; not buried in handle_critique.
      - hook: parallel-lens-fanout
        check: parallel_map node with reducer is visible in compiled topology; not single handler invocation.
  - id: D3-gate-preflight
    slice: Gate Preflight
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - gate-preflight-normalization
      - gate-flag-debt-fallback
    required_cases:
      - malformed_payload_recovery
      - empty_payload_recovery
      - unavailable_agent_route
      - high_complexity_downgrade
    topology_requirements:
      - preflight_route_visible
      - payload_recovery_policy_visible
    false_pass_guard: Bad payload fallback cannot remain only in handle_gate.
    deferrals:
      - aspect: flag-debt-platform-durability
        owner: native-platform-followup
        blocking_proof:
          - platform-m4-effect-event-trace-tests
          - platform-m6-debt-route-visible-in-final-topology
        reason: Debt flag recording and effect persistence require platform event ledger; composition ensures route visibility but not durable event storage.
    composition_visible_checks:
      - hook: preflight-normalization-route
        check: Malformed/empty payload recovery and agent-availability checks are named gate sub-decisions or declared policies.
      - hook: debt-fallback-route
        check: Flag resolution, debt recording, and downgrade routes are explicit effects/events/routes outside handler code.
      - policy: gate-payload-policy-preserved
        check: GATE_POLICY metadata on compiled workflow includes preflight/reprompt/downgrade routes.
  - id: D4-gate-revise
    slice: Gate/Revise
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - critique-gate-revise-loop
      - gate-signal-reprompt
      - gate-flag-debt-fallback
      - typed-loop-outcomes
    required_cases:
      - flag_resolution_success
      - unresolved_flag_reprompt
      - debt_acceptance
      - iterate_to_revise
      - cap_no_progress_block
      - cosmetic_force_proceed
    topology_requirements:
      - bounded_loop_visible
      - typed_outcomes_visible
      - severity_termination_visible
    false_pass_guard: State mutation to critique/revise cannot be the only loop expression.
    deferrals:
      - aspect: severity-termination-platform-enforcement
        owner: native-platform-followup
        blocking_proof:
          - platform-m4-severity-cap-tests
          - platform-m6-loop-termination-visible-in-topology
        reason: Severity-aware termination and cap/no-progress blocking require platform auto-drive liveness events; composition provides loop structure.
    composition_visible_checks:
      - hook: bounded-loop-visible
        check: Critique/gate/revise loop with typed outcomes (proceed, iterate, blocked, escalate) visible in workflow source.
      - hook: gate-reprompt-policy
        check: Reprompt retry and downgrade routes declared outside handler in GATE_POLICY metadata.
      - policy: revise-loop-policy-preserved
        check: Rendered topology includes bounded loop with termination conditions.
  - id: D5-tiebreaker
    slice: Tiebreaker
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - tiebreaker-subworkflow
      - path-addressed-checkpoints
      - human-decision-suspension
    required_cases:
      - researcher_branch
      - challenger_branch
      - pick_promotes_decision
      - escalate_to_human
      - replan_route
    topology_requirements:
      - subworkflow_visible
      - child_paths_stable
      - parent_promotion_visible
    false_pass_guard: One tiebreaker_run handler node does not satisfy this scenario.
    deferrals:
      - aspect: path-addressed-checkpoint-durability
        owner: native-platform-followup
        blocking_proof:
          - platform-m4-tree-trace-snapshot-tests
          - platform-m6-resume-from-path-with-platform-store
        reason: Path-addressed checkpoints need platform persistence for durable resume; composition proves path stability.
    composition_visible_checks:
      - hook: tiebreaker-subworkflow-visible
        check: Tiebreaker is declared subworkflow with researcher/challenger/decision/promotion visible in compiled topology.
      - hook: child-path-stability
        check: Child workflow paths are stable across runs; nested path identity preserved in traces.
      - policy: parent-promotion-policy
        check: Tiebreaker decision promotion route visible in rendered policy view.
  - id: D6-finalize
    slice: Finalize
    owners:
      - native-python-pipelines-completion
      - native-composition-followup
    rows:
      - finalize-fallback-routes
      - plan-artifact-version-metadata
    required_cases:
      - task_generation
      - scoped_baseline_selection
      - full_baseline_selection
      - missing_scoped_baseline_fallback
      - user_actions_declared
      - finalize_failure_to_revise
      - before_execute_gate
    topology_requirements:
      - finalize_failure_route_visible
      - artifact_contract_visible
    false_pass_guard: Finalize errors cannot be swallowed into artifact flags.
    deferrals:
      - aspect: baseline-selection-platform-hook
        owner: native-platform-followup
        blocking_proof:
          - platform-m5-baseline-selection-tests
          - platform-m6-finalize-baseline-route-visible
        reason: Scoped/full baseline selection and before-execute gate require platform test harness integration; composition declares the routes.
    composition_visible_checks:
      - hook: finalize-fallback-routes-visible
        check: Finalize failure/fallback routes visible in topology; not swallowed into artifact flags.
      - hook: artifact-contract-declared
        check: Plan artifact inputs/outputs declared at workflow boundary with schema validation.
      - policy: finalize-policy-preserved
        check: FINALIZE_POLICY metadata includes scoped/full baseline selection and before-execute gate routes.
  - id: D7-execute-dag
    slice: Execute DAG
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - execute-dependency-batches
      - dynamic-parallel-map
      - model-routing-policy
      - path-addressed-checkpoints
    required_cases:
      - dependency_ordering
      - runtime_task_batch_map
      - partial_failure_resume
      - task_complexity_model_route
    topology_requirements:
      - execute_subworkflow_or_dag_visible
      - task_paths_stable
      - dependency_edges_visible
    false_pass_guard: Execute cannot remain one handler-backed stage with richer logs.
    deferrals:
      - aspect: worker-batch-platform-hardening
        owner: native-platform-followup
        blocking_proof:
          - platform-m5-dag-worker-concurrency-tests
          - platform-m6-partial-failure-resume-from-platform-store
        reason: Dependency-aware worker batching and partial failure resume need platform worker supervision and durable state.
    composition_visible_checks:
      - hook: execute-dag-visible
        check: Execute is not one handler-backed stage; dependency-aware task batches visible as subworkflow or DAG primitive.
      - hook: task-path-stability
        check: Task paths stable across runs; partial_failure_resume preserves path identity.
      - policy: execute-policy-preserved
        check: EXECUTE_POLICY metadata includes batch gate, dependency edges, and escalation routes.
  - id: D8-execute-gates
    slice: Execute Gates
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - execute-approval-gates
      - human-decision-suspension
      - override-action-surface
    required_cases:
      - approval_approve
      - approval_deny
      - approval_cancel
      - approval_resume
      - no_review_to_done
      - deferred_human_verify
      - protected_action_gate
    topology_requirements:
      - protected_action_gate_visible
      - no_review_route_visible
      - deferred_human_route_visible
    false_pass_guard: Approval hidden in state meta or user_approved_gate is insufficient.
    deferrals:
      - aspect: protected-action-platform-gate
        owner: native-platform-followup
        blocking_proof:
          - platform-m2-brokered-credential-gate-tests
          - platform-m4-approval-deny-cancel-resume-tests
          - platform-m6-protected-action-route-visible
        reason: Protected action gates and credential-brokered approval require platform security infrastructure; composition declares the gate routes.
    composition_visible_checks:
      - hook: approval-gates-visible
        check: Approval/deny/cancel/resume routes visible as declared suspension/effect gates before protected execution.
      - hook: no-review-route-visible
        check: No-review-to-done and deferred-human-verify routes visible in topology.
      - policy: execute-gate-policy-preserved
        check: Rendered policy view shows protected_action_gate, no_review route, and deferred human route.
  - id: D9-review-fanout
    slice: Review Fanout
    owners:
      - native-composition-followup
    rows:
      - review-parallel-fanin
      - dynamic-parallel-map
    required_cases:
      - selected_review_checks_parallel
      - reducer_ordering
      - infra_retry
    topology_requirements:
      - review_check_children_visible
      - reducer_visible
      - ordering_deterministic
    false_pass_guard: Parallel checks running inside review handler is insufficient.
    deferrals: []
    composition_visible_checks:
      - hook: review-fanout-visible
        check: Review fanout and reducer visible as parallel_map node in compiled topology; not single handler invocation.
      - hook: deterministic-ordering
        check: Reducer ordering is deterministic and visible in rendered policy.
      - policy: review-fanout-policy-preserved
        check: REVIEW_POLICY metadata includes parallel check children and reducer.
  - id: D10-review-caps
    slice: Review Caps
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - execute-review-rework-loop
      - review-retry-cap-outcomes
      - typed-loop-outcomes
    required_cases:
      - approve
      - request_rework
      - block
      - recoverable_block_escalation
      - repeated_failure_cap
      - force_proceed_distinction
    topology_requirements:
      - review_rework_loop_visible
      - cap_outcome_visible
      - recoverable_block_route_visible
    false_pass_guard: Cap-exhausted blockers cannot be represented only by STATE_BLOCKED/resume_cursor/current_state/next_step mutation.
    deferrals:
      - aspect: infrastructure-retry-platform-hardening
        owner: native-platform-followup
        blocking_proof:
          - platform-m4-infra-retry-golden-tests
          - platform-m5-repeated-failure-cap-tests
          - platform-m6-force-proceed-block-routes-visible
        reason: Infra retry, repeated failure caps, and force-proceed/block distinction need platform retry infrastructure; composition declares the cap outcome routes.
    composition_visible_checks:
      - hook: review-rework-loop-visible
        check: Review can approve/request-rework/block/force-proceed/escalate through explicit loop; not hidden in handler mutation.
      - hook: cap-outcome-visible
        check: Cap exhaustion outcome classifier visible outside retained handler.
      - policy: review-cap-policy-preserved
        check: REVIEW_POLICY metadata includes rework loop bounds, cap outcomes, and recoverable block escalation routes.
  - id: D11-human-control
    slice: Human/Control
    owners:
      - native-composition-followup
      - native-platform-followup
    rows:
      - override-action-surface
      - human-decision-suspension
      - model-routing-policy
    required_cases:
      - add_note
