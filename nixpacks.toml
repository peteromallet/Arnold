# Don't override [phases.setup] — that disables nixpacks's Node provider,
# which pins us to whatever `nodejs_20` resolves to in the pinned nixpkgs
# snapshot (20.6.1, below package.json engines.node and below several
# @csstools/* deps' >=20.19.0). With no [phases.setup] block, nixpacks's
# Node provider runs and reads NIXPACKS_NODE_VERSION (set in railway.toml)
# to download the right version via fnm, sidestepping the snapshot.
# openssl is added back via NIXPACKS_PKGS in railway.toml for native deps.

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run serve"
