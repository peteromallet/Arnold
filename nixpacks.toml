# Working baseline. nodejs_20 in the pinned nixpacks snapshot resolves to
# 20.6.1, below package.json engines.node >=20.9.0 — npm prints EBADENGINE
# warnings on every build but install succeeds and the build runs.
#
# Tried and failed to bump beyond 20.6.1 from this file alone:
#   1. nixPkgs = ["nodejs_22", "openssl"]   → nix-env can't resolve nodejs_22 in the snapshot
#   2. nixPkgs = ["openssl"]                → no Node installed, "npm: command not found"
#   3. removed [phases.setup] entirely      → same, Node provider didn't auto-engage
#   4. NIXPACKS_NODE_VERSION in railway.toml → not picked up at build time
#
# Real ways to actually bump Node (each requires action outside this file):
#   a. Set NIXPACKS_NODE_VERSION=20 directly in Railway service Variables
#      (Dashboard → Service → Variables tab). This DOES propagate to the
#      build step and makes nixpacks's Node provider download Node 20.x
#      via fnm, sidestepping the snapshot entirely.
#   b. Replace nixpacks with a Dockerfile pinned to `node:20-alpine` or
#      similar. Bigger change but full control over the runtime image.
#
# Until either is done, leave nodejs_20 here. The warnings are noise.
[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run serve"
