[phases.setup]
# Pinned nixpkgs snapshot resolves `nodejs_20` to 20.6.1, which is below
# package.json's `engines.node >=20.9.0` and below the >=20.19.0 several
# @csstools/* deps want. npm warns (EBADENGINE) but still installs. To
# bump beyond 20.6.1, set `NIXPACKS_NODE_VERSION` (e.g. 20 or 22) in the
# Railway service's environment variables — that route is independent of
# the nixpkgs snapshot. Keeping `nodejs_20` here as a working fallback.
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run serve" 