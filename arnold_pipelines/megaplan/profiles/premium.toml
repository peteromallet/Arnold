# `premium` — tier 4 (premium). Single-vendor premium for every phase.
#
# Claude (default vendor) handles everything — plan, prep, critique, revise,
# gate, finalize, execute, loop_*, review, tiebreakers — at `:low` depth.
# No DeepSeek: one premium model's judgment on every phase, clean
# single-vendor audit trail. Pair with `--robustness thorough` for the most
# complex of these.
#
# Use for production-critical work: schema definitions, wire formats,
# security-critical code paths, public API contracts, migration logic running
# against production data, kernel-invariant changes (data structures
# everything downstream depends on). The tier where regression =
# production incident or worse.
#
# This is functionally a renamed `all-claude` at `:low` depth. The rubric
# defaults to `:low` here (per dial-3: premium-at-low is the right floor;
# bump depth on specific phases when you can name the reason).
#
# Flag interactions:
#
#   * `--vendor codex` — flips every `claude:low` slot to `codex:low`. This
#     is the way to get the codex variant of tier 4; there is no separate
#     `premium-codex` profile.
#   * `--critic cross` — overrides critique+review to the other premium.
#   * `--phase-model phase=spec` — always honored. Common pattern:
#     `--phase-model plan=claude:high` for hard plans.
#
# See docs/megaplan-prep.md for the full rubric.
[profiles.premium]
# Adaptive critique on by default: premium-bearing profile, so the
# critique-evaluator can direct the critic with a premium evaluator.
adaptive_critique = true
plan                  = "premium:low"
prep                  = "premium:low"
critique              = "premium:low"
critique_evaluator    = "premium:low"
revise                = "premium:low"
gate                  = "premium:low"
finalize              = "premium:low"
execute               = "premium:low"
feedback              = "premium:low"
loop_plan             = "premium:low"
loop_execute          = "premium:low"
review                = "premium:low"
tiebreaker_researcher = "premium:low"
tiebreaker_challenger = "premium:low"

[profiles.premium.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-pro"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "hermes:deepseek:deepseek-v4-pro"
5 = "claude:claude-sonnet-4-6"
6 = "claude:claude-sonnet-4-6"
7 = "claude:claude-opus-4-7"
8 = "claude:claude-opus-4-7"
9 = "claude:claude-opus-4-7"
10 = "claude:claude-opus-4-7"

[profiles.premium.tier_models.critique]
1 = "hermes:deepseek:deepseek-v4-pro"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "claude:claude-sonnet-4-6"
4 = "claude:claude-opus-4-7"
5 = "claude:claude-opus-4-7"
