# `apex` — tier 5. Both Claude *and* Codex contributing to the same job.
# Vendor-locked.
#
# Canonical name for the tier-5 profile. This is the canonical
# Claude/Codex split.
# Claude handles the author/repo-reading roles (plan, prep, revise, gate,
# finalize, loop_plan); Codex handles the critique/structural-analysis roles
# (critique, execute, review, loop_execute, tiebreakers). The whole point of
# this tier is combining their different strengths, so vendor choice doesn't
# apply.
#
# Use when one premium model's depth isn't enough and you want two minds
# working together: concurrency primitives, schemas downstream sprints will
# build on, wire formats, multi-system migration decisions, big architectural
# choices where downstream sprints all depend on the outcome here. Trigger
# conditions are (1) high stakes — regression = production incident or worse
# — or (2) the sprint is *making* a big architectural decision, not just
# implementing one already made.
#
# Flag interactions:
#
#   * `--vendor claude|codex` — REJECTED. This tier is vendor-locked; the
#     Claude/Codex split is the whole rationale and can't be collapsed to a
#     single vendor. The loader raises `vendor_locked_profile`.
#   * `--critic cross` — REJECTED for the same reason. The Codex critic
#     is structural to the recipe; swapping it would change the tier's
#     identity, not its tuning.
#   * `--phase-model phase=spec` — still honored; it's the legitimate way to
#     bump depth on a specific phase (e.g. `plan=claude:high` for hard plans).
#
# See docs/megaplan-prep.md for the full rubric.
[profiles.apex]
vendor_locked         = true
# Adaptive critique on by default: premium-bearing profile, so the
# critique-evaluator can direct the critic with a premium evaluator.
adaptive_critique = true
plan                  = "claude"
prep                  = "claude"
critique              = "codex"
critique_evaluator    = "claude"
revise                = "claude"
gate                  = "claude"
finalize              = "claude"
execute               = "codex"
feedback              = "claude:low"
loop_plan             = "claude"
loop_execute          = "codex"
review                = "codex"
tiebreaker_researcher = "codex"
tiebreaker_challenger = "codex"

[profiles.apex.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-pro"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "hermes:deepseek:deepseek-v4-pro"
5 = "claude:claude-sonnet-4-6"
6 = "claude:claude-sonnet-4-6"
7 = "claude:claude-sonnet-4-6"
8 = "claude:claude-sonnet-4-6"
9 = "claude:claude-opus-4-7"
10 = "claude:claude-opus-4-7"

[profiles.apex.tier_models.critique]
1 = "hermes:deepseek:deepseek-v4-pro"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "claude:claude-sonnet-4-6"
5 = "claude:claude-opus-4-7"
