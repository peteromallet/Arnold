# `variable-codex` — tier-route execute by task complexity. Vendor-locked
# to Codex; ignores --vendor / --critic flags.
#
# Non-execute phases are all-Codex. Execute dispatch picks the cheapest safe
# model per batch using the [tier_models.execute] table, with DeepSeek for
# low-complexity work, codex:medium for complexity-4, and codex:high for
# complexity-5.
#
# The flat ``execute`` entry is the fallback when tier routing is disabled
# (e.g. --phase-model execute=...).
#
# Tier rubric:
#   1 = trivial single-file mechanical change
#   2 = simple change with tests to update
#   3 = multi-file change with non-trivial logic
#   4 = cross-cutting change with architecture implications
#   5 = fundamental system change with high regression risk
#
# Flag interactions:
#   * `--vendor claude` — silently ignored (vendor_locked=true).
#   * `--critic cross` — silently ignored (vendor_locked=true).
#   * `--depth <level>` — honored; depth is independent of vendor lock.
#   * `--phase-model execute=...` — disables tier routing; explicit spec wins.
#   * `--deepseek-provider direct` — keeps DeepSeek specs on the official
#     DeepSeek API (tiers 1-3).
[profiles.variable-codex]
vendor_locked = true
plan = "codex"
prep = "codex"
critique = "codex"
revise = "codex"
gate = "codex"
finalize = "codex"
execute = "codex:medium"
feedback              = "codex:low"
loop_plan = "codex"
loop_execute = "codex"
review = "codex"
tiebreaker_researcher = "codex"
tiebreaker_challenger = "codex"

[profiles.variable-codex.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:deepseek:deepseek-v4-flash"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "hermes:deepseek:deepseek-v4-pro"
5 = "hermes:deepseek:deepseek-v4-pro"
6 = "hermes:deepseek:deepseek-v4-pro"
7 = "codex:medium"
8 = "codex:medium"
9 = "codex:high"
10 = "codex:high"

[profiles.variable-codex.tier_models.critique]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "codex:medium"
5 = "codex:high"
