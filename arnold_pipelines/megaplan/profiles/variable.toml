# `variable` — tier-route execute by task complexity. Unlocked; Claude as
# premium base; honors --vendor codex (flips premium tier entries).
#
# Non-execute phases use a partnered-style layout: Claude for reasoning
# (plan, critique, revise, review, loop_plan, tiebreakers, feedback),
# DeepSeek V4 Pro for the mechanical phases (prep, gate, loop_execute).
#
# finalize is PREMIUM (claude:medium, flips with --vendor) — it adjudicates the
# 1–5 complexity that drives execute routing, and that table reaches Claude at
# tiers 4–5, so the scorer must be at least as strong as the model it can
# dispatch to. A DeepSeek finalize here could mis-score a tier-5 task low and
# silently route it to a model that fails it.
#
# Execute dispatch picks the cheapest safe model per batch using the
# [tier_models.execute] table below.  The flat ``execute`` entry is the
# fallback when tier routing is disabled (e.g. --phase-model execute=...).
#
# Tier rubric:
#   1 = trivial single-file mechanical change
#   2 = simple change with tests to update
#   3 = multi-file change with non-trivial logic
#   4 = cross-cutting change with architecture implications
#   5 = fundamental system change with high regression risk
#
# Tiers 4–5 use effort suffixes (``claude:low``, ``claude``) so that
# ``--vendor`` and ``--depth`` can rewrite them at runtime.  This differs
# from ``variable-claude``, which pins concrete model names on tiers 4–5
# because ``vendor_locked=true`` prevents rewriting and concrete pins
# guarantee reproducibility regardless of future defaults.
#
# Flag interactions:
#   * `--vendor codex` — flips premium tier entries 4-5 from claude→codex;
#     DeepSeek tiers 1-3 stay put.
#   * `--critic cross` — overrides critique+review to the *other* premium
#     relative to the resolved vendor.
#   * `--phase-model execute=...` — disables tier routing entirely; the
#     explicit spec wins for every batch.
#   * `--deepseek-provider direct` — keeps DeepSeek specs on the official
#     DeepSeek API (tiers 1-3).
[profiles.variable]
plan                  = "premium:low"
prep                  = "hermes:deepseek:deepseek-v4-pro"
critique              = "premium:low"
revise                = "premium:low"
gate                  = "hermes:deepseek:deepseek-v4-pro"
finalize              = "premium:medium"
execute               = "hermes:deepseek:deepseek-v4-flash"
feedback              = "premium:low"
loop_plan             = "premium:low"
loop_execute          = "hermes:deepseek:deepseek-v4-pro"
review                = "premium:low"
tiebreaker_researcher = "premium:low"
tiebreaker_challenger = "premium:low"

[profiles.variable.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:deepseek:deepseek-v4-flash"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "hermes:deepseek:deepseek-v4-pro"
5 = "premium:low"
6 = "premium:low"
7 = "premium:low"
8 = "premium:low"
9 = "premium:low"
10 = "premium:low"

[profiles.variable.tier_models.critique]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "premium:low"
5 = "premium"
