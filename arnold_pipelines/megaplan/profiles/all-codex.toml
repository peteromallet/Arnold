# `all-codex` — single-vendor Codex (GPT-5.5) end to end, for users who have
# ONLY OpenAI/Codex credentials. The Codex counterpart to `all-claude`:
# every reasoning phase runs on the flagship model; vendor_locked so --vendor
# / --critic are silently ignored.
#
# Execute is complexity-routed WITHIN Codex (see tier_models.execute), but the
# lever is **reasoning effort**, not a cheaper model — Codex has no
# Haiku-class budget model to drop to, so cheap tasks run the same model at
# `minimal`/`low` effort (fewer reasoning tokens = cheaper) and the hardest
# tasks run at `high`. The flat `execute = "codex"` entry (default effort) is
# the fallback when tier routing is disabled (e.g. --phase-model execute=…).
#
# Note: `feedback` is Codex too. It only runs under --with-feedback, but a
# Codex-only profile must remain Codex-only when the optional slot is enabled.
[profiles.all-codex]
vendor_locked = true
plan = "codex"
prep = "codex"
critique = "codex"
critique_evaluator = "codex"
revise = "codex"
gate = "codex"
finalize = "codex"
execute = "codex"
feedback              = "codex:low"
loop_plan = "codex"
loop_execute = "codex"
review = "codex"
tiebreaker_researcher = "codex"
tiebreaker_challenger = "codex"

# Prep models: keep research evidence-gathering inside Codex (read-only).
[profiles.all-codex.prep_models]
triage = "codex:gpt-5.4"
fanout = "codex:gpt-5.4"
distill = "codex:gpt-5.4"

# Within-Codex execute routing by adjudicated task complexity (1–5). Effort
# suffixes, not model pins — Codex's cost lever is reasoning depth. --depth
# does not rewrite these (execute is not an author phase), so the ladder is
# stable.
[profiles.all-codex.tier_models.execute]
1 = "codex:minimal"
2 = "codex:low"
3 = "codex:low"
4 = "codex:medium"
5 = "codex:high"
6 = "codex:high"
7 = "codex:high"
8 = "codex:high"
9 = "codex:high"
10 = "codex:high"

[profiles.all-codex.tier_models.critique]
1 = "codex:minimal"
2 = "codex:low"
3 = "codex:low"
4 = "codex:medium"
5 = "codex:high"
