# `variable-claude` — tier-route execute by task complexity. Vendor-locked
# to Claude; ignores --vendor / --critic flags.
#
# Non-execute phases are all-Claude. Execute dispatch picks the cheapest
# safe model per batch using the [tier_models.execute] table, with
# DeepSeek for low-complexity work and Claude for high-complexity work.
#
# The flat ``execute`` entry is the fallback when tier routing is disabled
# (e.g. --phase-model execute=...).
#
# Tier rubric:
#   1 = trivial single-file mechanical change
#   2 = simple change with tests to update
#   3 = multi-file change with non-trivial logic
#   4 = cross-cutting change with architecture implications
#   5 = fundamental system change with high regression risk
#
# Tiers 4–5 use concrete model pins (``claude:claude-sonnet-4-6`` and
# ``claude:claude-opus-4-7``) rather than effort suffixes (``claude:low``,
# ``claude``).  This is intentional because ``vendor_locked=true`` disables
# ``--vendor`` and ``--depth`` rewriting on locked profiles, so effort
# suffixes provide no benefit.  Concrete pins guarantee the exact model used
# regardless of future vendor defaults — a reproducibility safeguard for
# the highest-complexity tiers.
#
# Flag interactions:
#   * `--vendor codex` — silently ignored (vendor_locked=true).
#   * `--critic cross` — silently ignored (vendor_locked=true).
#   * `--depth <level>` — honored for effort-suffix entries (flat phases
#     and tiers 1–3); concrete model pins (tiers 4–5) are unaffected.
#   * `--phase-model execute=...` — disables tier routing; explicit spec wins.
#   * `--deepseek-provider direct` — keeps DeepSeek specs on the official
#     DeepSeek API (tiers 1-3).
[profiles.variable-claude]
vendor_locked = true
plan                  = "claude"
prep                  = "claude"
critique              = "claude"
revise                = "claude"
gate                  = "claude"
finalize              = "claude"
execute               = "hermes:deepseek:deepseek-v4-flash"
feedback              = "claude:low"
loop_plan             = "claude"
loop_execute          = "claude"
review                = "claude"
tiebreaker_researcher = "claude"
tiebreaker_challenger = "claude"

[profiles.variable-claude.tier_models.execute]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:deepseek:deepseek-v4-flash"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "hermes:deepseek:deepseek-v4-pro"
5 = "hermes:deepseek:deepseek-v4-pro"
6 = "hermes:deepseek:deepseek-v4-pro"
7 = "claude:claude-sonnet-4-6"
8 = "claude:claude-sonnet-4-6"
9 = "claude:claude-opus-4-7"
10 = "claude:claude-opus-4-7"

[profiles.variable-claude.tier_models.critique]
1 = "hermes:deepseek:deepseek-v4-flash"
2 = "hermes:deepseek:deepseek-v4-pro"
3 = "hermes:deepseek:deepseek-v4-pro"
4 = "claude:claude-sonnet-4-6"
5 = "claude:claude-opus-4-7"
