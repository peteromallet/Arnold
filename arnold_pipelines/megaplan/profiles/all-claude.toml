# `all-claude` — Claude end to end (not vendor_locked; --vendor codex works), for users who have ONLY
# Anthropic credentials (no DeepSeek / Fireworks / Codex keys). This is the
# Claude-only counterpart to `solo`: where the tiered profiles (solo /
# directed / partnered / …) push cheap work to DeepSeek, `all-claude` keeps
# everything inside the Claude family.
#
# Every *reasoning* phase runs on flagship Opus (the `claude` slots below) —
# pair with --robustness thorough for kernel-invariant changes, contract
# definition, anything where regression = production incident. Pick over
# `all-codex` based on user preference, credits, or which model has done
# better on similar work.
#
# Execute is complexity-routed WITHIN the Claude family (see the
# tier_models.execute table): trivial tasks drop to Haiku, mid-complexity to
# Sonnet, and only the hardest (4–5) reach Opus. This mirrors the cost
# discipline of the tiered profiles without ever leaving Claude, so a
# Claude-only user doesn't pay Opus rates for a one-line mechanical change.
# The flat `execute = "claude"` entry below is the fallback when tier routing
# is disabled (e.g. --phase-model execute=…); reasoning quality is unchanged
# because plan/critique/gate/review stay on Opus.
# (Personality: Adrian Monk — solo virtuoso obsessed with thoroughness.)
[profiles.all-claude]
plan                  = "claude"
prep                  = "claude"
critique              = "claude"
revise                = "claude"
gate                  = "claude"
finalize              = "claude"
execute               = "claude"
feedback              = "claude"
loop_plan             = "claude"
loop_execute          = "claude"
review                = "claude"
tiebreaker_researcher = "claude"
tiebreaker_challenger = "claude"

# Within-Claude execute routing by adjudicated task complexity (1–5). Keeps a
# Claude-only run cheap on trivial work without touching reasoning quality.
# Tiers are MODEL pins (not effort suffixes) — the whole point is to use a
# cheaper *model* for cheap work. --vendor codex swaps these to their Codex
# capability equivalents (haiku/sonnet → gpt-5.4, opus → gpt-5.5).
# Prep models: keep research evidence-gathering inside Claude (read-only).
[profiles.all-claude.prep_models]
triage = "claude:claude-sonnet-4-6"
fanout = "claude:claude-sonnet-4-6"
distill = "claude:claude-sonnet-4-6"

[profiles.all-claude.tier_models.execute]
1 = "claude:claude-haiku-4-5"
2 = "claude:claude-sonnet-4-6"
3 = "claude:claude-sonnet-4-6"
