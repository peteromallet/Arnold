# ── Cross-cutting validation rules ──────────────────────────────────────
# Rules applied during inventory validation regardless of row kind.
validation_rules:
  # M6 is observe-only: the inventory generator must not execute mutating
  # commands.  Allowed operations are read-only.
  allowed_operations:
    - "read_file"
    - "list_directory"
    - "parse_json"
    - "parse_yaml"
    - "parse_python_ast"
    - "compute_hash"
    - "git_show"
    - "git_ls_tree"
    - "git_rev_parse"
    - "import_module"
  forbidden_operations:
    - "write_file"
    - "delete_file"
    - "execute_command"
    - "mutate_state"
    - "git_commit"
    - "git_push"
    - "pip_install"
    - "database_write"
    - "queue_publish"
    - "notification_send"

  # Every row must have an owner.  If the owner cannot be determined,
  # it must be set to "UNKNOWN" explicitly — never omitted, null, or
  # defaulted to an empty string.
  owner_required_for_all_rows: true
  unknown_owner_sentinel: "UNKNOWN"

  # Support-manifest labels, schema-only ledgers, fixture emitters,
  # receipts, status snapshots, projections, and liveness must never
  # become positive action authority.
  non_authority_surface_types:
    types:
      - "projection"
      - "status_snapshot"
      - "liveness_check"
      - "support_label"
      - "schema_only_ledger"
      - "fixture_emitter"
      - "receipt"
    description: >
      These surface types are informational/observational only.
      They must not be classified as positive action authority
      (i.e., must not appear in authority-reader or controlled-writer
      registries with authority claims).

  # Historical adapters default to empty unless repo evidence proves
  # read-only adapters with explicit path/symbol, allowed reads,
  # versions, zero-authority proof, owner/approver, expiry, and
  # deletion gate.
  historical_adapter_default: "empty"

  # Unknown denominators and missing baselines remain UNKNOWN,
  # never 0, false, or implicitly accepted.
  unavailable_denominator_sentinel: "UNKNOWN"

  # Default-deny for unresolved dynamic/generated/provider surfaces.
  default_deny_unresolved: true
  default_deny_description: >
    Surfaces that cannot be resolved through static scanning,
    declaration parsing, or wrapper discovery are classified as
    default-deny rows.  They are recorded in the unmatched set
    with reason_unmatched set appropriately and owner=UNKNOWN.

# ── Classification categories ───────────────────────────────────────────
# Categories used to classify discovered surfaces in the inventory.
categories:
  producer:
    description: "Code path that produces/emits boundary transitions or receipts."
    sub_categories:
      - "handler_function"
      - "auto_matched"
      - "manual_emit"
      - "declared_only"
      - "unknown"
  consumer:
    description: "Code path that reads/consumes boundary declarations without mutating them."
  receipt_writer:
    description: "Code path that writes boundary receipts to durable storage."
  durable_ref:
    description: "Code path that manages durable references."
  payload_policy:
    description: "Code path that enforces payload policies."
  ledger:
    description: "Ledger module that records execution attempts or other durable events."
  journal:
    description: "Journal module for append-only event recording."
  projection:
    description: "Projection module that derives views from events.  NOT authority."
  repair_queue:
    description: "Repair queue that manages repair/retry cycles."
  authority_reader:
    description: "Module that reads authority facts for decision-making."
  authority_writer:
    description: "Module that writes/claims authority facts. Controlled surface."
  consumer_passive:
    description: "Passive consumer that observes without affecting workflow."
  compatibility_shim:
    description: "Compatibility adapter bridging legacy and current schemas."
  unknown:
    description: "Surface that could not be classified. Recorded as unmatched."
