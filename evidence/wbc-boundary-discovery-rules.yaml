        description: "Stable step/entry identifier."
      - name: "step_name"
        type: "string"
        owner_required: false
        allow_unknown: false
        description: "Human-readable name."
      - name: "kind"
        type: "string"
        owner_required: false
        allow_unknown: true
        description: "Kind of entry: native_function, step_transition, handler, etc."
      - name: "owner"
        type: "string"
        owner_required: true
        allow_unknown: false
