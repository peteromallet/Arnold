# WBC Boundary Discovery Rules
# Schema version: m6.wbc-discovery-rules.v1
# Generated by: M6 Step 3 — T3
# Timestamp: 2026-07-19T18:00:00Z
#
# This file defines the discovery roots, row-field requirements, and
# validation rules that the WBC boundary inventory generator (T4–T7)
# uses to scan, classify, and validate boundary surfaces.
#
# M6 is observe-only: these rules are declarative and do not mutate
# lifecycle state, queues, providers, delivery, notifications, source
# history, or runtime behavior.

meta:
  schema: "m6.wbc-discovery-rules.v1"
  description: >
    Discovery rules for the WBC boundary inventory generator.
    Defines roots to scan, required row fields per surface type,
    classification categories, and validation constraints that
    prevent over-permissive discovery or owner-less exceptions.
  generated_by: "M6 Step 3 (T3)"
  generated_at: "2026-07-19T18:00:00Z"

# ── Discovery roots ─────────────────────────────────────────────────────
# Each root is a directory path that the inventory generator scans.
# `category` classifies the root's surface type.
# `file_patterns` restricts scanning to matching files (glob).
# `required` means the root must exist and be scannable.
roots:
  - path: "arnold/workflow"
    category: "boundary_runtime"
    file_patterns:
      - "boundary_evidence.py"
      - "boundary_templates.py"
      - "boundary_conformance.py"
      - "boundary_compatibility.py"
      - "execution_attempt_ledger.py"
      - "durable_refs.py"
      - "payload_policy.py"
      - "source_compiler.py"
    required: true
    description: "Core WBC runtime modules defining BoundaryContract, templates, conformance, compatibility, and ledger types."

  - path: "arnold_pipelines/megaplan/workflows"
    category: "boundary_declarations"
    file_patterns:
      - "boundary_contracts.py"
      - "contract_to_producer_matrix.json"
      - "source_to_owner_matrix.json"
      - "support_manifest.json"
    required: true
    description: "WBC declaration artifacts: contract registry, producer matrix, owner matrix, and support manifest."

  - path: "arnold_pipelines/megaplan/handlers"
    category: "handler_functions"
    file_patterns:
      - "*.py"
    required: true
    description: "Megaplan handler functions that produce boundary transitions."

  - path: "arnold_pipelines/megaplan/execute"
    category: "execute_producers"
    file_patterns:
      - "*.py"
    required: true
    description: "Execute-phase batch dispatch and producer modules."

  - path: "arnold_pipelines/megaplan/orchestration"
    category: "orchestration"
    file_patterns:
      - "*.py"
    required: true
    description: "Orchestration modules: authority readers, critique runtime, chain execution."

  - path: "arnold/execution"
    category: "execution_runtime"
    file_patterns:
      - "*.py"
    required: true
    description: "Core execution runtime: observability, supervisor, task dispatch."

  - path: "arnold/kernel"
    category: "kernel"
    file_patterns:
      - "*.py"
    required: true
    description: "Kernel-level constructs: durable refs, payload policy, ledger primitives."

  - path: "arnold/supervisor"
    category: "supervisor"
    file_patterns:
      - "*.py"
    required: true
    description: "Supervisor modules: restart, resume, watchdog, cloud status."

  - path: "arnold/control"
    category: "control_plane"
    file_patterns:
      - "*.py"
    required: true
    description: "Control-plane modules: package boundary, import boundary."

  - path: "arnold_pipelines/megaplan"
    category: "megaplan_shell_wrappers"
    file_patterns:
      - "*.sh"
      - "*.py"
    required: false
    description: "Shell wrappers and top-level megaplan scripts. Optional — may not exist in all checkouts."

  - path: "docs/arnold"
    category: "documentation"
    file_patterns:
      - "workflow-boundary-contracts.md"
      - "*.md"
    required: false
    description: "Documentation artifacts that may contain boundary surface references."

# ── Row field requirements ──────────────────────────────────────────────
# For each surface type (row_kind), the required fields that every
# discovered row must populate.  Fields marked `owner_required: true`
# must have a non-empty, non-null owner value.  Fields marked
# `allow_unknown: true` may be set to "UNKNOWN" when evidence is
# unavailable, but must never be silently omitted.
row_kinds:
  boundary_contract:
    description: "A BoundaryContract instance from the contract registry or producer matrix."
    required_fields:
      - name: "boundary_id"
        type: "string"
        owner_required: false
        allow_unknown: false
        description: "Stable identifier for this boundary contract."
      - name: "workflow_id"
        type: "string"
        owner_required: false
        allow_unknown: false
        description: "Workflow scope identifier."
      - name: "row_id"
        type: "string"
        owner_required: false
        allow_unknown: true
        description: "Semantic evidence row ID."
      - name: "phase"
        type: "string"
        owner_required: false
        allow_unknown: true
        description: "BoundaryPhase value (prep, plan, critique, gate, revise, execute, etc.)."
      - name: "producer_path"
        type: "string"
        owner_required: false
        allow_unknown: true
        description: "Filesystem path or module reference to the producer."
      - name: "producer_category"
        type: "string"
        owner_required: false
        allow_unknown: true
        description: "How the boundary is produced: handler_function, auto_matched, manual_emit, declared_only, unknown."
      - name: "owner"
        type: "string"
        owner_required: true
        allow_unknown: false
        description: "Owning domain: run_authority, wbc, or maintenance."
      - name: "support_status"
        type: "string"
        owner_required: false
        allow_unknown: true
        description: "Support classification: supported, partial, planned, deprecated, non_conformant."
      - name: "authority_required"
        type: "boolean"
        owner_required: false
        allow_unknown: true
        description: "Whether this boundary requires authority records."
    validation:
      owner_must_be_known_domain: true
      known_owner_domains:
        - "run_authority"
        - "wbc"
        - "maintenance"

  authority_surface:
    description: "A surface entry from source_to_owner_matrix.json."
    required_fields:
