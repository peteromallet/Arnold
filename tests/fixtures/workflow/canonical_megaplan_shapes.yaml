  deferred_canonical_shapes:
    fanout_panel:
      reason: Static compile-time panel remains a DSL shape; M3-owned runtime-list fanout is covered by parallel_map in canonical_megaplan_topology.
      expected_diagnostic: AWF014_UNSUPPORTED_POLICY_CARRIER
    retry:
      reason: M3 lowers retry as a policy carrier, not as an explicit retry wrapper node.
    suspension_capability:
      reason: M3 lowers suspension as workflow policy/intrinsic carriers, not as a standalone capability-gated suspension node fixture.
    override_fallback:
      reason: M3 branch labels are literal decision routes; override/fallback route policy syntax is not supported.
    escalation:
      reason: M3 control transitions lower to policy slots, not explicit escalation edges.
    compensation:
      reason: M3 has no lowerable compensation carrier in this checkout.
    supervisor_promotion:
      reason: M3 has no supervisor promotion route syntax.
    feedback:
      reason: M3 allows only bounded review/rework loop backedges with loop policy.
    robustness_budget:
      reason: M3 deliberately diagnoses robustness/budget-like policy families without explicit carriers.
      expected_diagnostic: AWF014_UNSUPPORTED_POLICY_CARRIER
    dynamic_topology_overlay:
      reason: M3 source lowering does not expose dynamic topology overlay slots.
    tournament:
      reason: M3 source lowering does not expose tournament/tiebreaker syntax.
