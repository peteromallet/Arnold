# Canonical Megaplan-shaped semantic fixture matrix.
#
# This file stores deterministic expected shapes for the M2 explicit-node DSL
# compiler conformance suite.  Each shape is a product-neutral subset of nodes
# and edges that a compiled manifest must contain.  Node and edge IDs are
# prefixed by shape name to keep the matrix composable into a single pipeline.
# Full manifest hashes are intentionally omitted; conformance tests compare
# topology, refs, capabilities, suspension points, and control routes.

shapes:
  branch:
    description: A branch node routes to explicit then/else targets.
    nodes:
      - id: branch-decide
        kind: branch
      - id: branch-plan
        kind: agent
      - id: branch-fallback
        kind: agent
    edges:
      - id: branch-decide-branch-plan
        source: branch-decide
        target: branch-plan
        label: then
        condition_ref: tests.arnold.patterns._fixtures:decide_condition
      - id: branch-decide-branch-fallback
        source: branch-decide
        target: branch-fallback
        label: else
        condition_ref: "tests.arnold.patterns._fixtures:decide_condition:negated"

  loop_revise:
    description: Bounded loop/revise uses explicit reentry edges, not arbitrary cycles.
    nodes:
      - id: loop
        kind: loop
      - id: loop-body
        kind: agent
      - id: revise
        kind: revise
      - id: draft
        kind: agent
    edges:
      - id: loop-loop-body
        source: loop
        target: loop-body
        label: go
        condition_ref: null
      - id: loop-body-loop
        source: loop-body
        target: loop
        label: reentry
        condition_ref: retry
      - id: draft-revise
        source: draft
        target: revise
        label: revise
        condition_ref: retry-revise
    policies:
      loop:
        loop:
          max_iterations: 3
          until_ref: tests.arnold.patterns._fixtures:decide_condition
        suspension_routes:
          - route_id: loop-reentry
            capability_id: null
            reentry_id: retry
      revise:
        loop:
          max_iterations: 4
          until_ref: tests.arnold.patterns._fixtures:decide_condition
        suspension_routes:
          - route_id: revise-reentry
            capability_id: null
            reentry_id: retry-revise

  fanout_panel:
    description: Fanout branches to parallel agents joined by a merge node.
    nodes:
      - id: fan
        kind: fanout
      - id: fan-branch-a
        kind: agent
      - id: fan-branch-b
        kind: agent
      - id: fan-merged
        kind: merge
    edges:
      - id: fan-fan-branch-a
        source: fan
        target: fan-branch-a
        label: branch
      - id: fan-fan-branch-b
        source: fan
        target: fan-branch-b
        label: branch
      - id: fan-branch-a-fan-merged
        source: fan-branch-a
        target: fan-merged
        label: join
      - id: fan-branch-b-fan-merged
        source: fan-branch-b
        target: fan-merged
        label: join
    policies:
      fan:
        fanout:
          mode: static
          reducer_ref: tests.arnold.patterns._fixtures:reducer

  retry:
    description: Bounded retry wraps a fragile step with explicit reentry.
    nodes:
      - id: retry
        kind: retry
      - id: retry-fragile
        kind: agent
    edges:
      - id: retry-retry-fragile
        source: retry
        target: retry-fragile
        label: attempt
      - id: retry-fragile-retry
        source: retry-fragile
        target: retry
        label: retry
        condition_ref: retry:retry
    policies:
      retry:
        retry:
          max_attempts: 3
          backoff: none
          retry_on:
            - error
        loop:
          max_iterations: 3
        suspension_routes:
          - route_id: retry-reentry
            capability_id: null
            reentry_id: retry:retry

  subpipeline:
    description: Subpipeline step references a nested manifest by hash.
    nodes:
      - id: inner
        kind: subpipeline
    subpipelines:
      inner:
        manifest_hash: "sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
        alias: nested

  suspension_capability:
    description: Generic suspension step is gated by a capability and reentry id.
    nodes:
      - id: gate
        kind: suspension
        capabilities:
          - capability_id: human:operator
            route: default
            required: true
    policies:
      gate:
        suspension_routes:
          - route_id: gate-gate
            capability_id: human:operator
            reentry_id: resume

  override_fallback:
    description: Override edge labels allow fallback routing without changing ids.
    nodes:
      - id: override-decide
        kind: branch
      - id: override-primary
        kind: agent
      - id: override-fallback
        kind: agent
    edges:
      - id: override-decide-override-primary
        source: override-decide
        target: override-primary
        label: default
      - id: override-decide-override-fallback
        source: override-decide
        target: override-fallback
        label: fallback

  escalation:
    description: Escalation target receives a labeled control route.
    nodes:
      - id: escalate-review
        kind: review
      - id: escalate-supervisor
        kind: agent
    edges:
      - id: escalate-review-escalate-supervisor
        source: escalate-review
        target: escalate-supervisor
        label: escalate

  compensation:
    description: Compensation target receives a labeled rollback route.
    nodes:
      - id: compensate-fragile
        kind: agent
      - id: compensate-target
        kind: agent
    edges:
      - id: compensate-fragile-compensate-target
        source: compensate-fragile
        target: compensate-target
        label: compensate

  supervisor_promotion:
    description: Supervisor promotion is a labeled route to an elevated agent.
    nodes:
      - id: promote-gate
        kind: suspension
      - id: promote-supervisor
        kind: agent
    edges:
      - id: promote-gate-promote-supervisor
        source: promote-gate
        target: promote-supervisor
        label: promote

  feedback:
    description: Feedback loop routes output back to an earlier step.
    nodes:
      - id: feedback-review
        kind: review
      - id: feedback-plan
        kind: agent
    edges:
      - id: feedback-review-feedback-plan
        source: feedback-review
        target: feedback-plan
        label: feedback

  robustness_budget:
    description: Robustness policy slots are carried on nodes.
    nodes:
      - id: robust-plan
        kind: agent
    policies:
      robust-plan:
        budget:
          max_cost: 1.0
          max_seconds: 30.0
          max_attempts: 2
          token_budget: 1000

  dynamic_topology_overlay:
    description: Dynamic overlay event slots are neutral metadata, not runtime code.
    nodes:
      - id: overlay
        kind: agent
    metadata:
      overlay:
        dynamic_events:
          - event: on_branch
            slot: branch
          - event: on_suspend
            slot: suspension

  tournament:
    description: Tournament lowers two full tiebreaker rounds to explicit nodes/routes.
    nodes:
      - id: tourney-judge
        kind: branch
      - id: tourney-tiebreak-1
        kind: branch
      - id: tourney-tiebreak-2
        kind: branch
      - id: tourney-winner
        kind: merge
      - id: tourney-candidate-a
        kind: agent
      - id: tourney-candidate-b
        kind: agent
    edges:
      - id: tourney-candidate-a-tourney-judge
        source: tourney-candidate-a
        target: tourney-judge
        label: candidate
      - id: tourney-candidate-b-tourney-judge
        source: tourney-candidate-b
        target: tourney-judge
        label: candidate
      - id: tourney-judge-tourney-tiebreak-1
        source: tourney-judge
        target: tourney-tiebreak-1
        label: tie
        condition_ref: tests.arnold.patterns._fixtures:decide_condition
      - id: tourney-judge-tourney-winner
        source: tourney-judge
        target: tourney-winner
        label: winner
        condition_ref: tests.arnold.patterns._fixtures:judge_winner
      - id: tourney-tiebreak-1-tourney-tiebreak-2
        source: tourney-tiebreak-1
        target: tourney-tiebreak-2
        label: tie
        condition_ref: tests.arnold.patterns._fixtures:decide_condition
      - id: tourney-tiebreak-1-tourney-winner
        source: tourney-tiebreak-1
        target: tourney-winner
        label: winner
        condition_ref: tests.arnold.patterns._fixtures:judge_winner
      - id: tourney-tiebreak-2-tourney-winner
        source: tourney-tiebreak-2
        target: tourney-winner
        label: winner
        condition_ref: tests.arnold.patterns._fixtures:judge_winner

python_authoring_m3:
  supported_subset:
    branch_routes:
      fixture: tests/fixtures/workflow_authoring/m3/valid_m3_branch_routes.py
      canonical_shape: branch
      topology_hash: sha256:3f24a804768e6dd18ac04b7a1bade1edc6552eaa8d022f250872ab085c9faa2c
      manifest_hash: sha256:bde84d01b81f90018be816f84cca8d05228cc608eff5680ec58d1f212288648b
      nodes:
        - id: route
          kind: agent
        - id: execute
          kind: agent
        - id: review-approved
          kind: agent
        - id: revise-plan
          kind: agent
        - id: review-revised
          kind: agent
        - id: review-fallback
          kind: agent
      edges:
        - id: route-execute
          source: route
          target: execute
          label: approve
          condition_ref: route.decision.eq.approve
        - id: route-revise-plan
          source: route
          target: revise-plan
          label: revise
          condition_ref: route.decision.eq.revise
        - id: route-review-fallback
          source: route
          target: review-fallback
          label: else
          condition_ref: route.decision.else
        - id: execute-review-approved
          source: execute
          target: review-approved
          label: default
          condition_ref: null
        - id: revise-plan-review-revised
          source: revise-plan
          target: review-revised
          label: default
          condition_ref: null

    bounded_review_loop:
      fixture: tests/fixtures/workflow_authoring/m3/valid_m3_bounded_loop.py
      canonical_shape: loop_revise
      topology_hash: sha256:95bafa9aae2729b45e2a032525755cb6ec4b0921a4c5c63bba6341253974ef29
      manifest_hash: sha256:3a90136d081ac2784e56077c87816560880164fe261e7fdd0389b01ddc7d9055
      nodes:
        - id: plan
          kind: agent
        - id: execute
          kind: agent
        - id: review
          kind: agent
        - id: revise
          kind: agent
      edges:
        - id: plan-execute
          source: plan
          target: execute
          label: default
          condition_ref: null
        - id: execute-review
          source: execute
          target: review
          label: default
          condition_ref: null
        - id: review-revise
          source: review
          target: revise
          label: default
          condition_ref: null
        - id: revise-execute
          source: revise
          target: execute
          label: reentry
          condition_ref: loop:bounded_review_loop:reentry:execute
      policies:
        execute:
          loop:
            max_iterations: 3
            until_ref: review.approved
          suspension_routes:
            - route_id: execute-reentry
              capability_id: null
              reentry_id: loop:bounded_review_loop:reentry:execute

    policy_refs:
      fixture: tests/fixtures/workflow_authoring/m3/valid_m3_policy_refs.py
      canonical_shape: retry
      topology_hash: sha256:c05e1a33c42b70e2e1f5fb25d616c1a528939b4e5bb3ce13e21b6b05ef028650
      manifest_hash: sha256:eb8a462c4258dda1adcf5055b6855712e40a1a12ce8931e71fca54af011d215e
      nodes:
        - id: plan
          kind: agent
        - id: execute
          kind: agent
        - id: review
          kind: agent
      edges:
        - id: plan-execute
          source: plan
          target: execute
          label: default
          condition_ref: null
        - id: execute-review
          source: execute
          target: review
          label: default
          condition_ref: null
      policies:
        execute:
          retry:
            max_attempts: 2
            backoff: none
            retry_on:
              - transient
        review:
          timing:
            timeout_seconds: 60
          authority:
            - authority_id: review-approval
              action: approve-review
              capability_id: human.review
          control_transitions:
            - transition_id: handoff
              transition_type: approval-handoff
              trigger_ref: review.needs_approval
              target_ref: reviewer
              policy_ref: review_approval
      workflow_policy:
        suspension_routes:
          - route_id: operator
            capability_id: human.review
            reentry_id: execute
            resume_schema_ref: operator.resume
        authority:
          - authority_id: review-approval
            action: approve-review
            capability_id: human.review
        control_transitions:
          - transition_id: handoff
            transition_type: approval-handoff
            trigger_ref: review.needs_approval
            target_ref: reviewer
            policy_ref: review_approval

    subpipeline_ref:
      fixture: tests/fixtures/workflow_authoring/m3/valid_m3_subflow_ref.py
      canonical_shape: subpipeline
      topology_hash: sha256:bdd336706c58d3cea6b740c6582a138a55be53296b8ca3716f5436203599fc54
      manifest_hash: sha256:9f1470c87355418df5fca4d7f60fbadbaffed67e9668cf8893bfbebef441f9a2
      nodes:
        - id: plan
          kind: agent
        - id: execute
          kind: agent
        - id: nested-review
          kind: subpipeline
      edges:
        - id: plan-execute
          source: plan
          target: execute
          label: default
          condition_ref: null
        - id: execute-nested-review
          source: execute
          target: nested-review
          label: default
          condition_ref: null
      subpipelines:
        nested-review:
          manifest_hash: sha256:1111111111111111111111111111111111111111111111111111111111111111
          alias: review

  deferred_canonical_shapes:
    fanout_panel:
      reason: Python-shaped source has no M3 fanout/panel syntax.
      expected_diagnostic: AWF014_UNSUPPORTED_POLICY_CARRIER
    retry:
      reason: M3 lowers retry as a policy carrier, not as an explicit retry wrapper node.
    suspension_capability:
      reason: M3 lowers suspension as workflow policy/intrinsic carriers, not as a standalone capability-gated suspension node fixture.
    override_fallback:
      reason: M3 branch labels are literal decision routes; override/fallback route policy syntax is not supported.
    escalation:
      reason: M3 control transitions lower to policy slots, not explicit escalation edges.
    compensation:
      reason: M3 has no lowerable compensation carrier in this checkout.
    supervisor_promotion:
      reason: M3 has no supervisor promotion route syntax.
    feedback:
      reason: M3 allows only bounded review/rework loop backedges with loop policy.
    robustness_budget:
      reason: M3 deliberately diagnoses robustness/budget-like policy families without explicit carriers.
      expected_diagnostic: AWF014_UNSUPPORTED_POLICY_CARRIER
    dynamic_topology_overlay:
      reason: M3 source lowering does not expose dynamic topology overlay slots.
    tournament:
      reason: M3 source lowering does not expose tournament/tiebreaker syntax.
