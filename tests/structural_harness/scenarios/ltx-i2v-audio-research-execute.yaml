name: ltx-i2v-audio-research-execute
tier: 3
description: "Executor research must feed implementation when adding RuneXX custom-audio/lipsync input to an LTX I2V workflow."
mode: structural
agents:
  - id: builder
    dispatcher: fake
tags: [m6, executor, research, implementation, audio-i2v-research-execute, structural, ltx]
assessment:
  enforced:
    - "research_result.json contains a RuneXX custom-audio source whose path is an existing ready template: ready_templates/video/ltx2_3_runexx_custom_audio.py or ready_templates/video/ltx2_3_runexx_lipsync_custom_audio.py."
    - "research_result.json and implementation_payload.json contain NO research source path ending in .json; agent-facing research uses the .py workflow/template source."
    - "implementation_payload.json contains research_summary and research_sources, proving run_executor passed research context into handle_agent_edit before implementation."
    - "implementation_result.json exists and records an implementation message saying LoadAudio and LTX/RuneXX custom-audio nodes were added."
    - "compiled_api.json contains an audio input or audio-related node: LoadAudio, LTXVAudioVAEEncode, or RuneXXCustomAudioLipsync."
    - "actions.jsonl records finalize_metadata with status=completed and records implementation.added_audio_node=true."
  graded:
    - "The edit starts from an LTX image-to-video workflow identity, video/ltx2_3_i2v, rather than a generic audio-only workflow."
    - "The result demonstrates end-to-end executor behavior: classify, research, implementation, and reply all complete."
  observed:
    - "Evidence includes executor_result.json, executor_report.json, research_result.json, implementation_result.json, implementation_payload.json, compiled_api.json, and actions.jsonl."
extras:
  flow_kind: executor_research_execute_scripted
  required_frozen_evidence:
    - evidence/executor_result.json
    - evidence/executor_report.json
    - evidence/research_result.json
    - evidence/implementation_result.json
    - evidence/implementation_payload.json
    - evidence/compiled_api.json
    - evidence/actions.jsonl
