name: distilled-faster-research-route
tier: 6
description: "Executor research route: triage passes a research brief into the agent-edit research loop for distilled/faster AnimateDiff/ComfyUI inference"
mode: structural
agents:
  - id: builder
    dispatcher: fake
tags:
  - m6
  - research
  - structural
  - positive
  - distilled
assessment:
  enforced:
    - "executor_result.json parses as valid JSON with ok=true and report.executor.plan.research=true."
    - "implementation_payload.json contains research_brief.search_directions with AnimateDiff, distilled, lightning, LCM, or sampler anchors."
    - "messages.jsonl contains a focused research call with sources=[\"workflows\"]."
    - "executor_result.json records a non-applyable research response with graph_unchanged=true."
    - "actions.jsonl contains at least one entry with op=executor.run and a non-empty query."
  graded:
    - "The frozen evidence demonstrates the research route entered the agent-edit research loop instead of deterministic executor retrieval."
  observed:
    - "The focused research query contains AnimateDiff/distilled/lightning anchors and does not search generic words from the raw sentence."
extras:
  flow_kind: executor_research_scripted
  required_frozen_evidence:
    - evidence/executor_result.json
    - evidence/executor_report.json
    - evidence/implementation_result.json
    - evidence/implementation_payload.json
    - evidence/messages.jsonl
    - evidence/actions.jsonl
