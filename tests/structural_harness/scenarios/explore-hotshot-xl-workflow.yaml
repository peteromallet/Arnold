name: explore-hotshot-xl-workflow
tier: 6
description: "Executor research route: triage passes a research brief into the agent-edit research loop for Hotshot XL workflow lookup"
mode: structural
agents:
  - id: builder
    dispatcher: fake
tags:
  - m6
  - research
  - structural
  - positive
  - hotshot
assessment:
  subjective: true
  enforced:
    - "executor_result.json parses as valid JSON with ok=true and report.executor.plan.research=true."
    - "implementation_payload.json contains research_brief.search_directions with Hotshot XL or SVD-XT anchors."
    - "messages.jsonl contains a focused research call with sources=[\"workflows\"]."
    - "executor_result.json records a non-applyable research response with graph_unchanged=true."
    - "actions.jsonl contains at least one entry with op=executor.run and a non-empty query."
  graded:
    - "Routing correctness: For a research-only question with no graph edit requested, the classifier should choose the research route with research=true and implement=false, not route to adapt, revise, clarify, respond, or inspect."
    - "The frozen evidence demonstrates the research route entered the agent-edit research loop instead of deterministic executor retrieval."
  observed:
    - "The focused research query contains Hotshot XL/SVD-XT anchors and does not search generic words from the raw sentence."
extras:
  flow_kind: executor_full_pipeline
  required_frozen_evidence:
    - evidence/executor_result.json
    - evidence/executor_report.json
    - evidence/implementation_result.json
    - evidence/implementation_payload.json
    - evidence/messages.jsonl
    - evidence/metadata.json
    - evidence/actions.jsonl
