name: chaining-positive
tier: 1
description: "Positive structural image-to-video chaining scenario"
mode: structural
agents:
  - id: chainer
    dispatcher: fake
tags:
  - chaining
  - structural
  - positive
assessment:
  enforced:
    - "Stage 2 compiled_api.json contains at least one LoadImage node whose inputs.image field references the stage 1 output image path (as observed in compiled_api.<node_id>.inputs.image)."
    - "Stage 1 metadata.json exists and contains entrypoint=op, layer=ops/image.py:t2i, chain_id, and run_id."
    - "Stage 2 metadata.json exists and contains entrypoint=op, layer=ops/video.py:i2v, chain_id matching stage 1, parent_run_id matching stage 1 run_id, and a run_id distinct from stage 1."
    - "Stage 1 and stage 2 run_ids are distinct."
    - "chain_id is identical across stage 1 and stage 2."
    - "Stage 2 parent_run_id equals stage 1 run_id (chain lineage)."
    - "Stage 1 parent_run_id is absent or null (first stage in chain)."
  graded:
    - "Both stages produce non-empty output files (image.png for stage 1, clip.mp4 for stage 2)."
  observed:
    - "Actions JSONL records one action per stage with op, stage, chain_id, and run_id fields."
extras:
  required_frozen_evidence:
    - evidence/stage1/compiled_api.json
    - evidence/stage1/metadata.json
    - evidence/stage2/compiled_api.json
    - evidence/stage2/metadata.json
    - evidence/actions.jsonl
