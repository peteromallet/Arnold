name: wan22-stack-highlow-noise-lora
tier: 3
description: "Compose correctly: stack a 2-stage LoRA onto BOTH the high-noise and low-noise Wan 2.2 model chains, each reaching its own sampler"
mode: structural
agents:
  - id: builder
    dispatcher: fake
tags:
  - m4
  - compose
