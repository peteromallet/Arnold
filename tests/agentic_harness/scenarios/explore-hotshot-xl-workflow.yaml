name: explore-hotshot-xl-workflow
tier: 6
description: "Executor research: the frontend/API executor path can search for a Hotshot XL workflow and return sources"
mode: structural
agents:
  - id: builder
    dispatcher: fake
tags:
  - m6
  - research
  - structural
  - positive
  - hotshot
assessment:
  enforced:
    - "executor_result.json parses as valid JSON with ok=true and report.executor.plan.research=true."
    - "executor_report.json contains an executor research object with a string `summary` and a list `sources`."
    - "actions.jsonl contains at least one entry with op=executor.run and a non-empty query."
  graded:
    - "The executor research sources are non-empty (the pipeline found at least one result)."
  observed:
    - "At least one source in executor_result.json or research_result.json mentions Hotshot, HotShot, or XL (case-insensitive) in its class_type, title, description, or url."
extras:
  required_frozen_evidence:
    - evidence/executor_result.json
    - evidence/executor_report.json
    - evidence/research_result.json
    - evidence/actions.jsonl
